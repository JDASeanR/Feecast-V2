// ── PM → Client → Project hierarchy ──
function bProjects(){
  const ps=filtPro();
  const archCt=state.projects.filter(p=>p.archived).length+0; // phases no longer have archive — count removed

  // Group: PM → Client → Projects
  const pmGroups={};
  ps.forEach(p=>{
    const pm=p.pm||'—';
    const client=p._client||p.client||'—';
    if(!pmGroups[pm]) pmGroups[pm]={pm,clients:{}};
    if(!pmGroups[pm].clients[client]) pmGroups[pm].clients[client]={client,projects:[]};
    pmGroups[pm].clients[client].projects.push(p);
  });

  const rows=[];

  Object.values(pmGroups).forEach(pmG=>{
    const pmKey='pm-'+pmG.pm;
    const pmExp=state.expandedPM[pmKey]!==false; // default expanded
    // PM totals
    const pmFee=Object.values(pmG.clients).flatMap(c=>c.projects).reduce((s,p)=>s+pFee(p),0);
    const pmRem=Object.values(pmG.clients).flatMap(c=>c.projects).reduce((s,p)=>s+pRem(p),0);
    const pmCount=Object.values(pmG.clients).flatMap(c=>c.projects).length;
    const pmFlagCt=Object.values(pmG.clients).flatMap(c=>c.projects).filter(p=>p.flag||p.phases.some(ph=>ph.flag)).length;

    rows.push(`<tr class="pm-header-row">
      <td style="width:20px"><button class="exp-btn" data-exp-pm="${pmKey}">${pmExp?'▾':'▸'}</button></td>
      <td colspan="8" style="font-size:13px;letter-spacing:.01em;color:#F5F5F1">
        <span style="font-size:11px;opacity:.7;margin-right:6px;color:#F5F5F1">PM</span>${pmG.pm}
        <span style="font-size:11px;font-weight:400;opacity:.7;margin-left:10px;color:#F5F5F1">${pmCount} project${pmCount!==1?'s':''}</span>
        ${pmFlagCt>0?`<span style="font-size:11px;font-weight:400;margin-left:6px;color:#f8c4a0">${pmFlagCt} flagged</span>`:''}
      </td>
    </tr>`);

    if(!pmExp) return;

    Object.values(pmG.clients).forEach(clientG=>{
      const clientKey='client-'+pmG.pm+'-'+clientG.client;
      const clientExp=state.expandedClient[clientKey]!==false;
      const clientFee=clientG.projects.reduce((s,p)=>s+pFee(p),0);
      const clientRem=clientG.projects.reduce((s,p)=>s+pRem(p),0);
      const clientCount=clientG.projects.length;

      const clientProjIds=clientG.projects.map(p=>p.id);
      // Check if this client has an alias (display name differs from raw)
      const rawClients=[...new Set(clientG.projects.map(p=>p.client))];
      rows.push(`<tr class="client-header-row">
        <td style="width:20px;padding-left:18px"><button class="exp-btn" data-exp-client="${clientKey}">${clientExp?'▾':'▸'}</button></td>
        <td colspan="4">
          <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">
            <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Client</span>
            <span class="client-name-display" style="font-size:12px;font-weight:600;cursor:text;border-bottom:1px dashed transparent;padding-bottom:1px;transition:border-color .15s"
              data-edit-client="${encodeURIComponent(clientG.client)}"
              data-raw-clients="${encodeURIComponent(JSON.stringify(rawClients))}"
              title="Click to rename"
              onmouseover="this.style.borderBottomColor='var(--jda-terracotta)'"
              onmouseout="this.style.borderBottomColor='transparent'"
            >${clientG.client}</span>
            ${rawClients.length===1&&rawClients[0]!==clientG.client?`<span style="font-size:10px;color:var(--text3)">(${rawClients[0]})</span>`:rawClients.length>1&&!(rawClients.length===1&&rawClients[0]===clientG.client)?`<span style="font-size:10px;color:var(--text3)">(${rawClients.join(', ')})</span>`:''}
            <span style="font-size:11px;color:var(--text3)">${clientCount} project${clientCount!==1?'s':''}</span>
          </div>
        </td>
        <td style="width:52px"></td>
        <td colspan="4"></td>
        <td><button class="btn btn-sm btn-icon btn-danger" data-delete-client="${encodeURIComponent(clientG.client)}" title="Delete client and all projects"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
      </tr>`);

      if(!clientExp) return;

      clientG.projects.forEach(p=>{
        const exp=state.expandedProj[p.id];
        const wip=pWIP(p),hasW=p.phases.some(ph=>phVal(ph));
        rows.push(`<tr class="parent-row${p.archived?' archived-row':''}">
          <td style="width:20px;padding-left:34px"><button class="exp-btn" data-exp="${p.id}">${exp!==false?'▾':'▸'}</button></td>
          <td style="width:80px;white-space:nowrap">${pCtrl(p)}</td>
          <td style="width:32px;font-size:11px;color:var(--text3)">${p.projNo}</td>
          <td style="max-width:220px"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis">${p.project}${p.archived?` <span class="badge badge-ARC">Archived</span>`:''}</div></td>
          <td style="width:52px"><span class="badge badge-${p.status}">${p.status}</span></td>
          <td style="width:80px">${fmt(pFee(p))}</td>
          <td style="width:80px;color:var(--text2)">${fmt(pRem(p))}</td>
          <td style="width:68px"><span style="font-size:12px">${Math.round(wip*100)}%</span>${hasW?'<span class="warn-dot"></span>':''}<div class="pbar"><div class="pfill" style="width:${Math.min(100,Math.round(wip*100))}%"></div></div></td>
          <td style="width:56px;white-space:nowrap">
            <button class="btn btn-sm btn-icon" data-edit="${p.id}" title="Edit project"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="btn btn-sm btn-icon" style="color:var(--red)" data-delete-proj="${p.id}" title="Delete project"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </td>
        </tr>`);

        if(exp!==false){
          const phGroups=getPhaseGroups(p);
          phGroups.forEach(grp=>{
            // Addendum header row
            if(grp.addendum){
              const addKey='add-'+p.id+'-'+grp.addendum;
              const addExp=state.expandedAddendum[addKey]!==false;
              const addFee=grp.phases.reduce((s,ph)=>s+(ph.fee||0),0);
              const addRem=grp.phases.reduce((s,ph)=>s+phRem(ph),0);
              rows.push(`<tr class="addendum-header-row">
                <td style="padding-left:36px"><button class="exp-btn" data-exp-add="${addKey}">${addExp?'▾':'▸'}</button></td>
                <td colspan="5">
                  <span style="font-size:10px;color:var(--text3);margin-right:4px;text-transform:uppercase;letter-spacing:.04em">Addendum</span>
                  <span style="font-size:11px;font-weight:600;color:var(--jda-terracotta)">${grp.addendum}</span>
                  <span style="font-size:10px;color:var(--text3);margin-left:5px">${grp.phases.length} phase${grp.phases.length!==1?'s':''}</span>
                </td>
                <td style="font-size:11px;color:var(--text2)">${fmt(addFee)}</td>
                <td style="font-size:11px;color:var(--text3)">${fmt(addRem)}</td>
                <td></td>
              </tr>`);
              if(!addExp) return;
            }
            grp.phases.forEach(ph=>{
              const indent=grp.addendum?'66px':'50px';
              const ao=state.openAlloc[ph.id],w=phVal(ph),as=phAllocSt(ph);
              const _caEst=ph.scope==='CA'?phCAEst(ph):0;
              const _allocPct=ph.scope==='CA'
                ? (_caEst>0?Math.round(phAlloc(ph)/_caEst*100):0)
                : Math.round(phAlloc(ph)/Math.max(phRem(ph),1)*100);
              const aLbl=phRem(ph)<=0?`<span style="font-size:10px;color:var(--green)">✓ Billed out</span>`:`<span style="font-size:10px;color:${as.cls==='ok'?'var(--green)':as.cls==='over'?'var(--red)':'var(--text3)'}">${_allocPct}% alloc</span>`;
              rows.push(`<tr class="phase-row${ph.done?' done-row':''}">
                <td style="padding-left:${indent}"></td>
                <td style="width:80px;white-space:nowrap"><span class="phase-controls">${phCtrl(p.id,ph)}</span></td>
                <td style="font-size:10px;color:var(--text3)">${ph.scope}</td>
                <td colspan="2"><div style="display:flex;align-items:center;gap:5px">
                  ${false?`<span style="font-size:11px;color:var(--text3)">${ph.name} <span class="badge badge-ARC">Archived</span></span>`:
                    `<button class="btn btn-sm" data-open-alloc="${p.id}" data-alloc-ph="${ph.id}" style="color:${ao?'var(--blue)':'var(--text2)'};border-color:${ao?'#9ec8e8':'var(--border2)'}">
                      <i class="ti ti-calendar-stats" aria-hidden="true"></i> ${ph.name}${w?'<span class="warn-dot"></span>':''}
                    </button>${aLbl}`}
                </div></td>
                <td style="font-size:11px">${ph.scope==='CA'
                  ? `${fmt(ph.fee)}<span style="font-size:9px;color:var(--jda-olive);margin-left:3px">/mo</span>`
                  : fmt(ph.fee)+(!ph.hourly?'':' <span style="font-size:9px;color:var(--jda-olive)">NTE</span>')}
                </td>
                <td style="font-size:11px;color:var(--text2)">${ph.scope==='CA'
                  ? `${fmt(phCAEst(ph))} est`
                  : fmt(phRem(ph))}</td>
                <td style="font-size:11px">${ph.pct}%</td><td></td>
              </tr>`);
              if(ao) rows.push(`<tr id="alloc-row-${ph.id}"><td colspan="9" style="padding:0">${allocPanel(p,ph)}</td></tr>`);
            });
          });
          rows.push(`<tr><td colspan="9" style="padding:2px 7px 7px 50px"><button class="btn btn-sm" data-add-phase="${p.id}" style="color:var(--text2)"><i class="ti ti-plus" aria-hidden="true"></i> Add phase</button></td></tr>`);
        }
      });
    });

    // PM subtotal row — shown below all projects for this PM
    if(pmExp){
      const pmWIP=pmFee>0?Math.round((Object.values(pmG.clients).flatMap(c=>c.projects).reduce((s,p)=>s+pBil(p),0)+Object.values(pmG.clients).flatMap(c=>c.projects).reduce((s,p)=>s+pYTD(p),0))/pmFee*100):0;
      rows.push(`<tr style="background:var(--bg3);border-top:1px solid var(--border2)">
        <td colspan="5" style="padding:5px 7px 5px 26px;font-size:11px;color:var(--text2)">
          <span style="font-family:'League Gothic','Nunito Sans',sans-serif;letter-spacing:.03em;font-size:12px">PM ${pmG.pm} TOTAL</span>
          <span style="opacity:.6;margin-left:6px">${pmCount} project${pmCount!==1?'s':''}</span>
        </td>
        <td style="text-align:right;font-size:12px;font-weight:700;color:var(--text)">${fmt(pmFee)}</td>
        <td style="text-align:right;font-size:12px;font-weight:700;color:var(--text2)">${fmt(pmRem)}</td>
        <td style="font-size:11px">
          <div style="display:flex;align-items:center;gap:4px">
            <div class="pbar" style="width:50px"><div class="pfill" style="width:${Math.min(100,pmWIP)}%"></div></div>
            ${pmWIP}%
          </div>
        </td>
        <td></td>
      </tr>`);
    }
  });

  if(!rows.length) rows.push(`<tr><td colspan="9" class="empty-state">No projects found</td></tr>`);

  // Totals row for visible projects
  const _visPs=filtPro().filter(p=>!p.archived||state.showArch);
  const _totFee=_visPs.reduce((s,p)=>s+pFee(p),0);
  const _totBilled=_visPs.reduce((s,p)=>s+pBil(p),0);
  const _totYTD=_visPs.reduce((s,p)=>s+pYTD(p),0);
  const _totRem=_totFee-_totBilled-_totYTD; // fee - prior - current YTD
  const _totWIP=_totFee>0?Math.round((_totBilled+_totYTD)/_totFee*100):0;
  const _phCount=_visPs.reduce((s,p)=>s+p.phases.length,0);
  rows.push(`<tr style="border-top:2px solid var(--border2);background:var(--bg2)">
    <td colspan="3" style="font-weight:700;font-size:12px;padding:6px 7px">Total — ${_visPs.length} project${_visPs.length!==1?'s':''} · ${_phCount} phases</td>
    <td></td><td></td>
    <td style="font-weight:700;font-size:12px">${fmt(_totFee)}</td>
    <td style="font-weight:700;font-size:12px;color:var(--text2)">${fmt(_totRem)}</td>
    <td style="font-weight:700;font-size:12px">${_totWIP}%<div class="pbar" style="margin-top:3px"><div class="pfill" style="width:${Math.min(100,_totWIP)}%"></div></div></td>
    <td></td>
  </tr>`);

  const rowsHtml=rows.join('');
  return`
  <div style="position:sticky;top:98px;z-index:10">
  <div class="toolbar" style="background:var(--bg);padding-top:6px;margin-bottom:0;border-bottom:0.5px solid var(--border)">
    <input type="text" id="srch" placeholder="Search project, client, #…" value="${state.search}" autocomplete="off">
    <select id="fpm"><option value="ALL">All PMs</option>${pmList().map(x=>`<option${state.fPM===x?' selected':''}>${x}</option>`).join('')}</select>
    <select id="fst"><option value="ALL">All status</option>${stList().map(x=>`<option value="${x.code}"${state.fSt===x.code?' selected':''}>${x.code} — ${x.label}</option>`).join('')}</select>
    <button class="btn${state.showArch?' btn-active':''}" id="toggle-arch">Show archived${archCt>0?' ('+archCt+')':''}</button>
    <button class="btn${state.hideDoneProjects?' btn-active':''}" id="toggle-done-projects" title="Hide completed projects"><i class="ti ti-archive" aria-hidden="true"></i> ${state.hideDoneProjects?'Show done':'Hide done'}</button>
    <button class="btn${state.hideDonePhases?' btn-active':''}" id="toggle-done-phases" title="Hide completed phases"><i class="ti ti-eye-off" aria-hidden="true"></i> ${state.hideDonePhases?'Show done':'WIP only'}</button>
    <button class="btn" id="collapse-all-btn" style="color:var(--text2)"><i class="ti ti-layout-navbar-${state.allCollapsed?'expand':'collapse'}" aria-hidden="true"></i> ${state.allCollapsed?'Expand all':'Collapse all'}</button>
    <button class="btn btn-primary" id="new-proj"><i class="ti ti-plus" aria-hidden="true"></i> New project</button>
  
  </div>
  <div style="overflow-x:auto;background:var(--bg2);border-bottom:1.5px solid var(--border2)">
    <table id="proj-hdr-table" style="width:100%">
      <colgroup>
      <col style="width:4%"><col style="width:8%"><col style="width:4%">
      <col><col style="width:4%"><col style="width:6%"><col style="width:6%">
      <col style="width:7%"><col style="width:3%">
    </colgroup>
      <tbody><tr style="background:var(--bg2)">
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px"></td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px"></td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">PROJ #</td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">PROJECT</td>
        <td style="text-align:center;font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">STATUS</td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">FEE</td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">REMAINING</td>
        <td style="font-size:10px;font-weight:700;color:var(--jda-black);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px">WIP</td>
        <td></td>
      </tr></tbody>
    </table>
  </div>
  </div>
  <div style="font-size:11px;color:var(--text2);padding:4px 4px 6px">${ps.length} projects across ${Object.keys(filtPro().reduce((acc,p)=>{acc[p._client]=1;return acc;},{})).length} clients</div>
  <div style="overflow-x:auto"><table id="proj-data-table" style="width:100%">
      <colgroup>
      <col style="width:4%"><col style="width:8%"><col style="width:4%">
      <col><col style="width:4%"><col style="width:6%"><col style="width:6%">
      <col style="width:7%"><col style="width:3%">
    </colgroup>
    <tbody>${rowsHtml}</tbody>
  </table></div>`;
}

const pCtrl=p=>`
  <button class="flag-btn${p.flag?' on':''}" data-do-proj-flag="${p.id}"><i class="ti ${p.flag?'ti-flag-filled':'ti-flag'}"></i></button>
  <button class="arch-btn" data-do-proj-archive="${p.id}" title="${p.archived?'Restore':'Archive'}"><i class="ti ti-archive${p.archived?'-off':''}"></i></button>`;
const phCtrl=(pid,ph)=>`
  <button class="done-btn${ph.done?' on':''}" data-do-phase-done data-proj-id="${pid}" data-phase-id="${ph.id}" title="${ph.done?'Mark incomplete':'Mark done'}"><i class="ti ti-circle-check"></i></button>
  <button class="flag-btn${ph.flag?' on':''}" data-do-phase-flag data-proj-id="${pid}" data-phase-id="${ph.id}"><i class="ti ${ph.flag?'ti-flag-filled':'ti-flag'}"></i></button>`;

// ── Billing tab ──
function bBilling(){
  const VMONTHS=getVisibleMonths();
  const ps=filtPro().filter(p=>!p.archived).filter(p=>{
    if(!state.hideBilledOut) return true;
    // Hide project only if ALL phases are billed out
    return p.phases.some(ph=>phRem(ph)>0);
  });
  const sp=state.bShowPh;
  const nW=168,fW=70,pW=64;
  const curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const goal=mGoal();
  const hourlyData=state.settings.billing.hourlyByMonth||{};

  // Group PM→Client→Project same as projects tab
  const pmGroups={};
  ps.forEach(p=>{
    const pm=p.pm||'—';
    const client=p._client||p.client||'—';
    if(!pmGroups[pm]) pmGroups[pm]={pm,clients:{}};
    if(!pmGroups[pm].clients[client]) pmGroups[pm].clients[client]={client,projects:[]};
    pmGroups[pm].clients[client].projects.push(p);
  });

  const rows=[];

  Object.values(pmGroups).forEach(pmG=>{
    const pmKey='bpm-'+pmG.pm;
    const pmExp=state.expandedPM[pmKey]!==false;
    const pmProjects=Object.values(pmG.clients).flatMap(c=>c.projects);
    const pmTots=VMONTHS.map(m=>pmProjects.reduce((s,p)=>s+p.phases.reduce((ps2,ph)=>ps2+(ph.monthly[m.key]||0),0),0));

    rows.push(`<tr class="pm-header-row">
      <td class="sticky-col" style="min-width:${nW}px"><div style="display:flex;align-items:center;gap:6px"><button class="exp-btn" data-bexp-pm="${pmKey}">${pmExp?'▾':'▸'}</button><span style="font-size:12px">PM: ${pmG.pm}</span></div></td>
      <td style="text-align:right;min-width:${fW}px;color:rgba(255,255,255,.6);font-size:11px">${fmt(pmProjects.reduce((s,p)=>s+pFee(p),0))}</td>
      ${pmTots.map(t=>`<td style="text-align:center;min-width:${pW}px;font-size:11px;color:rgba(255,255,255,.7)">${t>0?fmt(t):''}</td>`).join('')}
    </tr>`);

    if(!pmExp) return;

    Object.values(pmG.clients).forEach(clientG=>{
      const clientKey='bclient-'+pmG.pm+'-'+clientG.client;
      const clientExp=state.expandedClient[clientKey]!==false;
      const clientTots=VMONTHS.map(m=>clientG.projects.reduce((s,p)=>s+p.phases.reduce((ps2,ph)=>ps2+(ph.monthly[m.key]||0),0),0));

      rows.push(`<tr class="client-header-row">
        <td class="sticky-col" style="min-width:${nW}px;padding-left:18px!important"><div style="display:flex;align-items:center;gap:5px"><button class="exp-btn" data-bexp-client="${clientKey}">${clientExp?'▾':'▸'}</button><span style="font-size:11px">${clientG.client}</span></div></td>
        <td style="text-align:right;min-width:${fW}px;font-size:11px;color:var(--text2)">${fmt(clientG.projects.reduce((s,p)=>s+pFee(p),0))}</td>
        ${clientTots.map(t=>`<td style="text-align:center;min-width:${pW}px;font-size:10px;color:var(--text3)">${t>0?fmt(t):''}</td>`).join('')}
      </tr>`);

      if(!clientExp) return;

      clientG.projects.forEach(p=>{
        const pt=VMONTHS.map(m=>p.phases.reduce((s,ph)=>s+(ph.monthly[m.key]||0),0));
        rows.push(`<tr class="billing-proj-row">
          <td class="sticky-col" style="min-width:${nW}px;padding-left:34px!important">
            <div style="display:flex;align-items:center;gap:4px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.project}</span>${p.flag||p.phases.some(ph=>ph.flag)?`<i class="ti ti-flag-filled" style="color:var(--flag);font-size:10px;flex-shrink:0"></i>`:''}</div>
            <div style="font-size:10px;color:var(--text2)">${p.pm} · ${p.projNo}</div>
          </td>
          <td style="text-align:right;min-width:${fW}px;font-size:11px;color:var(--text2)">${fmt(pFee(p))}</td>
          ${pt.map(t=>`<td style="text-align:center;min-width:${pW}px;font-size:11px">${t>0?fmt(t):''}</td>`).join('')}
        </tr>`);

        if(sp){
          // Group phases by addendum (null = main project phases)
          const addGroups={};
          const visiblePhases = state.hideBilledOut
            ? p.phases.filter(ph=>phRem(ph)>0)
            : p.phases;
          visiblePhases.forEach(ph=>{
            const key=ph.addendum||'__main__';
            if(!addGroups[key]) addGroups[key]=[];
            addGroups[key].push(ph);
          });

          Object.entries(addGroups).forEach(([addKey,phases])=>{
            // Insert addendum header row if this is an addendum group
            if(addKey!=='__main__'){
              const addFee=phases.reduce((s,ph)=>s+(ph.fee||0),0);
              const addRem=phases.reduce((s,ph)=>s+phRem(ph),0);
              const addCells=VMONTHS.map(m=>{
                const t=phases.reduce((s,ph)=>s+(ph.monthly[m.key]||0),0);
                return`<td style="text-align:center;min-width:${pW}px;font-size:11px;color:var(--jda-terracotta);font-weight:600">${t>0?fmt(t):''}</td>`;
              }).join('');
              rows.push(`<tr style="background:var(--bg2);border-top:0.5px solid var(--border)">
                <td class="sticky-col" style="min-width:${nW}px;padding-left:36px!important">
                  <div style="font-size:11px;font-weight:600;color:var(--jda-terracotta)">${addKey}</div>
                  <div style="font-size:10px;color:var(--text3)">${phases.length} phase${phases.length!==1?'s':''}</div>
                </td>
                <td style="text-align:right;min-width:${fW}px">
                  <div style="font-size:11px;color:var(--jda-terracotta)">${fmt(addFee)}</div>
                  <div style="font-size:10px;color:var(--text2)">${fmt(addRem)} rem</div>
                </td>
                ${addCells}
              </tr>`);
            }

            phases.forEach(ph=>{
              const indent=addKey!=='__main__'?'64px':'50px';
              const rem=phRem(ph),bo=rem<=0;
              const cells=VMONTHS.map(m=>{const d=ph.monthly[m.key]||0,pc=(ph.fee||0)>0?Math.round(d/(ph.fee)*1000)/10:0;
                const _conf = m.key===curMk ? ((ph.billingConf||{})[curMk]||null) : null;
                const _confBg = _conf==='g'?'rgba(74,124,63,0.45)':_conf==='y'?'rgba(201,131,26,0.45)':_conf==='r'?'rgba(160,53,42,0.45)':'';
                return`<td class="pct-cell${m.key===curMk?' cur-mo':''}" style="${_confBg?'background:'+_confBg+'!important;':''}" ><div class="pct-wrap">
                  ${bo||ph.done?`<span style="font-size:11px;color:${ph.done?'var(--text3)':'var(--green)'}">${pc>0?pc+'%':'—'}</span>`:`<input type="number" class="pct-input${pc>0?' has-value':''}" min="0" max="100" step="5" value="${pc>0?pc:''}" placeholder="—" data-bp="${p.id}" data-bph="${ph.id}" data-bmk="${m.key}">`}
                  <div class="dollar-sub" id="bdol-${ph.id}-${m.key}">${d>0?fmt(d):''}</div>
                </div></td>`;}).join('');
              const _phFeeForAp=ph.scope==='CA'?phCAEst(ph):(ph.fee||0);
              const ap=bo?100:_phFeeForAp>0?Math.round(phAlloc(ph)/_phFeeForAp*100):0;
              const ac=bo?'var(--green)':Math.abs(phAlloc(ph)-_phFeeForAp)<1?'var(--green)':phAlloc(ph)>(ph.fee||0)?'var(--red)':'var(--text3)';
              rows.push(`<tr class="billing-phase-row${ph.done?' done-row':''}">
                <td class="sticky-col" style="min-width:${nW}px;padding-left:${indent}!important">
                  <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-size:11px">${ph.name}</div>
                  <div style="font-size:10px;display:flex;gap:5px;align-items:center"><span style="color:var(--text3)">${ph.scope}</span><span id="balloc-${ph.id}" style="color:${ac}">${bo?'✓ Billed out':ap+'% alloc'}</span>
                  ${bo?'':(() => {
                    const conf=(ph.billingConf||{})[curMk]||null;
                    return `<div class="bconf-dots" title="Current month billing confidence">
                      <div class="bconf-dot g${conf==='g'?' active':''}" data-bconf="${ph.id}" data-bconf-val="g" title="On track"></div>
                      <div class="bconf-dot y${conf==='y'?' active':''}" data-bconf="${ph.id}" data-bconf-val="y" title="Somewhat confident"></div>
                      <div class="bconf-dot r${conf==='r'?' active':''}" data-bconf="${ph.id}" data-bconf-val="r" title="At risk"></div>
                    </div>`;
                  })()}
                  </div>
                </td>
                <td style="text-align:right;min-width:${fW}px"><div style="font-size:11px">${fmt(ph.fee)}</div><div style="font-size:10px;color:var(--text2)">${bo?'Done':fmt(rem)+' rem'}</div></td>
                ${cells}
              </tr>`);
            });
          });
        }
      });
    });
  });

  const tots=VMONTHS.map(m=>mTotal(m.key));

  return`
  <div style="position:sticky;top:0;z-index:20;background:var(--bg)">
  <div class="toolbar">
    <select id="fpm"><option value="ALL">All PMs</option>${pmList().map(x=>`<option${state.fPM===x?' selected':''}>${x}</option>`).join('')}</select>
    <span style="font-size:12px;color:var(--text2)">Goal:</span>
    <input type="number" id="goal-input" value="${goal}" style="width:88px" step="5000">
    <button class="btn${state.showPastMonths?' btn-active':''}" id="toggle-past-months" style="font-size:11px"><i class="ti ti-calendar-minus" aria-hidden="true"></i> ${state.showPastMonths?'Hide past months':'Show past months'}</button>
    <button class="btn${state.hideBilledOut?' btn-active':''}" id="billing-toggle-billedout" style="font-size:11px"><i class="ti ti-circle-check" aria-hidden="true"></i> ${state.hideBilledOut?'Show billed out':'Hide billed out'}</button>
    <button class="btn" id="toggle-phases" style="font-size:11px">${sp?'Hide phases':'Show phases'}</button>
    <button class="btn btn-warn" id="rollover-btn"><i class="ti ti-refresh" aria-hidden="true"></i> EOY rollover</button>
  </div>
  </div>
  <div style="font-size:11px;color:var(--text2);margin-bottom:9px">Type % to allocate · live totals · <span style="color:var(--green)">✓ Billed out = done</span></div>
  <div style="overflow-x:auto" id="billing-scroll"><table style="min-width:900px;border-collapse:collapse">
    <thead>
      <tr style="background:var(--bg2)">
        <th class="sticky-col" style="min-width:${nW}px;background:var(--bg2)">Project / phase</th>
        <th style="text-align:right;min-width:${fW}px">Fee</th>
        ${VMONTHS.map(m=>`<th class="${m.key===curMk?'cur-mo':''}" style="text-align:center;min-width:${pW}px${m.isPast?';color:var(--text3)':''}">${m.key===curMk?`<strong>${m.label}</strong>`:m.label}</th>`).join('')}
      </tr>
      <tr style="background:var(--bg);border-top:2px solid var(--border2)">
        <td class="sticky-col" style="font-weight:700;font-size:12px;background:var(--bg)">Monthly total</td><td></td>
        ${VMONTHS.map((m,i)=>{const hv=hourlyData[m.key]||0;const total=(tots[i]||0)+hv;return`<td id="bgtotal-${i}" class="${m.key===curMk?'cur-mo':''}" style="text-align:center;font-weight:700;font-size:12px;color:${total>=goal?'var(--green)':'var(--orange)'}">${fmt(total)}</td>`;}).join('')}
      </tr>
      <tr style="background:var(--bg2)">
        <td class="sticky-col" style="font-size:11px;color:var(--text2);background:var(--bg2)">Hourly / reimbursable <span style="font-size:10px;color:var(--text3)">(manual)</span></td><td></td>
        ${VMONTHS.map((m,i)=>{const v=hourlyData[m.key]||0;return`<td style="text-align:center;min-width:${pW}px;padding:2px 3px"><input type="number" class="pct-input${v>0?' has-value':''}" min="0" step="100" value="${v||''}" placeholder="—" data-hourly-mk="${m.key}" style="width:56px;text-align:center;font-size:11px"></td>`;}).join('')}
      </tr>
      <tr style="background:var(--bg2)">
        <td class="sticky-col" style="font-weight:700;font-size:12px;background:var(--bg2)">FF subtotal</td><td></td>
        ${VMONTHS.map((m,i)=>{const t=tots[i]||0;return`<td id="btotal-${m.key}" class="${m.key===curMk?'cur-mo':''}" style="text-align:center;font-weight:700;font-size:11px;color:${t>=goal?'var(--green)':'var(--orange)'}">${fmt(t)}</td>`;}).join('')}
      </tr>
      <tr style="background:var(--bg);border-bottom:2px solid var(--border)">
        <td class="sticky-col" style="font-size:10px;color:var(--text2);background:var(--bg)">vs. goal (${fmt(goal)})</td><td></td>
        ${VMONTHS.map((m,i)=>{const hv=hourlyData[m.key]||0;const total=(tots[i]||0)+hv;const d=total-goal;return`<td id="bgoal-${i}" class="${m.key===curMk?'cur-mo':''}" style="text-align:center;font-size:10px;color:${d>=0?'var(--green)':'var(--orange)'}">${d>=0?'+':''}${fmt(d)}</td>`;}).join('')}
      </tr>
    </thead>
    <tbody>
      ${rows.join('')}
      <tr style="border-top:2px solid var(--border2);background:var(--bg2)">
        <td class="sticky-col" style="font-weight:700;font-size:12px;background:var(--bg2)">Grand total — ${ps.length} project${ps.length!==1?'s':''} · ${ps.reduce((s,p)=>s+p.phases.length,0)} phases</td>
        <td style="text-align:right;font-weight:700;font-size:12px">${fmt(ps.reduce((s,p)=>s+pFee(p),0))}</td>
        ${VMONTHS.map(m=>{const t=mTotal(m.key);return`<td style="text-align:center;font-weight:700;font-size:11px;color:${t>0?'var(--text)':'var(--text3)'}">${t>0?fmt(t):''}</td>`;}).join('')}
      </tr>
    </tbody>
  </table></div>`;
}
// ── Summary ──
function bSummary(){
  const active=state.projects.filter(p=>!p.archived);
  const tF=active.reduce((s,p)=>s+pFee(p),0),tB=active.reduce((s,p)=>s+pBil(p),0);
  // YTD billed: sum completed month allocations for current year (Jan through last complete month)
  const _cy=new Date().getFullYear(),_cm=new Date().getMonth()+1; // current month (1-based)
  const tYTD=Array.from({length:_cm-1},(_,i)=>mTotalAll(`${_cy}-${String(i+1).padStart(2,'0')}`)).reduce((s,v)=>s+v,0);
  const tR=tF-tB-tYTD; // remaining = fee - prior billed - current-year billed
  const wip=tF>0?(tB+tYTD)/tF:0; // WIP includes both prior and current-year billings
  // Current month = actual current month, not Jan
  const _curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const cur=MONTHS.find(m=>m.key===_curMk)||MONTHS[0];
  const curT=mTotal(cur.key),delta=curT-mGoal();
  // YTD spotlight
  const _ytdMos=Array.from({length:TODAY.getMonth()},(_,i)=>`${TODAY.getFullYear()}-${String(i+1).padStart(2,'0')}`);
  const ytdActual=_ytdMos.reduce((s,mk)=>s+mTotalAll(mk),0);
  const ytdGoal=_ytdMos.length*mGoal();
  const arTot=state.invoices.filter(i=>!i.paid).reduce((s,i)=>s+(i.amount||0),0);
  const arPD=state.invoices.filter(i=>!i.paid&&effBucket(i)!=='0-30').reduce((s,i)=>s+(i.amount||0),0);
  const oppPipeline=state.opportunities.filter(o=>!o.archived&&o.status!=='04 Won'&&o.status!=='05 Lost').reduce((s,o)=>s+(o.fee||0)*((o.confidence||50)/100),0);
  const byPM={};
  active.forEach(p=>{if(!p.pm)return;if(!byPM[p.pm])byPM[p.pm]={fee:0,billed:0,count:0,flags:0};byPM[p.pm].fee+=pFee(p);byPM[p.pm].billed+=pBil(p);byPM[p.pm].count++;if(p.flag||p.phases.some(ph=>ph.flag))byPM[p.pm].flags++;});
  const ytdDelta=ytdActual-ytdGoal;
  const pmTable=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="card" style="background:var(--bg2)">
      <div class="card-title" style="font-family:'League Gothic','Nunito Sans',sans-serif;letter-spacing:.04em">YTD ${TODAY.getFullYear()} — ${_ytdMos.length} months</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        <div class="kpi" title="Sum of all FF + hourly billings for completed months this year"><div class="k-lbl">Billed YTD <span style="font-size:9px;color:var(--text3);font-weight:400">(FF + hourly, Jan–last mo)</span></div><div class="k-val" style="color:var(--jda-terracotta)">${fmtK(ytdActual)}</div></div>
        <div class="kpi" title="Monthly billing goal × number of completed months this year"><div class="k-lbl">Goal YTD <span style="font-size:9px;color:var(--text3);font-weight:400">(mo goal × months elapsed)</span></div><div class="k-val">${fmtK(ytdGoal)}</div></div>
        <div class="kpi" title="Billed YTD minus Goal YTD"><div class="k-lbl">vs. Goal <span style="font-size:9px;color:var(--text3);font-weight:400">(billed − goal)</span></div><div class="k-val${ytdDelta>=0?' good':' warn'}">${ytdDelta>=0?'+':''}${fmtK(ytdDelta)}</div></div>
      </div>
    </div>
    <div class="card" style="background:var(--bg2)">
      <div class="card-title" style="font-family:'League Gothic','Nunito Sans',sans-serif;letter-spacing:.04em">${cur.label} — Current Month</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        <div class="kpi" title="Sum of all phase monthly allocations entered for the current month"><div class="k-lbl">Projected <span style="font-size:9px;color:var(--text3);font-weight:400">(current mo allocations)</span></div><div class="k-val${delta>=0?' good':' warn'}">${fmtK(curT)}</div></div>
        <div class="kpi" title="Monthly billing goal from Settings → Billing Goals"><div class="k-lbl">Goal <span style="font-size:9px;color:var(--text3);font-weight:400">(annual goal ÷ 12)</span></div><div class="k-val">${fmtK(mGoal())}</div></div>
        <div class="kpi" title="Current month projected minus monthly goal"><div class="k-lbl">vs. Goal <span style="font-size:9px;color:var(--text3);font-weight:400">(projected − mo goal)</span></div><div class="k-val${delta>=0?' good':' warn'}">${delta>=0?'+':''}${fmtK(delta)}</div></div>
      </div>
    </div>
  </div>
  <div class="metrics">
    <div class="metric" title="Sum of all contracted phase fees across active projects (CA phases = fee × months)"><div class="lbl">Total fees <span style="font-size:9px;color:var(--text3)">(all contracted fees)</span></div><div class="val">${fmtM(tF)}</div></div>
    <div class="metric" title="Billings entered in the Prior Billed field on each phase — typically work billed before the current year"><div class="lbl">Prior billed <span style="font-size:9px;color:var(--text3)">(pre-current year)</span></div><div class="val">${fmtM(tB)}</div></div>
    <div class="metric" title="Total fees minus prior billed minus current-year YTD billings"><div class="lbl">Remaining <span style="font-size:9px;color:var(--text3)">(fees − billed − YTD)</span></div><div class="val warn">${fmtM(tR)}</div></div>
    <div class="metric" title="Percentage of total contracted fees that have been billed (prior + YTD ÷ total fees)"><div class="lbl">Firm WIP <span style="font-size:9px;color:var(--text3)">(billed ÷ total fees)</span></div><div class="val">${Math.round(wip*100)}%</div></div>
    <div class="metric" title="Sum of all unpaid invoices currently outstanding"><div class="lbl">Total A/R <span style="font-size:9px;color:var(--text3)">(unpaid invoices)</span></div><div class="val warn">${fmt(arTot)}</div></div>
    <div class="metric" title="Sum of all active opportunity fees × their confidence percentage"><div class="lbl">Pipeline (wtd) <span style="font-size:9px;color:var(--text3)">(fee × confidence%)</span></div><div class="val purple">${fmtM(oppPipeline)}</div></div>
  </div>
  <div class="section-hdr">By project manager</div>
  <table><thead><tr>
  <th>PM</th>
  <th>Projects</th>
  <th>Total fees <span style="font-size:9px;color:var(--text3);font-weight:400">(all phase fees)</span></th>
  <th>Billed <span style="font-size:9px;color:var(--text3);font-weight:400">(prior + YTD)</span></th>
  <th>Remaining <span style="font-size:9px;color:var(--text3);font-weight:400">(fees − billed)</span></th>
  <th>WIP % <span style="font-size:9px;color:var(--text3);font-weight:400">(billed ÷ fees)</span></th>
  <th>Flags</th>
</tr></thead>
  <tbody>${Object.entries(byPM).sort((a,b)=>b[1].fee-a[1].fee).map(([pm,d])=>{
    const rem=d.fee-d.billed,w=d.fee>0?Math.round(d.billed/d.fee*100):0;
    return`<tr><td style="font-weight:600">${pm}</td><td>${d.count}</td><td>${fmt(d.fee)}</td><td>${fmt(d.billed)}</td><td style="color:var(--text2)">${fmt(rem)}</td><td>${w}%</td><td>${d.flags>0?`<span style="color:var(--flag);font-weight:600">${d.flags} <i class="ti ti-flag-filled" style="font-size:10px"></i></span>`:'—'}</td></tr>`;
  }).join('')}</tbody></table>`;

  // ── PM Utilization / Billing Coverage ──────────────────────────────────────
  const _goal = mGoal();
  const _pmList = pmList();
  const _active = state.projects.filter(p=>!p.archived);
  const _opps = state.opportunities.filter(o=>!o.archived&&o.status!=='04 Won'&&o.status!=='05 Lost');

  // Next 3 months keys (from current month forward)
  const _n3 = Array.from({length:3},(_,i)=>{
    const d=new Date(TODAY.getFullYear(),TODAY.getMonth()+i,1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });

  // Total firm backlog for goal share calculation
  const _tBacklog = _active.reduce((s,p)=>s+pRem(p),0);

  const _pmData = _pmList.map(pm=>{
    const pmProjects = _active.filter(p=>p.pm===pm);
    const backlog = pmProjects.reduce((s,p)=>s+pRem(p),0);

    // Next 3 months allocated - individual months
    const n3Months = _n3.map(mk=>
      pmProjects.reduce((ps,p)=>ps+p.phases.reduce((phs,ph)=>phs+(ph.monthly[mk]||0),0),0)
    );
    const n3Alloc = n3Months.reduce((s,v)=>s+v,0);

    // PM's monthly goal: use individual goal if set, else proportional share
    const pmSettings = state.settings.pms?.find(p=>p.name===pm);
    const pmMonthlyGoal = pmSettings?.monthlyGoal>0 ? pmSettings.monthlyGoal : null;
    const backlogShare = _tBacklog>0?backlog/_tBacklog:1/_pmList.length;
    const n3Goal = pmMonthlyGoal ? pmMonthlyGoal*3 : _goal * 3 * backlogShare;
    const monthlyGoalUsed = pmMonthlyGoal || Math.round(_goal * backlogShare);

    // Coverage % = n3Alloc / n3Goal
    const coverage = n3Goal>0?Math.round(n3Alloc/n3Goal*100):0;
    const coverageCls = coverage>=80?'var(--green)':coverage>=60?'var(--jda-terracotta)':'var(--red)';
    const coverageIcon = coverage>=80?'✓':coverage>=60?'⚡':'⚠️';

    // Weighted pipeline
    const pipeline = _opps.filter(o=>o.pm===pm)
      .reduce((s,o)=>s+Math.round((o.fee||0)*(o.confidence||50)/100),0);

    // Total capacity
    const totalCap = backlog + pipeline;

    // Months of capacity at goal share
    const monthsOfWork = monthlyGoalUsed>0?Math.round(totalCap/monthlyGoalUsed*10)/10:0;

    return {pm, backlog, n3Alloc, n3Months, n3Goal, coverage, coverageCls, coverageIcon, pipeline, totalCap, monthsOfWork, count:pmProjects.length, monthlyGoalUsed, hasCustomGoal:!!pmMonthlyGoal};
  }).filter(d=>d.count>0).sort((a,b)=>b.backlog-a.backlog);

  const utilRows = _pmData.map(d=>`
    <tr>
      <td style="font-weight:700;padding:7px 10px">${d.pm}</td>
      <td style="padding:7px 10px;text-align:right">${fmt(d.backlog)}</td>
      <td style="padding:7px 10px;text-align:right;font-size:11px">
        ${d.hasCustomGoal
          ? `<span style="color:var(--jda-olive);font-weight:600">${fmt(d.monthlyGoalUsed)}</span>`
          : `<span style="color:var(--text3)">${fmt(d.monthlyGoalUsed)} <span style="font-size:9px">(auto)</span></span>`
        }
      </td>
      ${d.n3Months.map(v=>`<td style="padding:7px 10px;text-align:right;${v>0?'font-weight:600':'color:var(--text3)'}">${v>0?fmt(v):'—'}</td>`).join('')}
      <td style="padding:7px 10px;text-align:right;color:var(--text2)">${fmt(Math.round(d.n3Goal))}</td>
      <td style="padding:7px 10px;text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:5px">
          <div style="width:50px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="width:${Math.min(100,d.coverage)}%;height:100%;background:${d.coverageCls};border-radius:3px;transition:width .3s"></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${d.coverageCls};min-width:36px">${d.coverageIcon} ${d.coverage}%</span>
        </div>
      </td>
      <td style="padding:7px 10px;text-align:right;color:var(--purple)">${d.pipeline>0?fmt(d.pipeline):'—'}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:600">${fmt(d.totalCap)}</td>
      <td style="padding:7px 10px;text-align:center">
        <span style="font-size:11px;background:${d.monthsOfWork>=6?'var(--green-bg)':d.monthsOfWork>=3?'#fff3e0':'var(--red-bg)'};color:${d.monthsOfWork>=6?'var(--green)':d.monthsOfWork>=3?'var(--jda-terracotta)':'var(--red)'};padding:2px 8px;border-radius:4px;font-weight:600">
          ${d.monthsOfWork} mo
        </span>
      </td>
    </tr>`).join('');

  const utilSection = `
  <div style="margin-top:16px">
    <div style="font-family:'League Gothic','Nunito Sans',sans-serif;font-size:18px;letter-spacing:.04em;color:var(--jda-black);margin-bottom:4px">PM Billing Coverage</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">
      Coverage = next 3 months allocated vs. proportional billing goal &nbsp;·&nbsp;
      <span style="color:var(--green)">✓ ≥80%</span> &nbsp;
      <span style="color:var(--jda-terracotta)">⚡ 60–80%</span> &nbsp;
      <span style="color:var(--red)">⚠️ &lt;60%</span>
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead>
        <tr style="background:var(--jda-black);color:#F5F5F1">
          <th style="padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em">PM</th>
          <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Remaining contracted fee across all active phases for this PM">Backlog <span style="font-size:9px;color:var(--text3);font-weight:400">(fees − billed)</span></th>
          <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="This PM's monthly billing goal — either set individually in Settings or calculated as their proportional share of the firm goal based on backlog">Mo Goal <span style="font-size:9px;color:var(--text3);font-weight:400">(custom or backlog share)</span></th>
          ${_n3.map(mk=>{const d=new Date(mk+'-01');return`<th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em">${d.toLocaleDateString('en-US',{month:'short'})}</th>`;}).join('')}
          <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Target billing for the next 3 months = monthly goal × 3">3 Mo Goal <span style="font-size:9px;color:var(--text3);font-weight:400">(mo goal × 3)</span></th>
          <th style="padding:7px 10px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Next 3 months allocated ÷ 3-month goal. Green ≥80%, yellow ≥60%, red <60%">Coverage <span style="font-size:9px;color:var(--text3);font-weight:400">(alloc ÷ 3mo goal)</span></th>
          <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Sum of opportunity fees × confidence % for this PM's active opportunities">Pipeline (wtd) <span style="font-size:9px;color:var(--text3);font-weight:400">(fee × conf%)</span></th>
          <th style="padding:7px 10px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Backlog + weighted pipeline = total potential billings">Total Capacity <span style="font-size:9px;color:var(--text3);font-weight:400">(backlog + pipeline)</span></th>
          <th style="padding:7px 10px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.05em" title="Total capacity ÷ monthly goal = how many months of work this PM has at their current goal rate">Months of Work <span style="font-size:9px;color:var(--text3);font-weight:400">(capacity ÷ mo goal)</span></th>
        </tr>
      </thead>
      <tbody style="border:0.5px solid var(--border)">${utilRows}</tbody>
    </table>
    </div>
    <div style="margin-top:8px;font-size:10px;color:var(--text3)">
      Goal share is proportional to each PM's backlog. Pipeline includes active opportunities weighted by confidence. Months of work = total capacity ÷ PM's share of monthly billing goal.
    </div>
  </div>`;
  return pmTable + utilSection;
}

// ── A/R tab ──
function bAR(){
  const open=state.invoices.filter(i=>!i.paid);
  const t={},c={};AR_BUCKETS.forEach(b=>{t[b]=0;c[b]=0;});
  open.forEach(i=>{const b=effBucket(i);t[b]=(t[b]||0)+(i.amount||0);c[b]=(c[b]||0)+1;});
  const tot=Object.values(t).reduce((s,v)=>s+v,0),pd=tot-t['0-30'],paidCt=state.invoices.filter(i=>i.paid).length,flCt=open.filter(i=>i.flag).length;
  // No Commitment vs Commitment totals
  const totNC=open.filter(i=>!i.committed).reduce((s,i)=>s+(i.amount||0),0);
  const totC =open.filter(i=> i.committed).reduce((s,i)=>s+(i.amount||0),0);

  const R=32,cx=44,cy=44,circ=2*Math.PI*R;let off=0;
  const segs=AR_BUCKETS.map(b=>{const p=tot>0?(t[b]||0)/tot:0;const len=p*circ;const s={b,len,off,color:AR_COLORS[b]};off+=len;return s;}).filter(s=>s.len>0);
  const donut=`<svg width="88" height="88" viewBox="0 0 88 88"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--border)" stroke-width="13"/>
    ${segs.map(s=>`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.color}" stroke-width="13" stroke-dasharray="${s.len} ${circ-s.len}" stroke-dashoffset="${-s.off+circ/4}" transform="rotate(-90 ${cx} ${cy})"/>`).join('')}</svg>`;

  let list=state.arPaid?state.invoices.filter(i=>i.paid):open;
  if(state.arFilter==='90plus'){list=list.filter(i=>{const b=effBucket(i);return b==='90-120'||b==='120+';});}
  if(state.arFPM!=='ALL') list=list.filter(i=>i.pm===state.arFPM);
  if(state.arFB!=='ALL') list=list.filter(i=>effBucket(i)===state.arFB);
  if(state.arFlag) list=list.filter(i=>i.flag);
  if(state.arSrch){const q=state.arSrch.toLowerCase();list=list.filter(i=>i.client.toLowerCase().includes(q)||i.project.toLowerCase().includes(q)||i.invoiceNo.includes(q)||(i.pm||'').toLowerCase().includes(q));}
  list.sort((a,b)=>{
    if(state.arSort==='days') return state.arDir*(daysSince(b.invoiceDate)-daysSince(a.invoiceDate));
    if(state.arSort==='amount') return state.arDir*(b.amount-a.amount);
    if(state.arSort==='client') return state.arDir*(a.client<b.client?-1:1);
    if(state.arSort==='pm') return state.arDir*(a.pm||'').localeCompare(b.pm||'');
    if(state.arSort==='status') return state.arDir*(a.status||'').localeCompare(b.status||'');
    return daysSince(b.invoiceDate)-daysSince(a.invoiceDate); // default: oldest first
  });

  let rowsHtml='';
  if(state.arFB==='ALL'&&!state.arPaid&&!state.arSrch&&state.arFPM==='ALL'&&!state.arFlag){
    AR_BUCKETS.forEach(b=>{
      const grp=list.filter(i=>effBucket(i)===b);if(!grp.length)return;
      rowsHtml+=`<tr><td colspan="11" class="ar-section-div">${bLabel(b)} — ${grp.length} invoice${grp.length!==1?'s':''} · ${fmt(t[b]||0)}</td></tr>`;
      rowsHtml+=grp.map(arRow).join('');
    });
  } else rowsHtml=list.length?list.map(arRow).join(''):`<tr><td colspan="11" class="empty-state">No invoices match filters</td></tr>`;

  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px">
    <div style="font-size:15px;font-weight:600">A/R Collections</div>
    <button class="btn btn-primary" id="new-inv"><i class="ti ti-plus" aria-hidden="true"></i> Add invoice</button>
  </div>
  <div class="ar-visual" id="ar-visual-panel" title="Click to view full A/R tab">
    <div class="donut-wrap">${donut}<div class="donut-center"><strong>${fmtK(tot)}</strong>total A/R</div></div>
    <div class="ar-bucket-legend">
      ${AR_BUCKETS.map(b=>{const amt=t[b]||0,cnt=c[b]||0,p=tot>0?Math.round(amt/tot*100):0;
        return`<div class="ar-row${state.arFB===b?' active-filter':''}" data-ar-bucket="${b}">
          <div class="ldot" style="background:${AR_COLORS[b]}"></div>
          <span style="flex:1;color:var(--text2)">${bLabel(b)}</span>
          <span style="font-weight:600">${fmt(amt)}</span>
          <span style="font-size:10px;color:var(--text3);margin-left:3px">${p}%·${cnt}</span>
        </div>`;}).join('')}
    </div>
    <div style="display:flex;gap:20px;margin-left:auto;flex-shrink:0">
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">Past due</div>
        <div style="font-size:17px;font-weight:700;color:var(--red)">${fmt(pd)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:7px;margin-bottom:2px">Current</div>
        <div style="font-size:15px;font-weight:700;color:var(--green)">${fmt(t['0-30']||0)}</div>
      </div>
      <div style="text-align:right;border-left:1px solid var(--border);padding-left:20px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">No Commitment</div>
        <div style="font-size:17px;font-weight:700;color:var(--jda-terra)">${fmt(totNC)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:7px;margin-bottom:2px">Commitment</div>
        <div style="font-size:15px;font-weight:700;color:var(--jda-olive)">${fmt(totC)}</div>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="ar-srch" placeholder="Search…" value="${state.arSrch}" autocomplete="off">
    <select id="ar-pm"><option value="ALL">All PMs</option>${pmList().map(p=>`<option${state.arFPM===p?' selected':''}>${p}</option>`).join('')}</select>
    <select id="ar-bucket"><option value="ALL">All buckets</option>${AR_BUCKETS.map(b=>`<option value="${b}"${state.arFB===b?' selected':''}>${bLabel(b)}</option>`).join('')}</select>
    <button class="btn${state.arFlag?' btn-active':''}" id="ar-flag-btn" style="color:${state.arFlag?'var(--flag)':'inherit'}"><i class="ti ${state.arFlag?'ti-flag-filled':'ti-flag'}" aria-hidden="true"></i>${flCt>0?' '+flCt:''}</button>
    <button class="btn${state.arPaid?' btn-active':''}" id="ar-paid-btn">${state.arPaid?'Hide paid':`Paid (${paidCt})`}</button>
    ${state.arFilter==='90plus'?`<button class="btn btn-sm" id="clear-ar-filter" style="color:var(--red);border-color:var(--red)"><i class="ti ti-filter-off"></i> 90+ only — Clear</button>`:''}
  </div>
  <div style="overflow-x:auto"><table>
    <thead><tr>

// ── Dashboard ──
function bDashboard(){
  const curYear=TODAY.getFullYear();
  const curMonth=TODAY.getMonth()+1; // 1-based, current in-progress month
  const hourlyData=state.settings.billing.hourlyByMonth||{};
  const mGoalFor=mk=>(state.settings.billing.monthlyGoals||{})[mk]||mGoal();

  // YTD actuals: sum of phase monthly amounts for completed months of current year
  // Phase monthly $ = what was actually billed that month (from project tracker)
  // Plus manual hourly/reimbursable entries
  const BILLING_YTD = [];
  for(let m=1;m<curMonth;m++){
    const mk=`${curYear}-${String(m).padStart(2,'0')}`;
    const ff=mTotalAll(mk);  // include done phases - they were billed
    const hourly=hourlyData[mk]||0;
    const gross=ff+hourly;
    const goal=mGoalFor(mk);
    BILLING_YTD.push({m,mk,ff,hourly,gross,goal});
  }

  // Full year month list for the billing chart (all 12 months)
  const BILLING_YEAR = [];
  for(let m=1;m<=12;m++){
    const mk=`${curYear}-${String(m).padStart(2,'0')}`;
    const isPast=m<curMonth;
    const ff=isPast?mTotalAll(mk):0;  // past months include done phases
    const hourly=isPast?(hourlyData[mk]||0):0;
    const gross=ff+hourly;
    const goal=mGoalFor(mk);
    // Show future month allocations as projected (not zero) for the bar chart
    const projFF=!isPast?mTotal(mk):0;  // future months: planning only (exclude done)
    const projHourly=!isPast?(hourlyData[mk]||0):0;
    BILLING_YEAR.push({m,mk,ff,hourly,gross,goal,isPast,projFF,projHourly});
  }

  const active=state.projects.filter(p=>!p.archived);
  const tF=active.reduce((s,p)=>s+pFee(p),0),tB=active.reduce((s,p)=>s+pBil(p),0);
  const _cy2=new Date().getFullYear(),_cm2=new Date().getMonth()+1;
  const tYTD2=Array.from({length:_cm2-1},(_,i)=>mTotalAll(`${_cy2}-${String(i+1).padStart(2,'0')}`)).reduce((s,v)=>s+v,0);
  const tR=tF-tB-tYTD2; // fee - prior billed - current-year YTD
  const fWIP=tF>0?(tB+tYTD2)/tF:0;
  const annualGoal=state.settings.billing.annualGoal||4740000;
  const monthlyGoal=mGoal();
  const ytdFF=BILLING_YTD.reduce((s,r)=>s+r.ff,0);
  const ytdHourly=BILLING_YTD.reduce((s,r)=>s+r.hourly,0);
  const ytdGross=BILLING_YTD.reduce((s,r)=>s+r.gross,0);
  const ytdGoal=BILLING_YTD.reduce((s,r)=>s+r.goal,0);
  const ytdN=BILLING_YTD.length;
  const avgMG=ytdN?ytdGross/ytdN:0;

  // Backlog: remaining contracted fee / monthly billing goal
  const effAvgMG = monthlyGoal;  // use goal as denominator per firm preference
  const usingFallback = false;

  // Backlog calculations
  const contractedBacklogMo=effAvgMG>0?tR/effAvgMG:0;
  const activeOpps=state.opportunities.filter(o=>!o.archived&&o.status!=='04 Won'&&o.status!=='05 Lost');
  const pipelineWtd=activeOpps.reduce((s,o)=>s+(o.fee||0)*((o.confidence||50)/100),0);
  const combinedBacklogMo=effAvgMG>0?(tR+pipelineWtd)/effAvgMG:0;

  // Projected full-year: YTD actual + forward allocations for remaining months of current year

      ${cSvg}
      <div style="display:flex;gap:9px;margin-top:5px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)"><div style="width:13px;border-top:2px dashed #3b82f6"></div> Goal</div>

// ── Alloc panel ──
function allocPanel(p,ph){
  const as=phAllocSt(ph),rem=phRem(ph),at=phAlloc(ph),pu=rem>0?(at/rem*100):100;
  const sa=state.allocShowAll[ph.id];
  const curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const vm=MONTHS.filter(m=>sa||(ph.monthly[m.key]||0)>0||m.key===curMk);
  const hc=MONTHS.length-vm.length;
  const bw=Math.min(100,Math.round(pu));
  const bc=as.cls==='ok'?'var(--green)':as.cls==='over'?'var(--red)':'var(--orange)';
  const chips=vm.map(m=>{
    const monthVal=ph.monthly[m.key]||0;
    const isPastMo=m.key<curMk;
    // Always use total fee as denominator so all months add up to 100%
    const denom=ph.fee||0;
    const pc=denom>0?Math.round(monthVal/denom*1000)/10:0;
    return`<div class="month-chip${pc>0?' has-value':''}">
      <div class="mc-label">${m.label}</div>
      <div style="display:flex;align-items:center;gap:3px">
        ${isPastMo&&!state.allocEditPast?.[ph.id]
          ? `<span style="font-size:12px;color:var(--text3);min-width:52px;text-align:right;display:inline-block;padding:1px 4px">${pc}%</span>`
          : `<input type="number" min="0" max="100" step="5" value="${pc}" data-alloc-proj="${p.id}" data-alloc-phase="${ph.id}" data-alloc-month="${m.key}" style="width:52px">`}
        <span style="font-size:10px;color:var(--text2)">%</span>
      </div>
      <div class="mc-dollar">${fmt(ph.monthly[m.key]||0)}</div>
    </div>`;}).join('');
    // CA phases: flat monthly rate UI
  if(ph.scope==='CA'){
    const caEst=phCAEst(ph);
    const curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
    const caMonths=MONTHS.filter(m=>m.key>=curMk||(ph.monthly[m.key]||0)>0);
    return`<div class="alloc-panel" id="alloc-panel-${ph.id}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-weight:600">${ph.name}</span>
        <span style="font-size:10px;background:#f0ede6;color:var(--jda-olive);padding:1px 6px;border-radius:4px;font-weight:600">CA $/MO</span>
        <span style="font-size:11px;color:var(--text2)">Rate: <strong>${fmt(ph.fee)}/mo</strong> · Est. ${ph.caMonths||12} mo · Est. total: <strong>${fmt(caEst)}</strong></span>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Click months below to toggle billing at the monthly rate.</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${caMonths.map(m=>{
          const active=(ph.monthly[m.key]||0)>0;
          return`<div style="border:0.5px solid ${active?'var(--jda-terracotta)':'var(--border)'};border-radius:6px;padding:6px 10px;background:${active?'#fdf5f0':'var(--bg2)'};cursor:pointer;font-size:11px;text-align:center;min-width:56px" data-ca-toggle-month="${p.id}" data-ca-ph="${ph.id}" data-ca-mk="${m.key}">
            <div style="font-weight:600;color:var(--text2)">${m.label}</div>
            <div style="color:${active?'var(--jda-terracotta)':'var(--text3)'};font-size:10px">${active?fmt(ph.fee):'—'}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:6px;padding-top:8px;border-top:0.5px solid var(--border)">
        <button class="btn btn-sm btn-primary" data-alloc-save="${p.id}" data-alloc-phase="${ph.id}"><i class="ti ti-device-floppy"></i> Save</button>
      </div>
    </div>`;
  }
  return`<div class="alloc-panel">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600">${ph.name}</span>
      <span class="alloc-status ${as.cls}">${as.txt}</span>
      <span style="font-size:11px;color:var(--text2)">${ph.hourly?'NTE Budget':'Remaining'}: <strong>${fmt(rem)}</strong></span>
      ${ph.hourly?`<span style="font-size:10px;background:#f0ede6;color:var(--jda-olive);padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:600">HOURLY NTE</span>`:''}
    </div>
    <div style="height:5px;border-radius:3px;background:var(--border);margin-bottom:9px">
      <div style="height:100%;width:${bw}%;border-radius:3px;background:${bc};transition:width .3s"></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${chips}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:0.5px solid var(--border);align-items:center">
      <button class="btn btn-sm" data-alloc-even="${p.id}" data-alloc-phase="${ph.id}">Split evenly</button>
      <button class="btn btn-sm" data-alloc-clear="${p.id}" data-alloc-phase="${ph.id}">Clear</button>
      <button class="btn btn-sm" style="color:var(--text2);border:none;background:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px" data-toggle-months="${ph.id}">${sa?'Hide empty':'Show all'+(hc>0?' (+'+hc+')':'')}</button>
      <button class="btn btn-sm${state.allocEditPast?.[ph.id]?' btn-active':''}" data-toggle-edit-past="${ph.id}" style="color:${state.allocEditPast?.[ph.id]?'var(--jda-terracotta)':'var(--text3)'}"><i class="ti ti-lock-open-2"></i> ${state.allocEditPast?.[ph.id]?'Lock past':'Edit past'}</button>
      <label style="display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;margin-left:8px" title="Mark as hourly not-to-exceed task — tracks budget consumption vs NTE cap">
        <input type="checkbox" id="ph-hourly-${ph.id}" ${ph.hourly?'checked':''} data-ph-hourly="${ph.id}" data-proj-id="${p.id}">
        <span style="color:var(--jda-olive);font-weight:600">Hourly NTE</span>
      </label>
      <button class="btn btn-sm btn-primary" data-alloc-save="${p.id}" data-alloc-phase="${ph.id}" style="margin-left:auto"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save</button>
    </div>
  </div>`;
}

// ── Project form ──
function buildProjForm(ex){
  const d=ex||{pm:pmList()[0]||'AJ',projNo:'',client:'',project:'',type:'SFD',location:'CA',status:'U',flag:false,notes:''};
  const phases=ex?ex.phases.map(ph=>({...ph,monthly:{...ph.monthly}})):[{id:null,name:'',scope:'SD',fee:0,billed:0,pct:0,done:false,flag:false,archived:false,monthly:blankMonthly()}];
  window._fp=phases;window._fex=ex||null;
  const sOpts=scopeList().map(s=>`<option value="${s.code}">${s.code} — ${s.label}</option>`).join('');
  const ptOpts=ptList().map(t=>`<option value="${t.code}"${d.type===t.code?' selected':''}>${t.code}</option>`).join('');
  const pmOpts=pmList().map(p=>`<option${d.pm===p?' selected':''}>${p}</option>`).join('');
  const stOpts=stList().map(s=>`<option value="${s.code}"${d.status===s.code?' selected':''}>${s.code} — ${s.label}</option>`).join('');
  return`<div class="modal">
    <div class="modal-title">${ex?'Edit project':'New project'}<button class="btn btn-sm" id="m-close"><i class="ti ti-x"></i></button></div>
    <div class="form-grid">
      <div class="field"><label>PM</label><select id="m-pm">${pmOpts}</select></div>
      <div class="field"><label>Project #</label><input id="m-projno" value="${d.projNo||''}"></div>
      <div class="field full"><label>Client</label>
        <select id="m-client">
          <option value="">— Select client —</option>
          ${(()=>{
            // Use Settings clients list; fall back to unique clients from projects
            let cl=activeClients();
            if(!cl.length){
              const rawClients=[...new Set(state.projects.filter(p=>!p.archived).map(p=>p.client).filter(c=>c&&!c.startsWith('ADD')))].sort();
              cl=rawClients.map((name,i)=>({id:i+1,name,parent:null,active:true}));
            }
            const par=cl.filter(c=>!c.parent);
            const chi=cl.filter(c=>c.parent);
            let o='';
            // Always show current value as selected even if not in list
            const curVal=d.client||'';
            const inList=cl.find(c=>c.name===curVal);
            if(curVal&&!inList) o+='<option value="'+curVal+'" selected>'+curVal+'</option>';
            par.forEach(p=>{
              const kids=chi.filter(k=>k.parent===p.id||k.parent===p.name);
              if(kids.length){
                o+='<optgroup label="'+p.name+'">';
                o+='<option value="'+p.name+'"'+(curVal===p.name?' selected':'')+'>'+p.name+' (Corporate)</option>';
                kids.forEach(k=>{o+='<option value="'+k.name+'"'+(curVal===k.name?' selected':'')+'>↳ '+k.name+'</option>';});
                o+='</optgroup>';
              } else {
                o+='<option value="'+p.name+'"'+(curVal===p.name?' selected':'')+'>'+p.name+'</option>';
              }
            });
            chi.filter(k=>!par.find(p=>p.id===k.parent||p.name===k.parent)).forEach(k=>{
              o+='<option value="'+k.name+'"'+(curVal===k.name?' selected':'')+'>'+k.name+'</option>';
            });
            o+='<option value="__new__">+ Add new client…</option>';
            return o;
          })()}
        </select>
        <input type="text" id="m-client-new" placeholder="Enter new client name" style="display:none;margin-top:5px">
      </div>
      <div class="field full"><label>Project name</label><input id="m-project" value="${d.project||''}"></div>
      <div class="field"><label>Project type</label>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="m-type" style="flex:1">${ptOpts}</select>
          <button type="button" id="btn-add-type" class="btn btn-sm" title="Add new project type" style="white-space:nowrap;padding:4px 8px"><i class="ti ti-plus"></i> New type</button>
        </div></div>
      <div class="field"><label>Location</label><input id="m-loc" value="${d.location||'CA'}" style="width:60px"></div>
      <div class="field"><label>Status</label><select id="m-status">${stOpts}</select></div>
      <div class="field" style="justify-content:flex-end;padding-bottom:2px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="m-flag"${d.flag?' checked':''}> Follow-up flag</label></div>
      <div class="field full"><label>Notes</label><textarea id="m-notes" style="height:48px;resize:vertical">${d.notes||''}</textarea></div>
    </div>
    <div style="margin-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <div style="font-size:13px;font-weight:600">Phases / scope items</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:12px;background:var(--bg2);padding:3px 9px;border-radius:6px">Total: <strong id="ph-total">${fmt(phases.reduce((s,ph)=>s+(ph.fee||0),0))}</strong></div>
          ${!ex?`<select id="ph-template-sel" style="font-size:11px;padding:3px 7px;border-radius:6px;border:0.5px solid var(--border)">
            <option value="">— Apply template —</option>
            ${(state.settings.phaseTemplates||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
          <button class="btn btn-sm" id="ph-apply-template" style="font-size:11px"><i class="ti ti-layout-grid"></i> Apply</button>`:''}
          ${ex?`<select id="ph-template-sel" style="font-size:11px;padding:3px 7px;border-radius:6px;border:0.5px solid var(--border)">
            <option value="">— Add from template —</option>
            ${(state.settings.phaseTemplates||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
          <button class="btn btn-sm" id="ph-apply-template" style="font-size:11px"><i class="ti ti-layout-grid"></i> Add phases</button>`:''}
        </div>
      </div>
      <div id="ph-cards">${phases.map((ph,i)=>buildPhCard(ph,i,sOpts)).join('')}</div>
      <button class="add-phase-btn" id="add-ph-btn"><i class="ti ti-plus"></i> Add another phase</button>
    </div>
    <div class="modal-footer">
      ${ex?`<button class="btn btn-danger" id="m-arch" style="margin-right:auto"><i class="ti ti-archive${ex.archived?'-off':''}"></i> ${ex.archived?'Restore project':'Archive project'}</button>`:''}
      <button class="btn" id="m-cancel">Cancel</button>
      <button class="btn btn-primary" id="m-save"><i class="ti ti-device-floppy"></i> Save project</button>
    </div>
  </div>`;
}

function buildPhCard(ph,i,sOpts){
  const caEst=ph.scope==='CA'?(ph.fee||0)*(ph.caMonths||12):0;
  const feeBase=ph.scope==='CA'?caEst:(ph.fee||0);
  const rem=Math.max(0,feeBase-(ph.billed||0));
  const sa=state.allocShowAll['form-'+(ph.id||'new-'+i)];
  const curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const vm=MONTHS.filter(m=>sa||(ph.monthly[m.key]||0)>0||m.key===curMk);
  const hc=MONTHS.length-vm.length;
  const so=sOpts||scopeList().map(s=>`<option value="${s.code}">${s.code} — ${s.label}</option>`).join('');
  const chips=vm.map(m=>{
    const monthVal=ph.monthly[m.key]||0;
    const isPastMo=m.key<curMk;
    // Always use total fee as denominator so all months add up to 100%
    const denom=ph.fee||0;
    const pc=denom>0?Math.round(monthVal/denom*1000)/10:0;
    return`<div class="month-chip${pc>0?' has-value':''}">
      <div class="mc-label">${m.label}</div>
      <div style="display:flex;align-items:center;gap:3px"><input type="number" min="0" max="100" step="5" value="${pc}" class="form-mo-pct" data-fi="${i}" data-mk="${m.key}" style="width:52px"><span style="font-size:10px;color:var(--text2)">%</span></div>
      <div class="mc-dollar" id="fmd-${i}-${m.key}">${fmt(ph.monthly[m.key]||0)}</div>
    </div>`;}).join('');
  return`<div class="phase-card" id="ph-card-${i}" data-card-fi="${i}">
    <div class="ph-num">Phase ${i+1}</div>
    <div class="phase-card-top">
      <div class="field"><label>Description</label><input type="text" class="ph-name" data-fi="${i}" value="${ph.name||''}"></div>
      <div class="field"><label>Scope type</label><select class="ph-scope" data-fi="${i}">${so.replace(`value="${ph.scope}"`,`value="${ph.scope}" selected`)}</select></div>
      <div class="ca-rate-row" style="grid-column:1/-1;margin-top:4px;${ph.scope!=='CA'?'display:none':''}">
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">CA Monthly rate &amp; duration</label>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <input type="number" class="ph-fee" data-fi="${i}" value="${ph.fee||0}" min="0" step="100" placeholder="$/mo" style="flex:1;min-width:100px">
          <span style="font-size:12px;color:var(--text2)">×</span>
          <input type="number" class="ph-camonths" data-fi="${i}" value="${ph.caMonths||12}" min="1" max="120" step="1" style="width:70px" placeholder="mo">
          <span style="font-size:12px;color:var(--text2)">months</span>
          <span class="ca-est-total" data-fi="${i}" style="font-size:12px;font-weight:700;color:var(--jda-olive);white-space:nowrap">= ${fmt((ph.fee||0)*(ph.caMonths||12))} est.</span>
        </div>
      </div>
      <div class="fixed-fee-row" style="${ph.scope==='CA'?'display:none':''}">
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Contract fee ($)</label>
        <input type="number" class="ph-fee-fixed" data-fi="${i}" value="${ph.fee||0}" min="0" step="500" style="width:100%">
      </div>
      <button class="remove-ph" data-rph="${i}"><i class="ti ti-x"></i></button>
    </div>
    <div class="phase-card-mid">
      <div class="field"><label>Billed to date ($)</label><input type="number" class="ph-billed" data-fi="${i}" value="${ph.billed||0}" min="0" step="500"></div>
      <div class="field"><label>% complete</label>
        ${ph.scope==='CA'
          ? `<input type="text" class="ph-pct" data-fi="${i}" value="${feeBase>0?Math.round((ph.billed||0)/feeBase*100):0}%" readonly style="background:var(--bg2);color:var(--text2)">`
          : `<input type="number" class="ph-pct" data-fi="${i}" value="${ph.pct||0}" min="0" max="100" step="5">`
        }
      </div>
      <div class="field"><label>Remaining</label><input type="text" class="ph-rem" data-fi="${i}" value="${fmt(rem)}" readonly style="background:var(--bg2);color:var(--text2)"></div>
    </div>
    <div style="margin-top:7px;padding-top:7px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="ph-is-addendum" data-fi="${i}" ${ph.addendum?'checked':''} style="cursor:pointer">
        This phase is part of an addendum
      </label>
      <div class="ph-addendum-name-wrap" style="display:${ph.addendum?'flex':'none'};align-items:center;gap:5px;flex:1">
        <span style="font-size:11px;color:var(--text2)">Addendum:</span>
        <input type="text" class="ph-addendum-name" data-fi="${i}" value="${ph.addendum||''}" placeholder="e.g. ADD #1: New Plan" style="flex:1;font-size:12px">
        <button class="btn btn-sm" data-autofill-add="${i}" style="font-size:10px;color:var(--jda-terracotta)" title="Auto-number">Auto</button>
      </div>
