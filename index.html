function syncFP(){
  document.querySelectorAll('.ph-name').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].name=el.value;});
  document.querySelectorAll('.ph-scope').forEach(el=>{
    const i=+el.dataset.fi;if(window._fp[i])window._fp[i].scope=el.value;
  });
  document.querySelectorAll('.ph-fee').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].fee=parseFloat(el.value)||0;});
  document.querySelectorAll('.ph-camonths').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].caMonths=parseInt(el.value)||12;});
  document.querySelectorAll('.ph-billed').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].billed=parseFloat(el.value)||0;});
  document.querySelectorAll('.ph-pct').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].pct=parseInt(el.value)||0;});
  document.querySelectorAll('.ph-addendum-name').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i])window._fp[i].addendum=el.value.trim()||null;});
  document.querySelectorAll('.ph-is-addendum').forEach(el=>{const i=+el.dataset.fi;if(window._fp[i]&&!el.checked)window._fp[i].addendum=null;});
  // Template apply handler
  document.getElementById('ph-apply-template')?.addEventListener('click',()=>{
    const sel=document.getElementById('ph-template-sel');
    const tid=+sel?.value;
    if(!tid) return;
    const tmpl=(state.settings.phaseTemplates||[]).find(t=>t.id===tid);
    if(!tmpl) return;
    const totalFee=parseFloat(document.querySelector('.ph-fee[data-fi="0"]')?.value)||0;
    const newPhases=tmpl.phases.map((tp,i)=>({
      id:null,
      name:tp.name,
      scope:tp.scope,
      addendum:null,
      hourly:false,
      fee:totalFee>0?Math.round(totalFee*tp.pct/100):0,
      billed:0,
      pct:0,
      done:false,
      flag:false,
      archived:false,
      monthly:blankMonthly()
    }));
    if(window._fex){
      // Existing project: append phases
      newPhases.forEach(ph=>window._fp.push(ph));
    } else {
      // New project: replace phases
      window._fp=newPhases;
    }
    // Set project type from template if new project
    if(!window._fex){
      const typeEl=document.getElementById('m-type');
      if(typeEl) typeEl.value=tmpl.type;
    }
    rebuildCards();
    sel.value='';
  });

  document.querySelectorAll('.form-mo-pct').forEach(el=>{const i=+el.dataset.fi,mk=el.dataset.mk,pc=parseFloat(el.value)||0;if(window._fp[i]){const denom=window._fp[i].fee||0;window._fp[i].monthly[mk]=Math.round(denom*pc/100*100)/100;}});
}
function rebuildCards(){syncFP();const so=scopeList().map(s=>`<option value="${s.code}">${s.code} — ${s.label}</option>`).join('');document.getElementById('ph-cards').innerHTML=window._fp.map((ph,i)=>buildPhCard(ph,i,so)).join('');attachFPEvents();updFPTotal();}
function updFPTotal(){const el=document.getElementById('ph-total');if(el)el.textContent=fmt(window._fp.reduce((s,ph)=>s+(ph.fee||0),0));}
function applyCAScopeUI(i, scope){
  const card = document.querySelector(`.phase-card[data-card-fi="${i}"]`) ||
               document.querySelectorAll('.phase-card')[i];
  if(!card) return;
  const isCA = scope === 'CA';
  // Show/hide CA rate row
  const caRow = card.querySelector('.ca-rate-row');
  if(caRow) caRow.style.display = isCA ? '' : 'none';
  // Show/hide fee row
  const feeRow = card.querySelector('.fixed-fee-row');
  if(feeRow) feeRow.style.display = isCA ? 'none' : '';
  // Show/hide alloc section
  const allocSection = card.querySelector('.alloc-section');
  if(allocSection) allocSection.style.display = isCA ? 'none' : '';
  // Show/hide CA info note
  const caNote = card.querySelector('.ca-note');
  if(caNote) caNote.style.display = isCA ? '' : 'none';
}
function attachFPEvents(){
  document.querySelectorAll('.ph-fee,.ph-fee-fixed,.ph-billed,.ph-camonths').forEach(el=>{
    el.addEventListener('input',()=>{
      const i=+el.dataset.fi;
      const card=document.querySelector(`[data-card-fi="${i}"]`);
      const scopeEl=card?.querySelector('.ph-scope');
      const isCA=scopeEl?.value==='CA';
      const feeEl=card?.querySelector('.ph-fee');
      const feeFixedEl=card?.querySelector('.ph-fee-fixed');
      const moEl=card?.querySelector('.ph-camonths');
      const billedEl=card?.querySelector('.ph-billed');
      const remEl=card?.querySelector('.ph-rem');
      const pctEl=card?.querySelector('.ph-pct');
      const estEl=card?.querySelector('.ca-est-total');
      const noteEl=card?.querySelector('.ca-note');
      if(isCA){
        const rate=parseFloat(feeEl?.value)||0;
        const months=parseInt(moEl?.value)||12;
        const billed=parseFloat(billedEl?.value)||0;
        const est=rate*months;
        const rem=Math.max(0,est-billed);
        const pct=est>0?Math.round(billed/est*100):0;
        if(remEl) remEl.value=fmt(rem);
        if(pctEl) pctEl.value=pct+'%';
        if(estEl) estEl.textContent=`= ${fmt(est)} est.`;
        if(noteEl) noteEl.innerHTML=`<i class="ti ti-info-circle"></i> CA phases bill at <strong>${fmt(rate)}/mo</strong> × <strong>${months} months</strong> = <strong>${fmt(est)} est.</strong>`;
      } else {
        const f=parseFloat(feeFixedEl?.value||feeEl?.value)||0;
        const b=parseFloat(billedEl?.value)||0;
        if(remEl) remEl.value=fmt(f-b);
      }
      updFPTotal();
    });
  });
  // Template apply handler
  document.getElementById('ph-apply-template')?.addEventListener('click',()=>{
    const sel=document.getElementById('ph-template-sel');
    const tid=+sel?.value;
    if(!tid) return;
    const tmpl=(state.settings.phaseTemplates||[]).find(t=>t.id===tid);
    if(!tmpl) return;
    const totalFee=parseFloat(document.querySelector('.ph-fee[data-fi="0"]')?.value)||0;
    const newPhases=tmpl.phases.map((tp,i)=>({
      id:null,
      name:tp.name,
      scope:tp.scope,
      addendum:null,
      hourly:false,
      fee:totalFee>0?Math.round(totalFee*tp.pct/100):0,
      billed:0,
      pct:0,
      done:false,
      flag:false,
      archived:false,
      monthly:blankMonthly()
    }));
    if(window._fex){
      // Existing project: append phases
      newPhases.forEach(ph=>window._fp.push(ph));
    } else {
      // New project: replace phases
      window._fp=newPhases;
    }
    // Set project type from template if new project
    if(!window._fex){
      const typeEl=document.getElementById('m-type');
      if(typeEl) typeEl.value=tmpl.type;
    }
    rebuildCards();
    sel.value='';
  });

  document.querySelectorAll('.form-mo-pct').forEach(el=>{el.addEventListener('input',()=>{const i=+el.dataset.fi,mk=el.dataset.mk,pc=parseFloat(el.value)||0;const f=parseFloat(document.querySelector(`.ph-fee[data-fi="${i}"]`)?.value)||0,b=parseFloat(document.querySelector(`.ph-billed[data-fi="${i}"]`)?.value)||0;const d=Math.round(f*pc/100);if(window._fp[i])window._fp[i].monthly[mk]=d;const dol=document.getElementById(`fmd-${i}-${mk}`);if(dol)dol.textContent=fmt(d);});});
  document.querySelectorAll('[data-rph]').forEach(el=>{el.addEventListener('click',()=>{if(window._fp.length<=1)return;syncFP();window._fp.splice(+el.dataset.rph,1);rebuildCards();});});
  document.querySelectorAll('[data-form-even]').forEach(el=>{el.addEventListener('click',()=>{syncFP();const i=+el.dataset.formEven,ph=window._fp[i];if(!ph)return;const r=(ph.fee||0)-(ph.billed||0);if(r<=0)return;
    showSplitDialog(r,(startMk,endMk)=>{
      const idxS=MONTHS.findIndex(m=>m.key===startMk),idxE=MONTHS.findIndex(m=>m.key===endMk);
      if(idxS<0||idxE<0||idxE<idxS)return;
      const vk=MONTHS.slice(idxS,idxE+1).map(m=>m.key);
      const e=Math.round(r/vk.length*100)/100;
      MONTHS.forEach(m=>ph.monthly[m.key]=0);vk.forEach(mk=>ph.monthly[mk]=e);
      rebuildCards();
    });
  });});
  document.querySelectorAll('[data-form-clear]').forEach(el=>{el.addEventListener('click',()=>{const i=+el.dataset.formClear,ph=window._fp[i];if(!ph)return;Object.keys(ph.monthly).forEach(k=>ph.monthly[k]=0);rebuildCards();});});
  document.querySelectorAll('[data-form-del]').forEach(el=>{el.addEventListener('click',()=>{
    const i=+el.dataset.formDel;
    if(window._fp.length<=1){alert('A project must have at least one phase.');return;}
    window._fp.splice(i,1);
    rebuildCards();
  });});
  // Also handle data-form-opp-clear (same as form-clear, for convert form)
  document.querySelectorAll('[data-form-opp-clear]').forEach(el=>{el.addEventListener('click',()=>{const i=+el.dataset.formOppClear,ph=window._fp[i];if(!ph)return;Object.keys(ph.monthly).forEach(k=>ph.monthly[k]=0);rebuildCards();});});
  document.querySelectorAll('[data-form-toggle]').forEach(el=>{el.addEventListener('click',()=>{const k=el.dataset.formToggle;state.allocShowAll['form-'+k]=!state.allocShowAll['form-'+k];rebuildCards();});});
  // Auto-fill phase name from scope when scope changes and name is blank
  document.querySelectorAll('.ph-scope').forEach(el=>{
    el.addEventListener('change',()=>{
      const i=+el.dataset.fi;
      const nameEl=document.querySelector(`.ph-name[data-fi="${i}"]`);
      if(nameEl&&!nameEl.value.trim()){
        const scopeLabel=scopeList().find(s=>s.code===el.value)?.label||el.value;
        nameEl.value=scopeLabel;
        if(window._fp[i]) window._fp[i].name=scopeLabel;
        updFPTotal();
      }
      // Toggle CA vs fixed-fee UI based on scope
      applyCAScopeUI(i, el.value);
    });
    // Trigger on initial load if scope is set but name is empty
    (() => {
      const i=+el.dataset.fi;
      const nameEl=document.querySelector(`.ph-name[data-fi="${i}"]`);
      if(nameEl&&!nameEl.value.trim()&&el.value){
        const scopeLabel=scopeList().find(s=>s.code===el.value)?.label||el.value;
        nameEl.value=scopeLabel;
        if(window._fp[i]) window._fp[i].name=scopeLabel;
        updFPTotal();
      }
    })();
  });
  document.querySelectorAll('.ph-is-addendum').forEach(el=>{el.addEventListener('change',()=>{
    const wrap=el.closest('.phase-card')?.querySelector('.ph-addendum-name-wrap');
    if(wrap) wrap.style.display=el.checked?'flex':'none';
    if(!el.checked){const i=+el.dataset.fi;if(window._fp[i])window._fp[i].addendum=null;}
  });});
  document.querySelectorAll('[data-autofill-add]').forEach(el=>{el.addEventListener('click',()=>{
    syncFP();
    const i=+el.dataset.autofillAdd;
    // Find highest existing addendum number in this project
    const existingAdds=window._fp.map(ph=>ph.addendum).filter(Boolean);
    const nums=existingAdds.map(a=>{const m=a.match(/ADD #(\d+)/i);return m?+m[1]:0;});
    const nextNum=(nums.length?Math.max(...nums):0)+1;
    const nameInp=el.closest('.ph-addendum-name-wrap')?.querySelector('.ph-addendum-name');
    if(nameInp&&!nameInp.value.trim()) nameInp.value='ADD #'+nextNum+': ';
    nameInp?.focus();
    // Move cursor to end
    const v=nameInp?.value;if(nameInp){nameInp.value='';nameInp.value=v;}
    if(window._fp[i])window._fp[i].addendum=nameInp?.value.trim()||null;
  });});
}

// ── Combine checked PM emails with freeform "other recipients" ──
function getDigestRecipients(){
  const pmEmails=[...document.querySelectorAll('.digest-pm-recip:checked')].map(el=>el.value.trim()).filter(Boolean);
  const extras=(document.getElementById('digest-recipients')?.value||'').split('\n').map(e=>e.trim()).filter(Boolean);
  return[...new Set([...pmEmails,...extras])];
}

function syncSettingsFromDOM(){
  const s=state.settings;
  s.pms=[];document.querySelectorAll('#pm-list .slist-item').forEach(el=>{const id=+el.dataset.pmId,init=el.querySelector('.pm-init')?.value.trim(),full=el.querySelector('.pm-full')?.value.trim(),goal=parseFloat(el.querySelector('.pm-goal')?.value)||0,email=el.querySelector('.pm-email')?.value.trim()||'';if(init)s.pms.push({id,name:init,fullName:full||init,monthlyGoal:goal,email});});
  s.scopeTypes=[];document.querySelectorAll('#scope-list .sscope-item').forEach(el=>{const id=+el.dataset.scId,code=el.querySelector('.sc-code')?.value.trim(),label=el.querySelector('.sc-label')?.value.trim();if(code)s.scopeTypes.push({id,code,label:label||code});});
  s.projectTypes=[];document.querySelectorAll('#pt-list .sscope-item').forEach(el=>{const id=+el.dataset.ptId,code=el.querySelector('.pt-code')?.value.trim(),label=el.querySelector('.pt-label')?.value.trim();if(code)s.projectTypes.push({id,code,label:label||code});});
  s.statusTypes=[];document.querySelectorAll('#st-list .sstatus-item').forEach(el=>{const id=+el.dataset.stId,code=el.querySelector('.st-code')?.value.trim(),label=el.querySelector('.st-label')?.value.trim(),color=el.querySelector('.st-color')?.value;if(code)s.statusTypes.push({id,code,label:label||code,color:color||'#1a1a1a'});});
  // Aliases
  s.clientAliases=[];document.querySelectorAll('#alias-list .salias-item').forEach(el=>{const id=+el.dataset.aliasId;const name=el.querySelector('.alias-name')?.value.trim();const chips=[...el.querySelectorAll('.salias-chip')].map(c=>c.textContent.replace('×','').trim()).filter(Boolean);if(name)s.clientAliases.push({id,displayName:name,matches:chips});});
    // Email digest settings
  if(!s.firm) s.firm={};
  const _digest = s.firm.digest || {};
  s.firm = {
    name: document.getElementById('s-firmname')?.value.trim()||'JD+A',
    fullName: document.getElementById('s-firmfull')?.value.trim()||'JD+A Architecture',
    reportTime:'09:00', reportRecipients:[],
    digest: {
      ..._digest,
      enabled: document.getElementById('digest-enabled')?.checked ?? true,
      time: document.getElementById('digest-time')?.value || '09:00',
      days: [...document.querySelectorAll('.digest-day:checked')].map(el=>el.value),
      recipients: getDigestRecipients(),
      sections: {
        billing: document.getElementById('digest-sec-billing')?.checked ?? true,
        ar: document.getElementById('digest-sec-ar')?.checked ?? true,
        flagged: document.getElementById('digest-sec-flagged')?.checked ?? true,
        pipeline: document.getElementById('digest-sec-pipeline')?.checked ?? true,
      },
      projReminder: {
        enabled:          document.getElementById('proj-reminder-enabled')?.checked ?? false,
        cadence:          document.getElementById('proj-reminder-cadence')?.value || 'weekly',
        day:              parseInt(document.getElementById('proj-reminder-day')?.value || '1'),
        summaryRecipients: [
          ...[...document.querySelectorAll('.proj-summary-pm-recip:checked')].map(el=>el.value.trim()),
          ...(document.getElementById('proj-summary-recipients')?.value||'').split('\n').map(e=>e.trim()).filter(Boolean),
        ].filter((v,i,a)=>v&&a.indexOf(v)===i), // dedupe
      }
    }
  };
  const annual=parseFloat(document.getElementById('s-annual')?.value)||s.billing.annualGoal;
  const year=parseInt(document.getElementById('s-year')?.value)||s.billing.currentYear;
  const monthlyGoals={};document.querySelectorAll('.mg-input').forEach(el=>{monthlyGoals[el.dataset.mk]=parseFloat(el.value)||0;});
  s.billing={...s.billing,annualGoal:annual,currentYear:year,monthlyGoal:annual/12,monthlyGoals};
  s.employees={...s.employees,billable:parseInt(document.getElementById('s-billable')?.value)||s.employees.billable,total:parseInt(document.getElementById('s-total')?.value)||s.employees.total};

function showModal(html){closeModal();const bg=document.createElement('div');bg.className='modal-overlay';bg.id='modal-overlay';bg.innerHTML=html;document.body.appendChild(bg);
  // Only close when clicking the backdrop itself, not children
  bg.addEventListener('mousedown',e=>{if(e.target===bg)bg._closeOnMouseup=true;else bg._closeOnMouseup=false;});
  bg.addEventListener('mouseup',e=>{if(bg._closeOnMouseup&&e.target===bg)closeModal();});
  document.getElementById('m-close')?.addEventListener('click',closeModal);document.getElementById('m-cancel')?.addEventListener('click',closeModal);}

  });

    saveAll();

    // Show Step 2: allocation modal
    showModal(`<div class="modal" style="max-width:680px">
      <div class="modal-title">
        <span>Set Monthly Allocations</span>
        <span style="font-size:11px;color:var(--text2);font-weight:400;margin-left:8px">${d.name}</span>
        <button class="btn btn-sm" id="m-close" style="margin-left:auto"><i class="ti ti-x"></i></button>
      </div>
      <div style="background:var(--blue-bg);border:0.5px solid #d4956e;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:12px">
        <strong>Step 2 of 2 — Monthly Allocations</strong><br>
        <span style="color:var(--text2)">Estimated fee: <strong>${fmt(d.fee)}</strong> · Confidence: <strong>${d.confidence}%</strong> · Weighted: <strong>${fmt(Math.round(d.fee*d.confidence/100))}</strong></span><br>
        <span style="color:var(--text3);font-size:11px">Enter the % of the estimated fee you expect to bill each month. This drives the pipeline chart on the Dashboard.</span>
      </div>
      <div id="opp-alloc-step2">
        ${oppAllocPanel(draft)}
      </div>
      <div class="modal-footer">
        <button class="btn" id="m-back-step1">← Back</button>
        <button class="btn btn-primary" id="m-save-alloc"><i class="ti ti-check"></i> Save Opportunity</button>
      </div>
    </div>`);

    // Wire up close
    document.getElementById('m-close')?.addEventListener('click',()=>{
      // Remove draft if user closes without saving
      state.opportunities=state.opportunities.filter(o=>o.id!==draftId);
      saveAll();closeModal();render();
    });

    // Wire up back — remove draft, reopen step 1 with values pre-filled
    document.getElementById('m-back-step1')?.addEventListener('click',()=>{
      state.opportunities=state.opportunities.filter(o=>o.id!==draftId);
      saveAll();closeModal();
      openOppForm({...d,id:null,monthly:blankMonthly()});
    });

    // Wire up save
    document.getElementById('m-save-alloc')?.addEventListener('click',()=>{
      const hasAlloc=MONTHS.some(m=>(draft.monthly[m.key]||0)>0);
      if(!hasAlloc){
        if(!confirm('No allocations entered yet.\n\nThis opportunity won\'t appear on the Dashboard pipeline chart until allocations are set.\n\nSave anyway?')) return;
      }
      saveAll();closeModal();render();
    });

    // Attach alloc panel events
    setTimeout(()=>{
      document.querySelectorAll('[data-opp-alloc-id]').forEach(inp=>{
        inp.addEventListener('input',()=>{
          const id=+inp.dataset.oppAllocId,mk=inp.dataset.oppAllocMk,pc=parseFloat(inp.value)||0;
          const o=state.opportunities.find(x=>x.id===id);if(!o)return;
          if(!o.monthly)o.monthly=blankMonthly();
          const d2=Math.round((o.fee||0)*pc/100);o.monthly[mk]=d2;
          const dol=inp.closest('.month-chip')?.querySelector('.mc-dollar');if(dol)dol.textContent=d2>0?fmt(d2):'';
          const totalAlloc=MONTHS.reduce((s,m)=>s+(o.monthly[m.key]||0),0);
          const pct=(o.fee||0)>0?Math.round(totalAlloc/(o.fee||0)*100):0;
          const te=document.getElementById('opp-alloc-total-'+id);if(te)te.textContent=fmt(totalAlloc);
          const we=document.getElementById('opp-alloc-wtd-'+id);if(we)we.textContent=fmt(Math.round(totalAlloc*(o.confidence||50)/100));
          const re=document.getElementById('opp-alloc-rem-'+id);if(re)re.textContent=fmt((o.fee||0)-totalAlloc);
          const panel=inp.closest('.alloc-panel');
          if(panel){const bar=panel.querySelector('[style*="transition:width"]');if(bar){bar.style.width=Math.min(100,pct)+'%';bar.style.background=pct>=100?'var(--green)':pct>0?'var(--purple)':'var(--border)';}}
        });
        inp.addEventListener('change',()=>saveAll());
      });
      document.querySelectorAll('[data-opp-alloc-even]').forEach(btn=>btn.addEventListener('click',()=>{
        const o=state.opportunities.find(x=>x.id===+btn.dataset.oppAllocEven);
        if(!o)return;
        const vk=MONTHS.filter(m=>(o.monthly[m.key]||0)>0||(m.key>=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`)).map(m=>m.key);
        const rem=o.fee||0;const ev=vk.length?Math.round(rem/vk.length*100)/100:0;
        MONTHS.forEach(m=>{o.monthly[m.key]=vk.includes(m.key)?ev:0;});
        saveAll();
        const s2=document.getElementById('opp-alloc-step2');if(s2)s2.innerHTML=oppAllocPanel(o);
        setTimeout(()=>document.querySelectorAll('[data-opp-alloc-id]').forEach(inp=>inp.dispatchEvent(new Event('input'))),10);
      }));
      document.querySelectorAll('[data-opp-alloc-clear]').forEach(btn=>btn.addEventListener('click',()=>{
        const o=state.opportunities.find(x=>x.id===+btn.dataset.oppAllocClear);
        if(!o)return;o.monthly=blankMonthly();saveAll();
        const s2=document.getElementById('opp-alloc-step2');if(s2)s2.innerHTML=oppAllocPanel(o);
      }));
    },10);
  });
}

            const par=cl.filter(c=>!c.parent);const chi=cl.filter(c=>c.parent);let o='';

            if(curVal&&!inList) o+='<option value="'+curVal+'" selected>'+curVal+'</option>';
            par.forEach(p=>{const kids=chi.filter(k=>k.parent===p.id||k.parent===p.name);
              if(kids.length){o+='<optgroup label="'+p.name+'">';o+='<option value="'+p.name+'"'+(curVal===p.name?' selected':'')+'>'+p.name+' (Corporate)</option>';kids.forEach(k=>{o+='<option value="'+k.name+'"'+(curVal===k.name?' selected':'')+'>↳ '+k.name+'</option>';});o+='</optgroup>';}
              else{o+='<option value="'+p.name+'"'+(curVal===p.name?' selected':'')+'>'+p.name+'</option>';}});
            chi.filter(k=>!par.find(p=>p.id===k.parent||p.name===k.parent)).forEach(k=>{o+='<option value="'+k.name+'"'+(curVal===k.name?' selected':'')+'>'+k.name+'</option>';});
            o+='<option value="__new__">+ Add new client…</option>';return o;
          })()}

  document.getElementById('m-cancel')?.addEventListener('click',closeModal);

  document.getElementById('add-ph-btn')?.addEventListener('click',()=>{
    syncFP();
    window._fp.push({id:null,name:'',scope:scopeList()[0]?.code||'SD',fee:0,billed:0,pct:0,done:false,flag:false,archived:false,monthly:blankMonthly()});
    rebuildCards();
    setTimeout(()=>{const c=document.querySelectorAll('.phase-card');c[c.length-1]?.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
  });

  // Run after modal renders
  setTimeout(()=>{attachFPEvents();},10);

  document.getElementById('m-save')?.addEventListener('click',()=>{

    const _sel=document.getElementById('m-client').value;
    const cl=_sel==='__new__'?(document.getElementById('m-client-new')?.value.trim()||''):_sel.trim();
    const pr=document.getElementById('m-project').value.trim();
    const ty=document.getElementById('m-type').value;
    const lo=document.getElementById('m-loc')?.value.trim()||'CA';
    const st=document.getElementById('m-status').value;
    const fl=document.getElementById('m-flag').checked;
    const no=document.getElementById('m-notes').value;

    if(!cl){alert('Please select or enter a client name.');document.getElementById('m-client').focus();return;}
    if(!pr){alert('Please enter a project name.');document.getElementById('m-project').focus();return;}

    // Require at least one named phase
    const unnamedPhases=window._fp.filter(ph=>!ph.name.trim());
    if(unnamedPhases.length){
      alert('Please name all phases before saving.\n\nEach phase needs a description (e.g. Schematic Design, Construction Documents).');
      // Focus first unnamed phase
      const firstUnnamed=document.querySelector('.ph-name');
      firstUnnamed?.focus();
      return;
    }

    // Add new client to settings if needed
    if(_sel==='__new__'&&cl){
      const clients=state.settings.clients||[];
      if(!clients.find(c=>c.name===cl)){
        const newId=Math.max(0,...clients.map(c=>c.id||0))+1;
        clients.push({id:newId,name:cl,parent:null,active:true,notes:''});
        state.settings.clients=clients;
      }
    }

    const phases=window._fp.map(ph=>({
      id:ph.id||(state.nextId++),
      name:ph.name,scope:ph.scope,
      fee:ph.fee||0,billed:ph.billed||0,
      pct:ph.pct||0,done:ph.done||false,
      flag:ph.flag||false,archived:false,
      monthly:{...blankMonthly(),...ph.monthly}
    }));

    // Create project
    state.projects.push({
      id:state.nextId++,pm,projNo:pn,client:cl,project:pr,
      type:ty,location:lo,status:st,flag:fl,notes:no,
      done:false,archived:false,phases
    });

    // Mark opportunity as Won and archived
    opp.status='04 Won';
    opp.archived=true;

    saveAll();
    closeModal();
    state.tab='projects';

    // Show success banner
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--green-bg);color:var(--green);border:0.5px solid #9ed4b4;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.12)';
    banner.textContent='✓ Project created from opportunity: '+pr;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),3500);
    render();
  });
}

  // ── Digest email preview (mirrors api/daily-digest.js exactly) ──
  function calcDigestPreview(){
    const today=new Date();
    const cy=today.getFullYear();
    const cm=today.getMonth()+1;
    const curMk=`${cy}-${String(cm).padStart(2,'0')}`;
    const projects=state.projects||[];
    const invoices=state.invoices||[];
    const opportunities=state.opportunities||[];
    const settings=state.settings||{};

    let ytd=0;
    for(let m=1;m<cm;m++){
      const mk=`${cy}-${String(m).padStart(2,'0')}`;
      projects.forEach(p=>p.phases?.forEach(ph=>{ytd+=ph.monthly?.[mk]||0;}));
    }

    let curMonth=0;
    projects.forEach(p=>p.phases?.forEach(ph=>{curMonth+=ph.monthly?.[curMk]||0;}));

    const monthlyGoal=(settings.billing?.annualGoal||4740000)/12;
    const ytdGoal=monthlyGoal*(cm-1);

    let totalFees=0,totalBilled=0;
    projects.forEach(p=>p.phases?.forEach(ph=>{
      const fee=ph.scope==='CA'?(ph.fee||0)*(ph.caMonths||0):(ph.fee||0);
      totalFees+=fee;
      totalBilled+=ph.billed||0;
      for(let m=1;m<cm;m++){
        const mk=`${cy}-${String(m).padStart(2,'0')}`;
        totalBilled+=ph.monthly?.[mk]||0;
      }
    }));
    const backlog=Math.max(0,totalFees-totalBilled);

    const openInv=invoices.filter(i=>!i.paid);
    const followUps=openInv.filter(i=>i.flag);
    const arTotal=openInv.reduce((s,i)=>s+(i.amount||0),0);
    const pastDue=openInv.filter(i=>(i.bucketOverride||'')!=='0-30').reduce((s,i)=>s+(i.amount||0),0);

    const activeOpps=opportunities.filter(o=>o.status!=='04 Won'&&o.status!=='05 Lost');
    const pipeline=activeOpps.reduce((s,o)=>s+(o.fee||0)*(o.confidence||50)/100,0);
    const flaggedProjects=projects.filter(p=>p.flag&&!p.done&&!p.archived);

    return{ytd,ytdGoal,curMonth,monthlyGoal,totalFees,backlog,arTotal,pastDue,followUps,flaggedProjects,pipeline,cy,cm};
  }

    const win=window.open('','_blank','width=700,height=800,scrollbars=yes');
    win.document.write(html); win.document.close();
  });
  document.getElementById('digest-send-btn')?.addEventListener('click',async()=>{
    const statusEl=document.getElementById('digest-status');
    const btn=document.getElementById('digest-send-btn');
    if(!confirm('Send digest email to all recipients now?')) return;
    const recipients=getDigestRecipients();
    if(!recipients.length){ alert('No recipients configured.'); return; }
    if(!state.settings.firm) state.settings.firm={};
    if(!state.settings.firm.digest) state.settings.firm.digest={};
    state.settings.firm.digest.recipients=recipients;
    saveAll();
    if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spin"></i> Sending…'; }
    if(statusEl){ statusEl.style.color='var(--text3)'; statusEl.textContent='Sending…'; }
    try{
      const resp=await fetch('/api/daily-digest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({recipients})});
      const data=await resp.json();
      if(resp.ok){ if(statusEl){statusEl.style.color='var(--green)';statusEl.textContent='✓ Email sent successfully';} }
      else{ if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='Error: '+(data.error||'Unknown error');} }
    }catch(e){ if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='Send failed: '+e.message;} }
    finally{ if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> Send Now';} }
  });

  // Projection Reminder — Send Now
  document.getElementById('proj-reminder-cadence')?.addEventListener('change', e=>{
    const wrap=document.getElementById('proj-reminder-day-wrap');
    if(wrap) wrap.style.display=e.target.value==='daily'?'none':'block';
  });
  document.getElementById('proj-reminder-send-btn')?.addEventListener('click',async()=>{
    const statusEl=document.getElementById('proj-reminder-status');
    const btn=document.getElementById('proj-reminder-send-btn');
    if(!confirm('Send projection reminder emails to all PMs with under-allocated projects now?')) return;
    if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spin"></i> Sending…'; }
    if(statusEl){ statusEl.style.color='var(--text3)'; statusEl.textContent='Sending…'; }
    try{
      const resp=await fetch('/api/projection-reminder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({manual:true})});
      const data=await resp.json();
      if(resp.ok){
        if(statusEl){
          statusEl.style.color='var(--green)';
          statusEl.textContent=data.sent>0
            ? `✓ Sent reminders to ${data.sent} PM${data.sent!==1?'s':''} (${data.totalPhases} under-allocated phase${data.totalPhases!==1?'s':''})`
            : '✓ No under-allocated projects found — no emails sent';
        }
      } else {
        if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='Error: '+(data.error||'Unknown error');}
      }
    }catch(e){ if(statusEl){statusEl.style.color='var(--red)';statusEl.textContent='Send failed: '+e.message;} }
    finally{ if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> Send Reminders Now';} }
  });
}

function attachSettingsClients(){
  // Add new client
  document.getElementById('add-client-btn')?.addEventListener('click',()=>{
    const name=document.getElementById('new-client-name')?.value.trim();
    const parentVal=document.getElementById('new-client-parent')?.value;
    if(!name)return;
    const clients=state.settings.clients||[];
    if(clients.find(c=>c.name===name)){alert('A client named "'+name+'" already exists.');return;}
    const newId=Math.max(0,...clients.map(c=>c.id||0))+1;
    const parent=parentVal?+parentVal:null;
    clients.push({id:newId,name,parent,active:true,notes:''});
    state.settings.clients=clients;
    saveAll();
    // Refresh client list in settings
    const listEl=document.getElementById('client-list-settings');
    if(listEl)listEl.innerHTML=buildClientListHTML();
    document.getElementById('new-client-name').value='';
    attachSettingsClients();
  });

  // Rename client button — opens inline input
  document.querySelectorAll('[data-rename-client]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const cid=+btn.dataset.renameClient;
      const client=state.settings.clients?.find(c=>c.id===cid);
      if(!client)return;
      // Replace the span + button with an input
      const span=btn.previousElementSibling;
      const inp=document.createElement('input');
      inp.type='text';
      inp.value=client.name;
      inp.style.cssText='flex:1;font-size:13px;font-weight:600;border:0.5px solid var(--jda-terracotta);border-radius:4px;padding:2px 6px;outline:none;background:var(--bg);color:var(--text)';
      span.replaceWith(inp);
      btn.style.display='none';
      inp.focus();inp.select();
      function commit(){
        const newName=inp.value.trim();
        if(newName&&newName!==client.name){
          // Update all projects using old client name
          state.projects.forEach(p=>{if(p.client===client.name)p.client=newName;});
          client.name=newName;
          saveAll();
        }
        // Refresh
        const listEl=document.getElementById('client-list-settings');
        if(listEl)listEl.innerHTML=buildClientListHTML();
        attachSettingsClients();
      }
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){const listEl=document.getElementById('client-list-settings');if(listEl)listEl.innerHTML=buildClientListHTML();attachSettingsClients();}});
      inp.addEventListener('blur',commit);
    });
  });

  // Parent assignment change
  document.querySelectorAll('.client-parent-sel').forEach(sel=>{
    sel.addEventListener('change',()=>{
      const cid=+sel.dataset.cid;
      const parentId=sel.value?+sel.value:null;
      const client=state.settings.clients?.find(c=>c.id===cid);
      if(client){client.parent=parentId;saveAll();}
    });
  });

  // Toggle active/inactive
  document.querySelectorAll('[data-toggle-client]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cid=+btn.dataset.toggleClient;
      const client=state.settings.clients?.find(c=>c.id===cid);
      if(client){
        client.active=!(client.active!==false);
        saveAll();
        const listEl=document.getElementById('client-list-settings');
        if(listEl)listEl.innerHTML=buildClientListHTML();
        attachSettingsClients();
      }
    });
  });

  // Delete client from settings
  document.querySelectorAll('[data-delete-client-settings]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cid=+btn.dataset.deleteClientSettings;
      const client=state.settings.clients?.find(c=>c.id===cid);
      if(!client)return;
      // Check for active projects
      const activeProjs=state.projects.filter(p=>!p.archived&&!p.done&&p.client===client.name);
      if(activeProjs.length){
        alert('"'+client.name+'" has '+activeProjs.length+' active project'+
          (activeProjs.length>1?'s':'')+'. Deactivate or reassign them before deleting.');
        return;
      }
      if(!confirm('Delete "'+client.name+'"?\n\nThe client name will be kept in history but removed from the active list.'))return;
      // Mark inactive rather than removing (keeps history)
      client.active=false;
      client.deleted=true;
      saveAll();
      const listEl=document.getElementById('client-list-settings');
      if(listEl)listEl.innerHTML=buildClientListHTML();
      attachSettingsClients();
    });
  });
}

function attachSRm(){
  document.querySelectorAll('[data-rm-pm]').forEach(el=>{el.onclick=e=>{e.stopPropagation();
    const init=el.closest('.slist-item')?.querySelector('.pm-init')?.value||'?';
    const affected=state.projects.filter(p=>p.pm===init);
    const activeCount=affected.filter(p=>!p.archived).length;
    if(affected.length>0){
      // Get current PM list from DOM (not yet saved to state)
      const remainingPMs=[...document.querySelectorAll('#pm-list .pm-init')]
        .map(x=>x.value.trim()).filter(v=>v&&v!==init);
      if(!remainingPMs.length){alert(`Cannot remove "${init}" — no other PMs exist to reassign their projects to.`);return;}
      showReassignDialog(init,activeCount,affected.length,remainingPMs,(newPM)=>{
        affected.forEach(p=>p.pm=newPM);
        saveAll();
        el.closest('.slist-item')?.remove();
        // Mark settings unsaved
        const u=document.getElementById('s-unsaved');if(u)u.style.display='inline';
      });
    } else {
      el.closest('.slist-item')?.remove();
    }
  };});
  document.querySelectorAll('[data-rm-sc]').forEach(el=>{el.onclick=e=>{e.stopPropagation();el.closest('.sscope-item')?.remove();};});
  document.querySelectorAll('[data-rm-pt]').forEach(el=>{el.onclick=e=>{e.stopPropagation();el.closest('.sscope-item')?.remove();};});
  document.querySelectorAll('[data-rm-st]').forEach(el=>{el.onclick=e=>{e.stopPropagation();el.closest('.sstatus-item')?.remove();};});

// ── Attach all events ──
function attachAll(){

  // Tab navigation
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{state.tab=el.dataset.tab;render();}));

  // Draggable tabs
  let dragSrc=null;
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('dragstart',e=>{dragSrc=tab;tab.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    tab.addEventListener('dragend',()=>{tab.classList.remove('dragging');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('drag-over'));});
    tab.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';if(tab!==dragSrc)tab.classList.add('drag-over');});
    tab.addEventListener('dragleave',()=>tab.classList.remove('drag-over'));
    tab.addEventListener('drop',e=>{e.preventDefault();if(dragSrc&&tab!==dragSrc){
      const bar=document.getElementById('tab-bar');const tabs=[...bar.querySelectorAll('.tab')];const srcIdx=tabs.indexOf(dragSrc),tgtIdx=tabs.indexOf(tab);
      const newOrder=tabs.map(t=>t.dataset.tab);newOrder.splice(srcIdx,1);newOrder.splice(tgtIdx,0,tabs[srcIdx].dataset.tab);
      state.settings.tabOrder=newOrder;saveAll();render();
    }});
  });

  document.getElementById('open-settings')?.addEventListener('click',openSettings);

  // Export data
  document.getElementById('export-data')?.addEventListener('click',()=>{
    const data=localStorage.getItem('jda_v3_r2');
    if(!data){alert('No data to export.');return;}
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const ts=new Date().toISOString().slice(0,10);
    a.download=`jda_tracker_backup_${ts}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // Import data
  document.getElementById('import-data')?.addEventListener('click',()=>{
    document.getElementById('import-file-input')?.click();
  });
  document.getElementById('import-file-input')?.addEventListener('change',e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file||!file.name)return;
    e.stopPropagation();
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        // Validate it looks like our data
        if(!parsed.projects||!Array.isArray(parsed.projects))throw new Error('Invalid backup file — missing projects data.');
        if(!confirm('Import backup from '+file.name+'?\n\nThis will replace all current data including projects, invoices, opportunities, and settings.\n\nCurrent data will be overwritten.'))return;
        localStorage.setItem('jda_v3_r2',ev.target.result);
        // Reload state
        const loaded=loadAll();
        state.projects=loaded.projects;
        state.invoices=loaded.invoices;
        state.opportunities=loaded.opportunities||[];
        state.settings=loaded.settings;
        state.nextId=loaded.nextId||5000;
        saveAll();
        render();
        e.target.value=''; // reset so change doesn't fire again
        // Show success
        const banner=document.createElement('div');
        banner.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--green-bg);color:var(--green);border:0.5px solid #9ed4b4;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.12)';
        banner.textContent='✓ Data imported successfully';
        document.body.appendChild(banner);
        setTimeout(()=>banner.remove(),3000);
      }catch(err){
        alert('Import failed: '+err.message+'\n\nMake sure you selected a valid JD+A Tracker backup file.');
      }
    };
    reader.readAsText(file);
    e.target.value=''; // reset so same file can be re-imported
  });

  // Search
  const srch=document.getElementById('srch');
  if(srch)srch.addEventListener('input',e=>{state.search=e.target.value;clearTimeout(window._st);window._st=setTimeout(()=>render('srch'),300);});
  const arSrch=document.getElementById('ar-srch');
  if(arSrch)arSrch.addEventListener('input',e=>{state.arSrch=e.target.value;clearTimeout(window._ast);window._ast=setTimeout(()=>render('ar-srch'),300);});
  const oppSrch=document.getElementById('opp-srch');
  if(oppSrch)oppSrch.addEventListener('input',e=>{state.oppSearch=e.target.value;clearTimeout(window._ost);window._ost=setTimeout(()=>render('opp-srch'),300);});

  // Filters
  document.getElementById('fpm')?.addEventListener('change',e=>{state.fPM=e.target.value;render();});
  document.getElementById('fst')?.addEventListener('change',e=>{state.fSt=e.target.value;render();});
  document.getElementById('toggle-arch')?.addEventListener('click',()=>{state.showArch=!state.showArch;render();});
  document.getElementById('toggle-done-projects')?.addEventListener('click',()=>{state.hideDoneProjects=!state.hideDoneProjects;render();});
  document.getElementById('toggle-done-phases')?.addEventListener('click',()=>{state.hideDonePhases=!state.hideDonePhases;render();});
  document.getElementById('toggle-phases')?.addEventListener('click',()=>{state.bShowPh=!state.bShowPh;render();});
  document.getElementById('toggle-past-months')?.addEventListener('click',()=>{state.showPastMonths=!state.showPastMonths;render();});
  document.getElementById('billing-toggle-billedout')?.addEventListener('click',()=>{state.hideBilledOut=!state.hideBilledOut;render();});

  // Billing confidence dots
  document.querySelectorAll('[data-bconf]').forEach(dot=>{
    dot.addEventListener('click', e=>{
      e.stopPropagation();
      const phId = +dot.dataset.bconf;
      const val  = dot.dataset.bconfVal;
      // Find the phase across all projects
      let found = null;
      state.projects.forEach(p=>p.phases.forEach(ph=>{ if(ph.id===phId) found=ph; }));
      if(!found) return;
      if(!found.billingConf) found.billingConf={};
      const curMk = (() => { const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`; })();
      // Toggle: clicking active dot clears it
      found.billingConf[curMk] = found.billingConf[curMk]===val ? null : val;
      saveAll();
      render();
    });
  });


  document.getElementById('goal-input')?.addEventListener('change',e=>{state.settings.billing.monthlyGoal=parseFloat(e.target.value)||395000;saveAll();render();});
  document.getElementById('collapse-all-btn')?.addEventListener('click',()=>{
    const ps=filtPro();
    if(state.allCollapsed){
      // Expand everything — PMs, clients, projects, addenda
      const ps2=filtPro();
      ps2.forEach(p=>{
        state.expandedProj[p.id]=true;
        const pmKey='pm-'+(p.pm||'—');
        const clientKey='client-'+(p.pm||'—')+'-'+(p._client||p.client||'—');
        state.expandedPM[pmKey]=true;
        state.expandedClient[clientKey]=true;
        p.phases.forEach(ph=>{
          if(ph.addendum){state.expandedAddendum['add-'+p.id+'-'+ph.addendum]=true;}
        });
      });
      state.allCollapsed=false;
    } else {
      ps.forEach(p=>{
        state.expandedProj[p.id]=false;
        const pmKey='pm-'+(p.pm||'—');
        const clientKey='client-'+(p.pm||'—')+'-'+(p._client||p.client||'—');
        state.expandedPM[pmKey]=false;
        state.expandedClient[clientKey]=false;
        // Collapse addenda too
        p.phases.forEach(ph=>{
          if(ph.addendum){
            const addKey='add-'+p.id+'-'+ph.addendum;
            state.expandedAddendum[addKey]=false;
          }
        });
      });
      state.allCollapsed=true;
    }
    render();
  });
  document.getElementById('new-proj')?.addEventListener('click',()=>openProjForm(null));
  document.getElementById('new-inv')?.addEventListener('click',()=>openARForm(null));
  document.getElementById('new-opp')?.addEventListener('click',()=>openOppForm(null));

  // Billing
  document.getElementById('rollover-btn')?.addEventListener('click',()=>{state.projects.filter(p=>!p.archived&&!p.done).forEach(p=>p.phases.forEach(ph=>{const r=phRem(ph);if(r>0){const cmk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;ph.monthly[cmk]=(ph.monthly[cmk]||0)+r;}}));saveAll();render();});

  // A/R filters
  document.getElementById('ar-pm')?.addEventListener('change',e=>{state.arFPM=e.target.value;render();});
  document.getElementById('ar-bucket')?.addEventListener('change',e=>{state.arFB=e.target.value;render();});
  document.getElementById('ar-flag-btn')?.addEventListener('click',()=>{state.arFlag=!state.arFlag;render();});
  document.getElementById('ar-paid-btn')?.addEventListener('click',()=>{state.arPaid=!state.arPaid;state.arFB='ALL';render();});
  document.getElementById('clear-ar-filter')?.addEventListener('click',()=>{state.arFilter='ALL';render();});
  document.querySelectorAll('[data-ar-sort]').forEach(th=>th.addEventListener('click',()=>{if(state.arSort===th.dataset.arSort)state.arDir*=-1;else{state.arSort=th.dataset.arSort;state.arDir=-1;}render();}));
  document.querySelectorAll('[data-ar-bucket]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();state.arFB=state.arFB===el.dataset.arBucket?'ALL':el.dataset.arBucket;render();}));
  // A/R visual → navigate to A/R tab
  // A/R card handled by [data-dash-ar-90] on the 90+ action card
  document.querySelectorAll('[data-dash-nav]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    state.tab=el.dataset.dashNav;
    render();
  }));
  // A/R 90+ specific link — navigates to A/R tab filtered to 90+ buckets
  document.querySelectorAll('[data-dash-ar-90]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    state.tab='ar';
    state.arFilter='90plus';
    render();
  }));

  // Opp filters
  document.getElementById('opp-pm')?.addEventListener('change',e=>{state.oppFPM=e.target.value;render();});
  document.getElementById('opp-st')?.addEventListener('change',e=>{state.oppFSt=e.target.value;render();});
  document.querySelectorAll('[data-opp-status-filter]').forEach(el=>el.addEventListener('click',()=>{state.oppFSt=state.oppFSt===el.dataset.oppStatusFilter?'ALL':el.dataset.oppStatusFilter;render();}));

  // Opp controls
  document.querySelectorAll('[data-opp-flag]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const o=state.opportunities.find(x=>x.id===+btn.dataset.oppFlag);if(o){o.flag=!o.flag;saveAll();render();}}));
  document.querySelectorAll('[data-opp-archive]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const o=state.opportunities.find(x=>x.id===+btn.dataset.oppArchive);if(o){o.archived=!o.archived;saveAll();render();}}));
  document.querySelectorAll('[data-opp-edit]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const o=state.opportunities.find(x=>x.id===+btn.dataset.oppEdit);if(o)openOppForm(o);}));
  document.querySelectorAll('[data-opp-convert]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const o=state.opportunities.find(x=>x.id===+btn.dataset.oppConvert);if(o)convertOppToProject(o);}));

  // Fix 4+6: Inline status change with live update + lost reason prompt
  document.querySelectorAll('[data-opp-status]').forEach(sel=>{
    sel.addEventListener('click',e=>e.stopPropagation());
    sel.addEventListener('change',e=>{
      e.stopPropagation();
      const o=state.opportunities.find(x=>x.id===+sel.dataset.oppStatus);
      if(!o) return;
      const newStatus=sel.value;
      // Fix 6: prompt for reason when marking lost
      if(newStatus==='05 Lost'){
        const reason=prompt('Reason for marking this opportunity as lost:');
        if(reason===null){ sel.value=o.status; return; } // cancelled
        o.lostReason=reason.trim()||'No reason provided';
      }
      o.status=newStatus;
      saveAll();
      render(); // live update stats
    });
  });
  document.querySelectorAll('.conf-slider').forEach(slider=>{
    slider.addEventListener('click',e=>e.stopPropagation());
    slider.addEventListener('mousedown',e=>e.stopPropagation());
    slider.addEventListener('input',e=>{
      e.stopPropagation();
      const id=+slider.dataset.oppConf,v=+e.target.value;
      const badge=slider.nextElementSibling;if(badge){badge.textContent=v+'%';badge.className='conf-badge '+confClass(v);}
      slider.style.background=`linear-gradient(to right,${confBg(v)} 0%,${confBg(v)} ${v}%,var(--border) ${v}%,var(--border) 100%)`;
      const o=state.opportunities.find(x=>x.id===id);if(o){o.confidence=v;saveAll();}
      const row=slider.closest('tr');if(row){const wtdCell=row.cells[7];if(wtdCell){const sp=wtdCell.querySelector('[data-opp-wtd]');if(sp)sp.textContent=fmtK((o?.fee||0)*v/100);}}

  document.querySelectorAll('[data-opp-conf]').forEach(inp=>{

      e.stopPropagation();

      if(!o)return;

      const badge=inp.nextElementSibling;
      if(badge)badge.textContent=inp.value+'%';
      // Update weighted value display
      const wtdEl=document.querySelector('[data-opp-wtd="${o.id}"]'.replace('${o.id}',o.id));
      if(wtdEl)wtdEl.textContent=fmtK(Math.round((o.fee||0)*o.confidence/100));

  document.querySelectorAll('[data-opp-alloc]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const id=+btn.dataset.oppAlloc;state.openAlloc['opp-'+id]=!state.openAlloc['opp-'+id];render();}));
  document.querySelectorAll('[data-opp-alloc-id]').forEach(inp=>{inp.addEventListener('input',()=>{
      const id=+inp.dataset.oppAllocId,mk=inp.dataset.oppAllocMk,pc=parseFloat(inp.value)||0;
      const o=state.opportunities.find(x=>x.id===id);if(!o)return;
      if(!o.monthly)o.monthly=blankMonthly();
      const d=Math.round((o.fee||0)*pc/100);o.monthly[mk]=d;
      inp.closest('.month-chip')?.classList.toggle('has-value',pc>0);
      const dol=inp.closest('.month-chip')?.querySelector('.mc-dollar');if(dol)dol.textContent=d>0?fmt(d):'';
      const totalAlloc=MONTHS.reduce((s,m)=>s+(o.monthly[m.key]||0),0);
      const wtdAlloc=Math.round(totalAlloc*(o.confidence||50)/100);

function showReassignDialog(removedPM, activeCount, totalCount, pmOptions, onConfirm){
  const bg=document.createElement('div');
  bg.className='modal-overlay';
  bg.id='reassign-dialog';
  const opts=pmOptions.map(p=>`<option value="${p}">${p}</option>`).join('');
  bg.innerHTML=`<div class="modal" style="max-width:380px">
    <div class="modal-title">Reassign projects before removing PM</div>
    <div style="background:var(--yellow-bg);border:0.5px solid #f5c396;border-radius:6px;padding:9px 12px;margin-bottom:13px;font-size:12px;color:var(--orange)">
      <strong>${removedPM}</strong> is assigned to <strong>${totalCount}</strong> project${totalCount!==1?'s':''}
      ${activeCount!==totalCount?` (${activeCount} active, ${totalCount-activeCount} archived)`:''}.<br>
      Select a PM to reassign all of them to before removing ${removedPM}.
    </div>
    <div class="field" style="margin-bottom:13px">
      <label>Reassign all ${removedPM} projects to:</label>
      <select id="rd-new-pm" style="font-size:14px;font-weight:600">${opts}</select>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:13px">
      You can reassign individual projects later by editing them.
    </div>
    <div class="modal-footer">
      <button class="btn" id="rd-cancel">Cancel</button>
      <button class="btn btn-primary" id="rd-confirm">Reassign &amp; remove ${removedPM}</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('mousedown',e=>{if(e.target===bg){bg._close=true;}else{bg._close=false;}});
  bg.addEventListener('mouseup',e=>{if(bg._close&&e.target===bg)bg.remove();});
  document.getElementById('rd-cancel').addEventListener('click',()=>bg.remove());
  document.getElementById('rd-confirm').addEventListener('click',()=>{
    const newPM=document.getElementById('rd-new-pm').value;
    bg.remove();
    onConfirm(newPM);
    // Show confirmation
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--green-bg);color:var(--green);border:0.5px solid #9ed4b4;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.12)';
    banner.textContent=`✓ All ${removedPM} projects reassigned to ${newPM}`;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),3000);
  });
}

function checkOrphanedProjects(){
  const validPMs=new Set(state.settings.pms.map(p=>p.name));
  const orphaned=state.projects.filter(p=>p.pm&&!validPMs.has(p.pm)&&!p.archived);
  if(!orphaned.length) return;
  const byPM={};
  orphaned.forEach(p=>{if(!byPM[p.pm])byPM[p.pm]=[];byPM[p.pm].push(p);});
  Object.entries(byPM).forEach(([oldPM,projs])=>{
    const pmNames=state.settings.pms.map(p=>p.name);
    if(!pmNames.length) return;
    showReassignDialog(oldPM,projs.filter(p=>!p.archived).length,projs.length,pmNames,(newPM)=>{
      projs.forEach(p=>p.pm=newPM);
      saveAll();
      render();
    });
  });
}

function buildClientListHTML(){
  const clients=state.settings.clients||[];
  const parents=clients.filter(c=>!c.parent);
  const children=clients.filter(c=>c.parent);
  
  let html='';
  parents.forEach(function(parent){
    const kids=children.filter(k=>k.parent===parent.id||k.parent===parent.name);
    const projCount=state.projects.filter(p=>!p.archived&&(p.client===parent.name||resolveClient(p.client,state.projects,state.projects.indexOf(p))===parent.name)).length;
    const isActive=parent.active!==false;
    
    html+='<div class="sclient-item'+(isActive?'':' sclient-inactive')+'" data-cid="'+parent.id+'">';
    html+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
    html+='<span class="client-name-display-text" style="flex:1;font-weight:600;font-size:13px;color:var(--text);cursor:default">'+parent.name+'</span>';
    html+='<button class="btn btn-sm btn-icon" data-rename-client="'+parent.id+'" title="Rename"><i class="ti ti-pencil"></i></button>';
    html+='<span style="font-size:10px;color:var(--text3)">'+projCount+' project'+(projCount!==1?'s':'')+'</span>';
    if(!isActive) html+='<span class="badge" style="background:var(--bg3);color:var(--text3)">Inactive</span>';
    html+='<button class="btn btn-sm" data-toggle-client="'+parent.id+'" title="'+(isActive?'Deactivate':'Reactivate')+'">'+(isActive?'Deactivate':'Reactivate')+'</button>';
    html+='<button class="btn btn-sm btn-danger" data-delete-client-settings="'+parent.id+'" title="Delete"><i class="ti ti-trash"></i></button>';
    html+='</div>';
    
    kids.forEach(function(kid){
      const kidProj=state.projects.filter(p=>!p.archived&&p.client===kid.name).length;
      const kidActive=kid.active!==false;
      html+='<div class="sclient-child" data-cid="'+kid.id+'">';
      html+='<span style="color:var(--text3);margin-right:3px">↳</span>';
      html+='<span class="client-name-display-text" style="flex:1;font-size:12px;color:var(--text)">'+kid.name+'</span>';
      html+='<button class="btn btn-sm btn-icon" data-rename-client="'+kid.id+'" title="Rename"><i class="ti ti-pencil"></i></button>';
      html+='<select class="client-parent-sel" data-cid="'+kid.id+'" style="font-size:11px;border:0.5px solid var(--border);border-radius:4px;padding:1px 4px">';
      html+='<option value="">No parent</option>';
      parents.forEach(p=>{html+='<option value="'+p.id+'"'+(kid.parent===p.id||kid.parent===p.name?' selected':'')+'>'+p.name+'</option>';});
      html+='</select>';
      html+='<span style="font-size:10px;color:var(--text3)">'+kidProj+' proj</span>';
      if(!kidActive) html+='<span class="badge" style="background:var(--bg3);color:var(--text3)">Inactive</span>';
      html+='<button class="btn btn-sm" data-toggle-client="'+kid.id+'">'+(kidActive?'Deactivate':'Reactivate')+'</button>';
      html+='<button class="btn btn-sm btn-danger" data-delete-client-settings="'+kid.id+'"><i class="ti ti-trash"></i></button>';
      html+='</div>';
    });
    html+='</div>';
  });
  
  // Orphan clients
  const orphans=children.filter(c=>!parents.find(p=>p.id===c.parent||p.name===c.parent));
  if(orphans.length){
    html+='<div style="font-size:10px;color:var(--text3);margin:7px 0 3px;text-transform:uppercase;letter-spacing:.04em">Unaffiliated</div>';
    orphans.forEach(function(c){
      const projCount=state.projects.filter(p=>!p.archived&&p.client===c.name).length;
      const isActive=c.active!==false;
      html+='<div class="sclient-item'+(isActive?'':' sclient-inactive')+'" data-cid="'+c.id+'">';
      html+='<div style="display:flex;align-items:center;gap:5px">';
      html+='<span class="client-name-display-text" style="flex:1;font-size:13px;color:var(--text)">'+c.name+'</span>';
      html+='<button class="btn btn-sm btn-icon" data-rename-client="'+c.id+'" title="Rename"><i class="ti ti-pencil"></i></button>';
      html+='<select class="client-parent-sel" data-cid="'+c.id+'" style="font-size:11px;border:0.5px solid var(--border);border-radius:4px;padding:1px 4px">';
      html+='<option value="">No parent</option>';
      parents.forEach(p=>{html+='<option value="'+p.id+'"'+(c.parent===p.id||c.parent===p.name?' selected':'')+'>'+p.name+'</option>';});
      html+='</select>';
      html+='<span style="font-size:10px;color:var(--text3)">'+projCount+' proj</span>';
      if(!isActive) html+='<span class="badge" style="background:var(--bg3);color:var(--text3)">Inactive</span>';
      html+='<button class="btn btn-sm" data-toggle-client="'+c.id+'">'+(isActive?'Deactivate':'Reactivate')+'</button>';
      html+='<button class="btn btn-sm btn-danger" data-delete-client-settings="'+c.id+'"><i class="ti ti-trash"></i></button>';
      html+='</div></div>';
    });
  }
  return html||'<div style="color:var(--text3);font-size:12px">No clients yet</div>';
}
function showSplitDialog(amount, callback){
  const opts = MONTHS.map(m=>`<option value="${m.key}">${m.label}</option>`).join('');
  const bg=document.createElement('div');bg.className='modal-overlay';bg.id='split-dialog';
  bg.innerHTML=`<div class="modal" style="max-width:340px">
    <div class="modal-title">Split evenly over range<button class="btn btn-sm" id="sd-close" style="margin-left:auto"><i class="ti ti-x"></i></button></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:11px">Amount: <strong>${fmt(amount)}</strong></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px">
      <div class="field"><label>Start month</label><select id="sd-start">${opts}</select></div>
      <div class="field"><label>End month</label><select id="sd-end">${MONTHS.map((m,i)=>`<option value="${m.key}"${i===MONTHS.length-1?' selected':''}>${m.label}</option>`).join('')}</select></div>
    </div>
    <div id="sd-preview" style="font-size:12px;color:var(--text2);margin-bottom:13px"></div>
    <div class="modal-footer">
      <button class="btn" id="sd-cancel">Cancel</button>
      <button class="btn btn-primary" id="sd-ok">Split evenly</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  const updatePreview=()=>{
    const s=MONTHS.findIndex(m=>m.key===document.getElementById('sd-start').value);
    const e=MONTHS.findIndex(m=>m.key===document.getElementById('sd-end').value);
    const cnt=e>=s?e-s+1:0;
    const el=document.getElementById('sd-preview');
    if(el)el.textContent=cnt>0?`${cnt} month${cnt>1?'s':''} · ${fmt(Math.round(amount/cnt))} each`:'Invalid range';
  };
  document.getElementById('sd-start').addEventListener('change',updatePreview);
  document.getElementById('sd-end').addEventListener('change',updatePreview);
  updatePreview();
  document.getElementById('sd-close').addEventListener('click',()=>bg.remove());
  document.getElementById('sd-cancel').addEventListener('click',()=>bg.remove());
  document.getElementById('sd-ok').addEventListener('click',()=>{
    const startMk=document.getElementById('sd-start').value,endMk=document.getElementById('sd-end').value;
    bg.remove();callback(startMk,endMk);
  });
  bg.addEventListener('mousedown',e=>{if(e.target===bg)bg.remove();});
}

// ── Report 1: Firm Financial Summary ──
function buildFinancialReport(pm, client, fromMk, toMk, template){
  const active=state.projects.filter(p=>!p.archived&&(pm==='ALL'||p.pm===pm)&&(client==='ALL'||p.client===client));
  const tF=active.reduce((s,p)=>s+pFee(p),0);
  const tB=active.reduce((s,p)=>s+pBil(p),0);
  const tYTD=active.reduce((s,p)=>s+pYTD(p),0);
  const tR=tF-tB-tYTD;
  const tWIP=tF>0?Math.round((tB+tYTD)/tF*100):0;

  // Monthly range totals
  const rangeMks=MONTHS.filter(m=>m.key>=fromMk&&m.key<=toMk).map(m=>m.key);
  const rangeTotal=rangeMks.reduce((s,mk)=>s+mTotalAll(mk),0);
  const rangeGoal=rangeMks.length*mGoal();

  // By PM breakdown
  const pmGroups={};
  active.forEach(p=>{
    if(!pmGroups[p.pm]) pmGroups[p.pm]={pm:p.pm,fee:0,billed:0,ytd:0,projects:0};
    pmGroups[p.pm].fee+=pFee(p);
    pmGroups[p.pm].billed+=pBil(p);
    pmGroups[p.pm].ytd+=pYTD(p);
    pmGroups[p.pm].projects++;
  });

  const subtitle=`${pm==='ALL'?'All PMs':'PM: '+pm} · ${client==='ALL'?'All Clients':client} · ${MONTHS.find(m=>m.key===fromMk)?.label||fromMk} – ${MONTHS.find(m=>m.key===toMk)?.label||toMk}`;

  return`<div class="report-page" style="box-sizing:border-box;width:100%;background:#fff;padding:32px 36px;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-family:'Nunito Sans',sans-serif;font-size:12px;color:#3D3935;overflow-x:auto">
    ${reportHeader('Firm Financial Summary',subtitle,template)}

    <!-- KPI row -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
      ${[
        {label:'Total Contracted Fee',val:fmt(tF),color:'var(--jda-black)'},
        {label:'Prior Billed',val:fmt(tB),color:'var(--text2)'},
        {label:'YTD '+TODAY.getFullYear(),val:fmt(tYTD),color:'var(--jda-terracotta)'},
        {label:'Remaining Backlog',val:fmt(tR),color:'var(--jda-olive)'},
      ].map(k=>`<div style="background:#F5F5F1;border-radius:6px;padding:10px 12px;border-top:3px solid ${k.color}">
        <div style="font-size:10px;color:#736F4C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${k.label}</div>
        <div style="font-size:18px;font-weight:700;color:${k.color};font-family:'League Gothic','Nunito Sans',sans-serif">${k.val}</div>
      </div>`).join('')}

    <!-- Period billings -->
    <div style="margin-bottom:20px">
      <div style="font-family:'League Gothic','Nunito Sans',sans-serif;font-size:14px;letter-spacing:.04em;color:var(--jda-black);margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid #dedad0">PERIOD BILLINGS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div style="background:#F5F5F1;border-radius:6px;padding:10px 12px">
          <div style="font-size:10px;color:#736F4C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Billed in Period</div>
          <div style="font-size:16px;font-weight:700;color:var(--jda-terracotta)">${fmt(rangeTotal)}</div>
        </div>
        <div style="background:#F5F5F1;border-radius:6px;padding:10px 12px">
          <div style="font-size:10px;color:#736F4C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Goal for Period</div>
          <div style="font-size:16px;font-weight:700;color:var(--jda-black)">${fmt(rangeGoal)}</div>
        </div>
        <div style="background:#F5F5F1;border-radius:6px;padding:10px 12px">
          <div style="font-size:10px;color:#736F4C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">vs. Goal</div>
          <div style="font-size:16px;font-weight:700;color:${rangeTotal>=rangeGoal?'#3a7a4a':'#b83a2a'}">${rangeTotal>=rangeGoal?'+':''}${fmt(rangeTotal-rangeGoal)}</div>
        </div>
      </div>
    </div>

    <!-- By PM -->
    <div style="margin-bottom:20px">
      <div style="font-family:'League Gothic','Nunito Sans',sans-serif;font-size:14px;letter-spacing:.04em;color:var(--jda-black);margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid #dedad0">BACKLOG BY PROJECT MANAGER</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead>
          <tr style="background:#F5F5F1">
            <th style="text-align:left;padding:6px 8px;font-weight:700;color:#736F4C;font-size:10px;text-transform:uppercase;letter-spacing:.04em">PM</th>
            <th style="text-align:right;padding:6px 8px;font-weight:700;color:#736F4C;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Projects</th>
            <th style="text-align:right;padding:6px 8px;font-weight:700;color:#736F4C;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Total Fee</th>
            <th style="text-align:right;padding:6px 8px;font-weight:700;color:#736F4C;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Prior Billed</th>

            return`<tr style="border-bottom:0.5px solid #eceae3;background:${i%2?'#fff':'#fafaf8'}">
              <td style="padding:6px 8px;font-weight:600;color:#3D3935">${g.pm}</td>
              <td style="padding:6px 8px;text-align:right;color:#736F4C">${g.projects}</td>

              <td style="padding:6px 8px;text-align:right;color:#736F4C">${fmt(g.billed)}</td>

              <td style="padding:6px 8px;text-align:right">
                <div style="display:flex;align-items:center;justify-content:flex-end;gap:5px">
                  <div style="width:40px;height:4px;background:#eceae3;border-radius:2px"><div style="width:${Math.min(100,wip)}%;height:100%;background:#BD6439;border-radius:2px"></div></div>

            <td style="padding:7px 8px;text-align:right;color:#BD6439">${fmt(tYTD)}</td>
            <td style="padding:7px 8px;text-align:right">${fmt(tR)}</td>
            <td style="padding:7px 8px;text-align:right">${tWIP}%</td>

    <div style="margin-top:24px;padding-top:10px;border-top:0.5px solid #dedad0;display:flex;justify-content:space-between;font-size:10px;color:#a09c85">

  </div>`;
}

// ── Report 2: Project Status Report ──
function buildProjectReport(pm, client, fromMk, toMk, template){
  const hideDone=!!state.rHideDone;
  let projects=state.projects.filter(p=>!p.archived&&(pm==='ALL'||p.pm===pm)&&(client==='ALL'||p.client===client));
  if(hideDone) projects=projects.filter(p=>!p.done);
  const sortBy=state.rSort||'pm';
  const subtitle=`${pm==='ALL'?'All PMs':'PM: '+pm} · ${client==='ALL'?'All Clients':client} · Sorted by ${sortBy==='pm'?'PM':'Client'}`;

  const groupKey=p=>sortBy==='pm'?(p.pm||'—'):(p.client||'—');
  const sorted=[...projects].sort((a,b)=>sortBy==='pm'?(a.pm+a.project).localeCompare(b.pm+b.project):(a.client+a.project).localeCompare(b.client+b.project));

  const groups={};
  const groupOrder=[];
  sorted.forEach(p=>{
    const k=groupKey(p);
    if(!groups[k]){groups[k]=[];groupOrder.push(k);}
    groups[k].push(p);
  });

  let grandFee=0,grandBilled=0,grandYtd=0,grandRem=0;

  const buildProjectBlock=p=>{
    const fee=pFee(p),billed=pBil(p),ytd=pYTD(p),rem=pRem(p);
    const wip=fee>0?Math.round((billed+ytd)/fee*100):0;
    let phases=p.phases;
    if(hideDone) phases=phases.filter(ph=>!ph.done);
    const phaseRows=phases.map(ph=>{
      const phFee=ph.fee||0,phBilled=ph.billed||0,phYtd=phYTD(ph),phRem=phFee-phBilled-phYtd;
      const phWip=phFee>0?Math.round((phBilled+phYtd)/phFee*100):0;
      return`<tr style="border-bottom:0.5px solid #f0ede6">
        <td style="padding:3px 8px 3px 24px;color:#736F4C;font-size:10px">${ph.addendum?`<span style="color:#BD6439;font-style:italic">${ph.addendum} · </span>`:''}${ph.name||'—'}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px;color:#736F4C">${ph.scope||'—'}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px">${fmt(phFee)}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px;color:#736F4C">${fmt(phBilled)}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px;color:#BD6439">${fmt(phYtd)}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px;font-weight:${ph.done?'400':'600'}">${fmt(phRem)}</td>
        <td style="padding:3px 8px;text-align:right;font-size:10px">
          ${ph.done?`<span style="color:#3a7a4a;font-size:9px">✓ Done</span>`:`${phWip}%`}
        </td>
      </tr>`;
    }).join('');

    return`<tr style="background:#F5F5F1;border-top:1px solid #dedad0">
      <td colspan="7" style="padding:6px 8px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-weight:700;color:#3D3935">${p.project}</span>
          <span style="font-size:10px;color:#736F4C">${p.client}</span>
          <span style="font-size:10px;color:#a09c85">${p.pm}</span>
          ${p.projNo?`<span style="font-size:10px;color:#a09c85">#${p.projNo}</span>`:''}
          ${p.flag?`<span style="font-size:9px;color:#c0392b">⚑ Flag</span>`:''}
          ${p.done?`<span style="font-size:9px;color:#3a7a4a">✓ Done</span>`:''}
        </div>
        <div style="margin-top:2px;height:3px;background:#eceae3;border-radius:1px;width:200px">
          <div style="width:${Math.min(100,wip)}%;height:100%;background:${wip>=100?'#3a7a4a':'#BD6439'};border-radius:1px"></div>
        </div>
      </td>
    </tr>
    ${phaseRows}
    <tr style="background:#fafaf8;border-bottom:1px solid #dedad0">
      <td style="padding:4px 8px;font-size:10px;font-weight:700;color:#736F4C">Project Total</td>
      <td style="padding:4px 8px;text-align:right;font-size:10px"></td>
      <td style="padding:4px 8px;text-align:right;font-size:10px;font-weight:700">${fmt(fee)}</td>
      <td style="padding:4px 8px;text-align:right;font-size:10px;color:#736F4C">${fmt(billed)}</td>
      <td style="padding:4px 8px;text-align:right;font-size:10px;color:#BD6439">${fmt(ytd)}</td>
      <td style="padding:4px 8px;text-align:right;font-size:10px;font-weight:700">${fmt(rem)}</td>
      <td style="padding:4px 8px;text-align:right;font-size:10px;font-weight:700">${wip}%</td>
    </tr>`;
  };

  const groupBlocks=groupOrder.map(k=>{
    const groupProjects=groups[k];
    const gFee=groupProjects.reduce((s,p)=>s+pFee(p),0);
    const gBilled=groupProjects.reduce((s,p)=>s+pBil(p),0);
    const gYtd=groupProjects.reduce((s,p)=>s+pYTD(p),0);
    const gRem=groupProjects.reduce((s,p)=>s+pRem(p),0);
    grandFee+=gFee;grandBilled+=gBilled;grandYtd+=gYtd;grandRem+=gRem;
    const gWip=gFee>0?Math.round((gBilled+gYtd)/gFee*100):0;

    return`<tr style="background:#3D3935">
      <td colspan="7" style="padding:7px 8px;font-weight:700;font-size:11px;color:#F5F5F1;font-family:'League Gothic','Nunito Sans',sans-serif;letter-spacing:.03em">${sortBy==='pm'?'PM':'CLIENT'}: ${k.toUpperCase()} — ${groupProjects.length} project${groupProjects.length!==1?'s':''}</td>
    </tr>
    ${groupProjects.map(buildProjectBlock).join('')}
    <tr style="background:#e9e5da;border-bottom:2px solid #3D3935">
      <td style="padding:5px 8px;font-size:10px;font-weight:700;color:#3D3935">${sortBy==='pm'?'PM':'Client'} Total — ${k}</td>
      <td style="padding:5px 8px;text-align:right;font-size:10px"></td>
      <td style="padding:5px 8px;text-align:right;font-size:10px;font-weight:700">${fmt(gFee)}</td>
      <td style="padding:5px 8px;text-align:right;font-size:10px;color:#736F4C;font-weight:700">${fmt(gBilled)}</td>
      <td style="padding:5px 8px;text-align:right;font-size:10px;color:#BD6439;font-weight:700">${fmt(gYtd)}</td>
      <td style="padding:5px 8px;text-align:right;font-size:10px;font-weight:700">${fmt(gRem)}</td>
      <td style="padding:5px 8px;text-align:right;font-size:10px;font-weight:700">${gWip}%</td>
    </tr>`;
  }).join('');

  const grandWip=grandFee>0?Math.round((grandBilled+grandYtd)/grandFee*100):0;

  return`<div class="report-page" style="box-sizing:border-box;width:100%;background:#fff;padding:32px 36px;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-family:'Nunito Sans',sans-serif;font-size:12px;color:#3D3935;overflow-x:auto">
    ${reportHeader('Project Status Report',subtitle,template)}
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead>
        <tr style="background:#3D3935;color:#F5F5F1">
          <th style="text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Project / Phase</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Scope</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Fee</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Prior Billed</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">YTD</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">Remaining</th>
          <th style="text-align:right;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em">WIP</th>
        </tr>
      </thead>
      <tbody>${groupBlocks||`<tr><td colspan="7" style="padding:20px;text-align:center;color:#a09c85">No projects match the current filters</td></tr>`}</tbody>
      ${groupOrder.length>1?`<tfoot>
        <tr style="background:#3D3935;color:#F5F5F1">
          <td colspan="2" style="padding:8px;font-weight:700;font-size:12px">GRAND TOTAL — ${projects.length} project${projects.length!==1?'s':''}</td>
          <td style="padding:8px;text-align:right;font-weight:700">${fmt(grandFee)}</td>
          <td style="padding:8px;text-align:right;font-weight:700">${fmt(grandBilled)}</td>
          <td style="padding:8px;text-align:right;font-weight:700;color:#f8c4a0">${fmt(grandYtd)}</td>
          <td style="padding:8px;text-align:right;font-weight:700">${fmt(grandRem)}</td>
          <td style="padding:8px;text-align:right;font-weight:700">${grandWip}%</td>
        </tr>
      </tfoot>`:''}
    </table>
    <div style="margin-top:24px;padding-top:10px;border-top:0.5px solid #dedad0;display:flex;justify-content:space-between;font-size:10px;color:#a09c85">
      <span>JD+A Project Tracker · Confidential</span>
      <span>Generated ${new Date().toLocaleString()}</span>
    </div>
  </div>`;
}

// ── Report 3: A/R Aging Report ──
function buildARReport(pm, client, fromMk, toMk, template){
  const invoices=state.invoices.filter(i=>!i.paid&&(client==='ALL'||i.client===client));
  const buckets=['0-30','30-60','60-90','90-120','120+'];
  const bLabels={'0-30':'Current (0–30 days)','30-60':'30–60 Days','60-90':'60–90 Days','90-120':'90–120 Days','120+':'120+ Days (Critical)'};
  const bColors={'0-30':'#3a7a4a','30-60':'#736F4C','60-90':'#BD6439','90-120':'#c0392b','120+':'#8B0000'};

  const grouped={};
  buckets.forEach(b=>grouped[b]=[]);
  invoices.forEach(i=>{const b=effBucket(i);if(grouped[b])grouped[b].push(i);});

  const total=invoices.reduce((s,i)=>s+(i.amount||0),0);
  const subtitle=`${client==='ALL'?'All Clients':client} · Outstanding as of ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`;

  const bucketRows=buckets.map(b=>{
    const items=grouped[b];
    if(!items.length) return '';
    const bTotal=items.reduce((s,i)=>s+(i.amount||0),0);
    const iRows=items.map(i=>{
      const ino=String(i.invoiceNo);
      const yr=ino.slice(0,4),mo=+ino.slice(4,6);
      const invoiceMonth=mo>=1&&mo<=12?`${MS[mo-1]} ${yr}`:'—';
      return`<tr style="border-bottom:0.5px solid #f0ede6">
        <td style="padding:4px 8px;font-family:monospace;font-size:10px;color:#736F4C">${i.invoiceNo||'—'}</td>

        <td style="padding:4px 8px;font-size:10px">${i.client||'—'}</td>
        <td style="padding:4px 8px;font-size:10px">${i.project||'—'}</td>
        <td style="padding:4px 8px;text-align:right;font-size:10px;font-weight:600">${fmt(i.amount||0)}</td>
        <td style="padding:4px 8px;font-size:10px;color:#736F4C">${i.notes||'—'}</td>
      </tr>`;
    }).join('');

    return`<tr style="background:${bColors[b]}15">
      <td colspan="5" style="padding:6px 8px;font-weight:700;color:${bColors[b]};font-size:11px;font-family:'League Gothic','Nunito Sans',sans-serif;letter-spacing:.03em">${bLabels[b]} — ${fmt(bTotal)} (${items.length} invoice${items.length!==1?'s':''})</td>
      <td style="padding:6px 8px"></td>
    </tr>
    ${iRows}`;
  }).join('');

  return`<div class="report-page" style="box-sizing:border-box;width:100%;background:#fff;padding:32px 36px;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.12);font-family:'Nunito Sans',sans-serif;font-size:12px;color:#3D3935;overflow-x:auto">
    ${reportHeader('A/R Aging Report',subtitle,template)}
    <!-- Summary strip -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px">
      ${buckets.map(b=>{
        const amt=grouped[b].reduce((s,i)=>s+(i.amount||0),0);
        return`<div style="background:#F5F5F1;border-radius:6px;padding:8px 10px;border-top:3px solid ${bColors[b]}">
          <div style="font-size:9px;color:#736F4C;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${b} days</div>
          <div style="font-size:15px;font-weight:700;color:${bColors[b]}">${fmtK(amt)}</div>
          <div style="font-size:9px;color:#a09c85">${grouped[b].length} inv</div>
        </div>`;
      }).join('')}
    </div>

  const typeOrder=ptList().map(t=>t.code);
  const typeLabel=code=>ptList().find(t=>t.code===code)?.label||code;
  const typeGroups={};
  opps.forEach(o=>{const t=o.type||'SFD';if(!typeGroups[t])typeGroups[t]=[];typeGroups[t].push(o);});
  const groupKeys=[...typeOrder.filter(t=>typeGroups[t]),...Object.keys(typeGroups).filter(t=>!typeOrder.includes(t))];

  const totalFee=opps.reduce((s,o)=>s+(o.fee||0),0);

// ── Generate report ──
function generateReport(){
  const rType=state.rType||'financial';
  const pm=state.rPM||'ALL';
  const client=state.rClient||'ALL';
  const from=state.rDateFrom||`${TODAY.getFullYear()}-01`;
  const to=state.rDateTo||`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  const template=state.rTemplate||'letterhead';
  let html='';
  if(rType==='financial') html=buildFinancialReport(pm,client,from,to,template);
  else if(rType==='project') html=buildProjectReport(pm,client,from,to,template);
  else if(rType==='ar') html=buildARReport(pm,client,from,to,template);
  else if(rType==='pipeline') html=buildPipelineReport(pm,client,from,to,template);
  state.rPreview=html;
  document.getElementById('report-preview').innerHTML=html;
}
