}

async function runSmartsheetSync(token, sheetId){
  // Route through Vercel serverless proxy to avoid CORS
  const url='/api/smartsheet';

  setSSStatus('loading','Fetching sheet data…');

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, sheetId })
  });

  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    if(resp.status===401) throw new Error('Invalid API token. Check your token and try again.');
    if(resp.status===403) throw new Error('Access denied. Make sure you have access to this sheet.');
    if(resp.status===404) throw new Error('Sheet not found. Check your Sheet ID.');
    throw new Error(`API error ${resp.status}: ${resp.statusText}`);
  }

  const data = await resp.json();
  setSSStatus('loading',`Parsing ${data.rows?.length||0} rows…`);

  const projects = parseSmartsheetData(data);

  if(!projects.length){
    setSSStatus('error','No projects found. Check that the Sheet ID is correct.');
    return;
  }

  // Show preview before applying
  const oldCount = state.projects.length;
  const newCount = projects.length;
  const oldFee = state.projects.reduce((s,p)=>s+p.phases.reduce((ps,ph)=>ps+(ph.fee||0),0),0);
  const newFee = projects.reduce((s,p)=>s+p.phases.reduce((ps,ph)=>ps+(ph.fee||0),0),0);

  setSSStatus('info',`Found ${newCount} projects (${newCount-oldCount>=0?'+':''}${newCount-oldCount} vs current) · Fee ${fmt(newFee)} (${newFee-oldFee>=0?'+':''}${fmt(newFee-oldFee)})`);

  // Apply — deep copy to ensure mutability before saveAll sweep
  state.projects = JSON.parse(JSON.stringify(projects));
  saveAll();

  document.getElementById('ss-run-sync').disabled=false;
  setSSStatus('success',`✓ Synced ${newCount} projects across ${[...new Set(projects.map(p=>p.pm))].length} PMs · ${fmt(newFee)} total contracted fee`);
  // Auto-save to Supabase after sync so everyone sees latest data
  saveAll();
  updateSyncStatusBar(currentUser?.email, new Date().toISOString());

  // Add a Done button
  const footer=document.querySelector('#ss-status')?.parentElement?.querySelector('.modal-footer');
  if(footer){
    footer.innerHTML=`<div style="font-size:11px;color:var(--text3)">Last synced: ${new Date().toLocaleString()}</div>
      <button class="btn btn-primary" id="ss-done">Done</button>`;
    document.getElementById('ss-done')?.addEventListener('click',()=>{closeModal();render();});
  }
}

function parseSmartsheetData(sheet){
  // Map column IDs to names using same logic as Excel parser
  const findCol=(patterns)=>{
    for(const col of sheet.columns||[]){
      const t=(col.title||'').toUpperCase();
      if(patterns.some(p=>t.includes(p.toUpperCase()))) return col.id;
    }
    return null;
  };

  const COL_PM     = findCol(['PM','PROJECT MANAGER']);
  const COL_PROJNO = findCol(['PROJ. NO.','PROJECT NO','PROJ NO','PROJECT NUMBER','PROJ #','PROJ.NO']);
  const COL_NAME   = findCol(['CLIENT | PROJECT NAME','PROJECT NAME','CLIENT/PROJECT','NAME']);
  const COL_PTYPE  = findCol(['PROJECT TYPE','TYPE']);
  const COL_SCOPE  = findCol(['SCOPE','PHASE TYPE']);
  const COL_LOC    = findCol(['LOCATION','LOC']);
  const COL_STATUS = findCol(['STATUS']);
  const COL_FEE    = findCol(['FEE','CONTRACT FEE','CONTRACTED','CONTRACT','TOTAL FEE','PHASE FEE']);
  const COL_PRIOR  = findCol(['PRIOR BILLED','BILLED TO DATE','PRIOR']);
  const COL_DONE   = findCol(['DONE','COMPLETE','COMPLETED']);

  // Monthly $ columns — match "JAN 26 $", "FEB 26 $" etc (dollar columns only)
  const MON_COLS={};
  const MONTH_NAMES=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  (sheet.columns||[]).forEach(c=>{
    const t=(c.title||'').trim();
    const m=t.match(/^(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\s+(\d{2})\s+\$$/i);
    if(m){
      const mon=MONTH_NAMES.indexOf(m[1].toUpperCase())+1;
      const yr=2000+parseInt(m[2]);
      MON_COLS[c.id]=`${yr}-${String(mon).padStart(2,'0')}`;
    }
  });

  function cellVal(row,colId){
    if(!colId) return null;
    const cell=row.cells?.find(c=>c.columnId===colId);
    return cell?.value??cell?.displayValue??null;
  }
  function sv(row,colId,def=''){
    const v=cellVal(row,colId);
    if(v===null||v===undefined) return def;
    const s=String(v).trim();
    return s===''||s==='nan'?def:s;
  }
  function fv(row,colId){
    const v=cellVal(row,colId);
    if(v===null||v===undefined||v==='') return 0;
    if(typeof v==='number') return v;
    const n=parseFloat(String(v).replace(/[$,%]/g,''));
    return isNaN(n)?0:n;
  }

  // Same skip/stop sets as Excel parser
  const STOP=new Set(['wip grand total','grand total fees','grand total wip','total unprojected',
    'copy cells below for new projects','copy cells above for new projects']);

  function isSkip(name,pm){
    const l=name.toLowerCase().trim();
    const SKIP=new Set(['monthly billings goal','monthly billings total','monthly hourly estimate',
      'monthly hourly estimate (hrly + reimb in look behind)','monthly fixed fee totals',
      'billings goal delta','totals','wip total','wip grand total','grand total fees',
      'grand total','grand total wip','total unprojected','place','holder','place holder',
      'placeholder','project name','client name','2026 monthly billings goal','2025 avg.',
      'q1','q2','q3','q4','scope','watermark','template','']);
    if(SKIP.has(l)) return true;
    if(pm&&l===pm.toLowerCase()) return true;
    // Catch full PM name headers (e.g. "STEVEN BALLIET", "CHRIS HANSEN")
    // These are all-caps rows with no data, acting as PM section dividers
    const isAllCapsName = name===name.toUpperCase()&&name.length>4&&/^[A-Z\s\.]+$/.test(name)&&!name.includes('ADD');
    if(isAllCapsName&&!name.includes('LLC')&&!name.includes('INC')&&!name.includes('CORP')) return true;
    if(l.startsWith('totals')||l.startsWith('wip total')||l.startsWith('grand total')||
       l.startsWith('2026 monthly')||l.startsWith('monthly billing')||
       l.startsWith('copy cells')||l.startsWith('2025 avg')) return true;
    if(l.includes('sub-consultant')||l.includes('sub consultant')||
       l.includes('mark-up')||l.includes('markup')) return true;
    return false;
  }

  const VALID_STATUS=new Set(['A','U','H','WIA','w','PP']);
  const VALID_TYPES=new Set(['SFD','MF','COM','DG','PLN','DRP','OA']);

  function blankMonthly(){
    const m={};
    MONTHS.forEach(mo=>m[mo.key]=0);
    return m;
  }

  function cleanProjNo(v){
    const s=String(v||'').trim();
    if(!s||s==='XXXXX') return '';
    const f=parseFloat(s);
    return isNaN(f)?s:f.toFixed(1);
  }

  const projects=[];
  let curPM='', curClient='', curProj=null, curAdd=null;
  let projId=1000, phaseId=2000;

  for(const row of (sheet.rows||[])){
    const name   = sv(row,COL_NAME);
    const pmRaw  = sv(row,COL_PM);
    const projNo = cleanProjNo(cellVal(row,COL_PROJNO));
    const feeRaw = cellVal(row,COL_FEE);
    let scope    = sv(row,COL_SCOPE);
    const ptype  = sv(row,COL_PTYPE);
    const loc    = sv(row,COL_LOC,'CA')||'CA';
    const status = sv(row,COL_STATUS);
    const done   = fv(row,COL_DONE)===1||String(cellVal(row,COL_DONE)||'').toLowerCase()==='true';
    const priorPct = fv(row,COL_PRIOR);

    if(!name) continue;
    if(STOP.has(name.toLowerCase().trim())) break;
    if(pmRaw&&pmRaw!=='ALL'&&pmRaw!==curPM){
      curPM=pmRaw;
      curClient=''; // Reset client context when PM changes
      curProj=null;
      curAdd=null;
    }
    if(isSkip(name,curPM)) continue;

    const hasFee    = feeRaw!==null&&feeRaw!==''&&fv(row,COL_FEE)>0;
    const hasProjNo = projNo!=='';
    const isAddHdr  = (!hasFee&&!hasProjNo&&
      (name.toUpperCase().startsWith('ADD ')||name.toUpperCase().startsWith('ADD#')||
       (name.toUpperCase().includes('ADD')&&name.includes('#'))));

    // Client row — no fee, no projNo, not an addendum header
    if(!hasFee&&!hasProjNo&&!isAddHdr){ curClient=name; curProj=null; curAdd=null; continue; }

    // Addendum header
    if(isAddHdr){ curAdd=name; continue; }

    // Project row
    if(hasProjNo&&!hasFee){
      const st=VALID_STATUS.has(status)?status:'U';
      curProj={
        id:projId++, pm:curPM||'SR', projNo, client:curClient,
        project:name, type:VALID_TYPES.has(ptype)?ptype:'SFD',
        location:loc, status:st, flag:false, done, archived:false, notes:'', phases:[]
      };
      curAdd=null;
      projects.push(curProj);
      continue;
    }

    // Phase row — fee required; scope defaults to 'SD' if missing
    if(hasFee||(!hasProjNo&&!isAddHdr&&fv(row,COL_FEE)===0&&scope)){
      if(!scope) scope='SD';
      if(!curProj){
        const st=VALID_STATUS.has(status)?status:'U';
        curProj={
          id:projId++, pm:curPM||'SR', projNo:'', client:curClient,
          project:curClient||name, type:'SFD', location:loc,
          status:st, flag:false, done:false, archived:false, notes:'', phases:[]
        };
        projects.push(curProj);
      }
      const fee=fv(row,COL_FEE);
      const billed=Math.round(fee*priorPct*100)/100;
      const pct=Math.min(100,Math.round(priorPct*100));
      const monthly=blankMonthly();
      Object.entries(MON_COLS).forEach(([colId,mk])=>{
        const cell=row.cells?.find(c=>c.columnId===+colId);
        const v=cell?.value;
        if(v&&typeof v==='number'&&v!==0) monthly[mk]=Math.round(v*100)/100;
      });
      curProj.phases.push({
        id:phaseId++, name, scope, addendum:curAdd,
        hourly:false, caMonths:null,
        fee:Math.round(fee*100)/100, billed, pct,
        done, flag:false, archived:false, monthly
      });
    }
  }

  return projects.filter(p=>p.phases.length>0);
}

async function runExcelImport(file){
  // Load SheetJS if not already loaded
  if(typeof XLSX==='undefined'){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res; s.onerror=()=>rej(new Error('Could not load SheetJS'));
      document.head.appendChild(s);
    });
  }

  const buf = await file.arrayBuffer();
  const wb  = XLSX.read(buf, {type:'array'});
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

  if(!rows.length) throw new Error('Empty spreadsheet');

  // Find header row (first row containing "PM" and "Fee")
  let hdrIdx = 0;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].includes('PM') && rows[i].some(c=>String(c).includes('Fee'))){
      hdrIdx=i; break;
    }
  }
  const headers = rows[hdrIdx].map(h=>String(h).trim());

  // Column index helpers
  const ci = name => headers.indexOf(name);
  const COL = {
    PM:       ci('PM'),
    NAME:     ci('Client | Project Name'),
    PROJNO:   ci('Proj. No.'),
    PTYPE:    ci('Project Type'),
    SCOPE:    ci('Scope'),
    LOC:      ci('Location'),
    STATUS:   ci('Status'),
    FEE:      ci('Fee'),
    REMAINING:ci('Remaining'),
    DONE:     ci('Done'),
    PRIOR:    ci('Prior Billed'),
  };

  // Month columns: find all "MMM YY $" columns
  const MONTH_MAP = {};
  const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  headers.forEach((h,i)=>{
    const m = h.match(/^(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\s+(\d{2})\s+\$$/i);
    if(m){
      const mon = MONTH_NAMES.indexOf(m[1].toUpperCase())+1;
      const yr  = 2000+parseInt(m[2]);
      MONTH_MAP[i] = `${yr}-${String(mon).padStart(2,'0')}`;
    }
  });

  const ALL_MONTHS = MONTHS.map(m=>m.key);
  function blankMonthly(){ return Object.fromEntries(ALL_MONTHS.map(k=>[k,0])); }

  const SKIP = new Set([
    'monthly billings goal','monthly billings total','monthly hourly estimate',
    'monthly hourly estimate (hrly + reimb in look behind)','monthly fixed fee totals',
    'billings goal delta','totals','wip total','wip grand total','grand total fees',
    'grand total','grand total wip','total unprojected','place','holder',
    'place holder','placeholder','project name','client name',
    '2026 monthly billings goal','2025 avg.','q1','q2','q3','q4',
    'q1 avg','q2 avg','q3 avg','q4 avg','scope','watermark','template',
  ]);
  // Stop parsing entirely at these sentinel rows
  const STOP_NAMES = new Set([
    'wip grand total','grand total fees','grand total wip','total unprojected',
    'copy cells below for new projects','copy cells above for new projects',
  ]);
  function isSkipName(n){
    const l=n.toLowerCase().trim();
    if(SKIP.has(l)) return true;
    if(l.startsWith('totals')||l.startsWith('wip total')||
       l.startsWith('grand total')||l.startsWith('2026 monthly')||
       l.startsWith('2025 avg')||l.startsWith('monthly billing')||
       l.startsWith('copy cells')) return true;
    // Skip sub-consultant and mark-up lines (pass-through fees, not JD+A revenue)
    if(l.includes('sub-consultant')||l.includes('sub consultant')||
       l.includes('mark-up')||l.includes('markup')||
       l==='total unprojected') return true;
    return false;
  }

  const VALID_STATUS = new Set(['A','U','H','WIA','w','PP']);
  const VALID_TYPES  = new Set(['SFD','MF','COM','DG','PLN','DRP','OA']);

  function sv(v){ const s=String(v||'').trim(); return s==='nan'||s==='undefined'?'':s; }
  function fv(v){ const f=parseFloat(v); return isNaN(f)?0:f; }
  function isSkip(name,pm){
    if(isSkipName(name)) return true;
    const n=name.toLowerCase().trim();
    if(pm&&n===pm.toLowerCase()) return true;
    return false;
  }
  function cleanProjNo(v){
    const s=sv(v);
    if(!s||s==='XXXXX') return '';
    const f=parseFloat(s);
    return isNaN(f)?s:f.toFixed(1);
  }

  // ── Parse rows → projects ──────────────────────────────────────────────────
  const parsed = [];
  let nextId   = (state.projects.reduce((m,p)=>Math.max(m,p.id),0)||3000)+1;
  let phaseId  = (state.projects.flatMap(p=>p.phases).reduce((m,ph)=>Math.max(m,ph.id),0)||9000)+1;
  let curPM='', curClient='', curProj=null, curAdd=null;

  for(let ri=hdrIdx+1; ri<rows.length; ri++){
    const row = rows[ri];
    const get = i => i>=0&&i<row.length ? row[i] : '';

    const pmRaw  = sv(get(COL.PM));
    const name   = sv(get(COL.NAME));
    // Stop parsing at sentinel rows
    if(STOP_NAMES.has(name.toLowerCase().trim())) break;
    const projNo = cleanProjNo(get(COL.PROJNO));
    const feeRaw = get(COL.FEE);
    let scope    = sv(get(COL.SCOPE));
    const ptype  = sv(get(COL.PTYPE));
    const loc    = sv(get(COL.LOC))||'CA';
    const status = sv(get(COL.STATUS));
    const done   = fv(get(COL.DONE))===1;
    const priorPct = fv(get(COL.PRIOR));

    if(pmRaw&&pmRaw!=='ALL'&&pmRaw!==curPM){
      curPM=pmRaw;
      curClient=''; // Reset client context when PM changes
      curProj=null;
      curAdd=null;
    }
    if(!name||isSkip(name,curPM)) continue;

    const hasFee    = feeRaw!==''&&fv(feeRaw)>0;
    const hasProjNo = projNo!=='';
    const isAddHdr  = !hasFee&&!hasProjNo&&(
      name.toUpperCase().startsWith('ADD ')||name.toUpperCase().startsWith('ADD#')||
      (name.toUpperCase().includes('ADD')&&name.includes('#'))
    );

    // Client row — no fee, no projNo, not an addendum header
    if(!hasFee&&!hasProjNo&&!isAddHdr){ curClient=name; curProj=null; curAdd=null; continue; }

    // Addendum header
    if(isAddHdr){ curAdd=name; continue; }

    // Project row
    if(hasProjNo&&!hasFee){
      const st=VALID_STATUS.has(status)?status:'U';
      curProj={
        id:nextId++, pm:curPM||'SR', projNo, client:curClient,
        project:name, type:VALID_TYPES.has(ptype)?ptype:'SFD',
        location:loc, status:st, flag:false, done, archived:false, notes:'', phases:[]
      };
      curAdd=null;
      parsed.push(curProj);
      continue;
    }

    // Phase row — fee required; scope defaults to 'SD' if missing
    if(hasFee||fv(get(COL.FEE))===0){
      if(!scope) scope='SD'; // default scope for phases with no scope set
      if(!curProj){
        const st=VALID_STATUS.has(status)?status:'U';
        curProj={
          id:nextId++, pm:curPM||'SR', projNo:'', client:curClient,
          project:curClient||name, type:'SFD', location:loc,
          status:st, flag:false, done:false, archived:false, notes:'', phases:[]
        };
        parsed.push(curProj);
      }
      const fee    = fv(feeRaw);
      // prior_billed = pre-period invoiced; monthly cols = current-period invoiced/planned
      // These do NOT overlap — prior covers pre-2026, monthly covers 2026+
      const billed = Math.round(fee*priorPct*100)/100;
      const pct    = Math.min(100,Math.round(priorPct*100));
      const monthly= blankMonthly();
      Object.entries(MONTH_MAP).forEach(([ci,mk])=>{
        const v=fv(get(+ci));
        if(v!==0) monthly[mk]=Math.round(v*100)/100;
      });
      curProj.phases.push({
        id:phaseId++, name, scope:scope||'SD', addendum:curAdd,
        hourly:false, caMonths:null,
        fee, billed, pct, done, flag:false, archived:false, monthly
      });
    }
  }

  const incoming = parsed.filter(p=>p.phases.length>0);

  // ── Full replace ────────────────────────────────────────────────────────────
  // Excel is source of truth for projects/phases/allocations.
  // A/R, opportunities, and settings are preserved.
  const prevCount = state.projects.length;
  state.projects = JSON.parse(JSON.stringify(incoming));
  saveAll();
  render();

  const msg = `Excel import complete.\n\n✓ ${incoming.length} projects loaded\n  (replaced ${prevCount} existing)\n\nA/R, opportunities, and settings unchanged.`;
  alert(msg);
}

async function runARImport(file){
  if(typeof XLSX==='undefined'){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res; s.onerror=()=>rej(new Error('Could not load SheetJS'));
      document.head.appendChild(s);
    });
  }

  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows.length) throw new Error('Empty spreadsheet');

  // Find header row
  let hdrIdx=0;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].some(c=>String(c).includes('Invoice Number'))||
       rows[i].some(c=>String(c).includes('Client'))){
      hdrIdx=i; break;
    }
  }
  const headers=rows[hdrIdx].map(h=>String(h).trim());
  const ci=n=>headers.indexOf(n);

  const COL={
    FOLLOWUP: ci('Follow-Up'),
    BUCKET:   ci('Days Past Due'),
    CLIENT:   ci('Client'),
    PM:       ci('PM'),
    INVOICE:  ci('Invoice Number'),
    PROJNO:   ci('Project Number'),
    PROJECT:  ci('Project'),
    AMT_NC:   ci('Amount - No Commitment'),
    AMT_C:    ci('Amount - Commitment'),
    NOTES:    ci('Status | Comments'),
  };

  const BUCKETS=new Set(['0-30','30-60','60-90','90-120','120+']);
  const SKIP_CLIENTS=new Set([
    '0-30','30-60','60-90','90-120','120+',
    '0-30 days','30-60 days','60-90 days','90-120 days','120 days',
    'totals','already collected','previous month','anticipated % of march',
    'flagged items total','keep','do not move','do not delete','',
  ]);

  function sv(v){ const s=String(v||'').trim(); return s==='nan'||s==='undefined'?'':s; }
  function fv(v){ const f=parseFloat(v); return isNaN(f)?0:f; }
  function isSkip(client){
    const l=client.toLowerCase().trim();
    if(SKIP_CLIENTS.has(l)) return true;
    if(l.startsWith('0-')||l.startsWith('30-')||l.startsWith('60-')||
       l.startsWith('90-')||l.startsWith('120')||l.startsWith('already')||
       l.startsWith('previous')||l.startsWith('anticipated')||
       l.startsWith('flagged')) return true;
    return false;
  }

  function cleanInvoiceNo(v){
    const s=sv(v); if(!s) return '';
    const f=parseFloat(s);
    return isNaN(f)?s:String(Math.round(f));
  }

  function cleanProjNo(v){
    const s=sv(v); if(!s) return '';
    const f=parseFloat(s);
    return isNaN(f)?s:f.toFixed(1);
  }

  function invoiceDate(invNo){
    // Invoice number format: YYYYMMDD or YYYYMM##
    const s=String(invNo);
    if(s.length>=8){ const yr=s.slice(0,4),mo=s.slice(4,6),dy=s.slice(6,8);
      if(+yr>2000&&+mo>=1&&+mo<=12) return `${yr}-${mo}-${dy}`; }
    if(s.length>=6){ const yr=s.slice(0,4),mo=s.slice(4,6);
      if(+yr>2000&&+mo>=1&&+mo<=12) return `${yr}-${mo}-01`; }
    return '';
  }

  const invoices=[]; let nextId=(state.invoices.reduce((m,i)=>Math.max(m,i.id),0)||5000)+1;
  let curBucket='0-30';

  for(let ri=hdrIdx+1; ri<rows.length; ri++){
    const row=rows[ri];
    const get=i=>i>=0&&i<row.length?row[i]:'';

    const dpd=sv(get(COL.BUCKET));
    if(BUCKETS.has(dpd)) curBucket=dpd;

    const client=sv(get(COL.CLIENT));
    if(!client||isSkip(client)) continue;

    const invRaw=sv(get(COL.INVOICE));
    if(!invRaw) continue;

    const amtNC=fv(get(COL.AMT_NC));
    const amtC =fv(get(COL.AMT_C));
    const amount=amtNC>0?amtNC:amtC;
    if(amount<=0) continue;

    const invNo  =cleanInvoiceNo(invRaw);
    const projNo =cleanProjNo(get(COL.PROJNO));
    const project=sv(get(COL.PROJECT));
    const pm     =sv(get(COL.PM));
    const notes  =sv(get(COL.NOTES));
    const followUp=fv(get(COL.FOLLOWUP))===1||sv(get(COL.FOLLOWUP)).toUpperCase()==='TRUE';

    invoices.push({
      id:            nextId++,
      client,
      pm,
      invoiceNo:     invNo,
      projectNo:     projNo,
      project,
      amount:        Math.round(amount*100)/100,
      invoiceDate:   invoiceDate(invNo),
      bucketOverride:curBucket,
      committed:     amtC > 0,
      committedDate: null,
      flag:          followUp,
      paid:          false,
      status:        notes,
    });
  }

  if(!invoices.length) throw new Error('No invoices found — check file format.');

  // Full replace
  const prev=state.invoices.length;
  state.invoices=invoices;
  saveAll();
  render();

  const total=invoices.reduce((s,i)=>s+i.amount,0);
  alert(`A/R import complete.\n\n✓ ${invoices.length} invoices loaded (replaced ${prev})\n✓ Total A/R: ${fmt(total)}`);
}

async function runARSmartsheetSync(token, sheetId){
  const resp = await fetch('/api/smartsheet-ar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, sheetId })
  });

  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error || `API error ${resp.status}`);
  }

  const sheet = await resp.json();
  const invoices = parseARSmartsheetData(sheet);

  if(!invoices.length) throw new Error('No invoices found in A/R sheet.');

  const prev = state.invoices.length;
  state.invoices = invoices;
  saveAll();
  render();

  const total = invoices.reduce((s,i)=>s+i.amount, 0);
  alert(`A/R Sync complete.\n\n✓ ${invoices.length} invoices loaded (replaced ${prev})\n✓ Total A/R: ${fmt(total)}`);
}

function parseARSmartsheetData(sheet){
  const findCol = (patterns) => {
    for(const col of sheet.columns||[]){
      const t=(col.title||'').toUpperCase();
      if(patterns.some(p=>t.includes(p.toUpperCase()))) return col.id;
    }
    return null;
  };

  const COL = {
    FOLLOWUP: findCol(['FOLLOW-UP','FOLLOW UP','FOLLOWUP']),
    BUCKET:   findCol(['DAYS PAST DUE','DAYS PAST','AGING','BUCKET']),
    CLIENT:   findCol(['CLIENT']),
    PM:       findCol(['PM','PROJECT MANAGER']),
    INVOICE:  findCol(['INVOICE NUMBER','INVOICE NO','INV NO','INV #']),
    PROJNO:   findCol(['PROJECT NUMBER','PROJECT NO','PROJ NO','PROJ #','PROJ. NO']),
    PROJECT:  (()=>{ for(const col of sheet.columns||[]){ const t=(col.title||'').toUpperCase(); if(t==='PROJECT'||t==='PROJECT NAME') return col.id; } return null; })(),
    AMT_NC:   findCol(['AMOUNT - NO COMMITMENT','NO COMMITMENT']),
    AMT_C:    findCol(['AMOUNT - COMMITMENT']),
    NOTES:    findCol(['STATUS | COMMENTS','STATUS','COMMENTS','NOTES']),
  };

  function cellVal(row, colId){
    if(!colId) return null;
    const cell = row.cells?.find(c=>c.columnId===colId);
    return cell?.value??cell?.displayValue??null;
  }
  function sv(row, colId, def=''){
    const v = cellVal(row, colId);
    if(v===null||v===undefined) return def;
    const s = String(v).trim();
    return s===''||s==='nan' ? def : s;
  }
  function fv(row, colId){
    const v = cellVal(row, colId);
    if(v===null||v===undefined||v==='') return 0;
    if(typeof v==='number') return v;
    const n = parseFloat(String(v).replace(/[$,]/g,''));
    return isNaN(n) ? 0 : n;
  }

  const BUCKETS = new Set(['0-30','30-60','60-90','90-120','120+']);
  const SKIP_CLIENTS = new Set([
    '0-30','30-60','60-90','90-120','120+',
    '0-30 days','30-60 days','60-90 days','90-120 days','120 days',
    'totals','already collected','previous month','anticipated',
    'flagged items total','keep','do not move','do not delete','',
  ]);

  function isSkip(client){
    const l = client.toLowerCase().trim();
    if(SKIP_CLIENTS.has(l)) return true;
    if(l.startsWith('0-')||l.startsWith('30-')||l.startsWith('60-')||
       l.startsWith('90-')||l.startsWith('120')||l.startsWith('already')||
       l.startsWith('previous')||l.startsWith('anticipated')||
       l.startsWith('flagged')) return true;
    return false;
  }

  function cleanInvoiceNo(v){
    const s = String(v||'').trim(); if(!s) return '';
    const f = parseFloat(s);
    return isNaN(f) ? s : String(Math.round(f));
  }

  function cleanProjNo(v){
    const s = String(v||'').trim(); if(!s) return '';
    const f = parseFloat(s);
    return isNaN(f) ? s : f.toFixed(1);
  }

  function invoiceDateFromNo(invNo){
    const s = String(invNo);
    if(s.length>=8){ const yr=s.slice(0,4),mo=s.slice(4,6),dy=s.slice(6,8);
      if(+yr>2000&&+mo>=1&&+mo<=12) return `${yr}-${mo}-${dy}`; }
    if(s.length>=6){ const yr=s.slice(0,4),mo=s.slice(4,6);
      if(+yr>2000&&+mo>=1&&+mo<=12) return `${yr}-${mo}-01`; }
    return '';
  }

  const invoices = [];
  let nextId = (state.invoices.reduce((m,i)=>Math.max(m,i.id),0)||5000)+1;
  let curBucket = '0-30';

  for(const row of (sheet.rows||[])){
    const dpd = sv(row, COL.BUCKET);
    if(BUCKETS.has(dpd)) curBucket = dpd;

    const client = sv(row, COL.CLIENT);
    if(!client || isSkip(client)) continue;

    const invRaw = sv(row, COL.INVOICE);
    if(!invRaw) continue;

    const amtNC = fv(row, COL.AMT_NC);
    const amtC  = fv(row, COL.AMT_C);
    const amount = amtNC > 0 ? amtNC : amtC;
    if(amount <= 0) continue;

    const invNo   = cleanInvoiceNo(invRaw);
    const projNo  = cleanProjNo(sv(row, COL.PROJNO));
    const project = sv(row, COL.PROJECT);
    const pm      = sv(row, COL.PM);
    const notes   = sv(row, COL.NOTES);
    const followUp = fv(row, COL.FOLLOWUP)===1 ||
                     String(cellVal(row, COL.FOLLOWUP)||'').toLowerCase()==='true';

    invoices.push({
      id:            nextId++,
      client,
      pm,
      invoiceNo:     invNo,
      projectNo:     projNo,
      project,
      amount:        Math.round(amount*100)/100,
      invoiceDate:   invoiceDateFromNo(invNo),
      bucketOverride:curBucket,
      committed:     amtC > 0,
      committedDate: null,
      flag:          followUp,
      paid:          false,
      status:        notes,
    });
  }

  return invoices;
}


// ── Presence + Data update poller ────────────────────────────────────────────
let _pollerInterval = null;
let _lastKnownSave  = null;
const POLL_MS       = 10000; // 10 secondseconds

// Generate initials from email
function emailInitials(email){
  if(!email) return '?';
  const name = email.split('@')[0];
  const parts = name.split(/[._-]/);
  if(parts.length>=2) return (parts[0][0]+(parts[1][0]||'')).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

// Avatar color from email string
function emailColor(email){
  const colors=['#BD6439','#736F4C','#4a7c3f','#2d6a8a','#7a3f6e','#b45309'];
  let hash=0; for(const c of (email||'')) hash=(hash*31+c.charCodeAt(0))%colors.length;
  return colors[Math.abs(hash)];
}

// Remove presence when tab closes
window.addEventListener('beforeunload', ()=>{ removePresence(); });

function startUpdatePoller(){
  if(_pollerInterval) clearInterval(_pollerInterval);
  updatePresence(); // announce ourselves immediately
  checkForUpdates(); // check for others immediately
  _pollerInterval = setInterval(async()=>{
    await updatePresence();
    await checkForUpdates();
  }, POLL_MS);
}

async function updatePresence(){
  if(!currentUser||typeof supaClient==='undefined') return;
  const key = 'presence:'+currentUser.email;
  const data = { email:currentUser.email, ts:new Date().toISOString() };
  try{
    const {data:ex} = await supaClient.from('app_state').select('id').eq('key',key).single().catch(()=>({data:null}));
    if(ex) await supaClient.from('app_state').update({data,updated_at:new Date().toISOString()}).eq('key',key);
    else    await supaClient.from('app_state').insert({key,data,updated_at:new Date().toISOString()});
  }catch(e){}
}

async function removePresence(){
  if(!currentUser||typeof supaClient==='undefined') return;
  try{ await supaClient.from('app_state').delete().eq('key','presence:'+currentUser.email); }catch(e){}
}

async function checkForUpdates(){
  if(!currentUser||typeof supaClient==='undefined') return;
  try{
    // Get last_saved + all presence records
    const {data:rows} = await supaClient.from('app_state').select('key,data,updated_at');
    if(!rows) return;

    // Update presence badges
    const now = Date.now();
    const activeUsers = rows
      .filter(r=>r.key.startsWith('presence:'))
      .filter(r=>r.key!=='presence:'+currentUser.email)
      .filter(r=> now - new Date(r.data?.ts).getTime() < 90000) // active in last 90s
      .map(r=>r.data?.email);
    renderPresenceBadges(activeUsers);

    // Check for data updates
    const saveRow = rows.find(r=>r.key==='last_saved');
    if(!saveRow) return;
    const ts   = saveRow.data?.ts;
    const user = saveRow.data?.user;
    if(!ts) return;
    updateSyncStatusBar(user, ts);
    if(_lastKnownSave && ts!==_lastKnownSave && user!==currentUser.email){
      showUpdatePrompt(user, ts);
    }
    _lastKnownSave = ts;
  }catch(e){}
}

function renderPresenceBadges(emails){
  const container = document.getElementById('presence-badges');
  if(!container) return;
  container.innerHTML = emails.map(email=>`
    <div title="${email}" style="
      width:28px;height:28px;border-radius:50%;
      background:${emailColor(email)};
      color:#fff;font-size:11px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      border:2px solid var(--bg);
      flex-shrink:0;cursor:default;
    ">${emailInitials(email)}</div>
  `).join('');
}

function updateSyncStatusBar(user, ts){
  const userEl = document.getElementById('sync-last-user');
  const timeEl = document.getElementById('sync-last-time');
  if(!userEl||!timeEl||!ts) return;
  const name = user ? user.split('@')[0] : 'unknown';
  const time = new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  const isMe = user===currentUser?.email;
  userEl.textContent = isMe ? '↑ You' : `↑ ${name}`;
  userEl.style.color = isMe ? 'var(--text3)' : 'var(--jda-olive)';
  timeEl.textContent = time;
}

function showUpdatePrompt(user, ts){
  // Don't stack prompts
  if(document.getElementById('update-banner')) return;
  // Auto-reload after 30 seconds if user doesn't act
  setTimeout(()=>{
    if(document.getElementById('update-banner')){
      reloadFromSupabase();
    }
  }, 30000);
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  const name = user ? user.split('@')[0] : 'someone';
  const time = new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  banner.style.cssText = `position:fixed;top:54px;left:0;right:0;z-index:9000;
    background:var(--jda-black);color:#fff;padding:10px 20px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:12px;border-bottom:2px solid var(--jda-terra);`;
  banner.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:50%;background:${emailColor(user)};
        color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;
        justify-content:center;flex-shrink:0">${emailInitials(user)}</div>
      <span><strong>${name}</strong> updated the data at ${time}</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="reloadFromSupabase()" style="
        background:var(--jda-terra);border:none;color:#fff;
        padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">
        Refresh now
      </button>
      <button onclick="document.getElementById('update-banner')?.remove()" style="
        background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0 4px">×</button>
    </div>`;
  document.body.appendChild(banner);
}

async function reloadFromSupabase(){
  document.getElementById('update-banner')?.remove();
  const supaData = await loadFromSupabase();
  if(supaData&&supaData.projects&&supaData.projects.length>0){
    state.projects      = supaData.projects;
    state.invoices      = supaData.invoices||state.invoices;
    state.opportunities = supaData.opportunities||state.opportunities;
    state.settings      = supaData.settings||state.settings;
    state.nextId        = supaData.nextId||state.nextId;
    render();
  }
}
</script>
