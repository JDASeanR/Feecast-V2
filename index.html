<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JD+A Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --jda-terracotta:#BD6439;
  --jda-black:#3D3935;
  --jda-olive:#736F4C;
  --jda-ivory:#F5F5F1;
  --bg:#ffffff;--bg2:#F5F5F1;--bg3:#eceae3;
  --text:#3D3935;--text2:#736F4C;--text3:#a09c85;
  --border:#dedad0;--border2:#c5c1b3;
  --blue:#BD6439;--blue-bg:#f8ede5;
  --green:#3a7a4a;--green-bg:#edf4ef;
  --red:#b83a2a;--red-bg:#fdf0ee;
  --orange:#BD6439;--orange-bg:#f8ede5;
  --yellow-bg:#f7f3e3;--yellow:#736F4C;
  --purple:#6d28d9;--purple-bg:#f3f0fc;
  --flag:#c0392b;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--text);background:var(--bg);line-height:1.4}
input,select,textarea,button{font-family:inherit;font-size:13px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  padding:6px 9px;border:0.5px solid var(--border2);border-radius:6px;
  background:var(--bg);color:var(--text);outline:none;width:100%
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,111,164,.12)}
#root{padding:12px 14px;max-width:1400px}
.app-header{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:0.5px solid var(--border);margin-bottom:0}
.app-logo{font-size:16px;font-weight:700;letter-spacing:-.02em}
.app-logo span{color:var(--blue)}

/* Draggable tabs */
.tabs{position:sticky;top:60px;z-index:19;background:var(--bg);display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-top:10px;margin-bottom:16px;flex-wrap:wrap;user-select:none}
.tab{font-size:12px;padding:6px 12px;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:7px 7px 0 0;margin-bottom:-1px;white-space:nowrap;border:0.5px solid transparent;border-bottom:none;transition:all .12s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.active{color:var(--text);font-weight:600;background:var(--bg2);border-color:var(--border);border-bottom-color:var(--bg2)}
.tab.dragging{opacity:.4;cursor:grabbing}
.tab.drag-over{border-left:2px solid var(--blue)}
.tab.tab-flag{color:var(--flag)}.tab.tab-flag.active{background:#fff5f5;border-color:#fcc;border-bottom-color:#fff5f5}
.tab.tab-warn{color:var(--orange)}.tab.tab-warn.active{background:var(--orange-bg);border-color:#f5c396;border-bottom-color:var(--orange-bg)}
.tab.tab-ar{color:var(--blue)}.tab.tab-ar.active{background:var(--blue-bg);border-color:#b8d8f0;border-bottom-color:var(--blue-bg)}
.tab.tab-dash{color:#c2410c}.tab.tab-dash.active{background:#fff7ed;border-color:#fed7aa;border-bottom-color:#fff7ed}
.tab.tab-opp{color:var(--purple)}.tab.tab-opp.active{background:var(--purple-bg);border-color:#c4b5fd;border-bottom-color:var(--purple-bg)}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding-bottom:14px;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:130px;max-width:190px}

/* Buttons */
.btn{cursor:pointer;padding:5px 11px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);white-space:nowrap;display:inline-flex;align-items:center;gap:4px;line-height:1.4}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue-bg);color:var(--blue);border-color:#9ec8e8}.btn-primary:hover{opacity:.85}
.btn-warn{background:var(--orange-bg);color:var(--orange);border-color:#f5c396}
.btn-danger{color:var(--red)}
.btn-success{background:var(--green-bg);color:var(--green);border-color:#9ed4b4}
.btn-purple{background:var(--purple-bg);color:var(--purple);border-color:#c4b5fd}
.btn-sm{font-size:11px;padding:2px 7px}
.btn-icon{padding:3px 5px}
.btn-active{background:var(--bg2)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:600;color:var(--text2);text-align:left;padding:5px 7px;border-bottom:0.5px solid var(--border);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
.bconf-dots{display:flex;gap:4px;margin-top:3px;align-items:center}
.bconf-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;opacity:0.2;border:1.5px solid transparent;transition:opacity .15s,transform .15s,box-shadow .15s}
.bconf-dot:hover{opacity:0.7;transform:scale(1.2)}
.bconf-dot.active{opacity:1;border-color:rgba(0,0,0,.2);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.bconf-dot.g{background:#4a7c3f}
.bconf-dot.y{background:#c9831a}
.bconf-dot.r{background:#a0352a}
th[title]{cursor:help;border-bottom:1px dashed var(--text3)}th.sortable:hover{color:var(--text)}
td{padding:5px 7px;border-bottom:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:var(--bg2)}

/* Hierarchy rows */
tr.pm-header-row td{background:#1a1a1a;color:#fff;font-weight:700;font-size:12px;padding:6px 7px}
tr.pm-header-row:hover td{background:#2a2a2a}
tr.pm-header-row .exp-btn{color:#fff}
tr.client-header-row td{background:var(--bg3);font-weight:600;font-size:12px;border-bottom:0.5px solid var(--border2)}
tr.client-header-row:hover td{filter:brightness(.97)}
tr.client-header-row .exp-btn{color:var(--text2)}
tr.parent-row td{background:var(--bg2)}tr.parent-row:hover td{filter:brightness(.97)}
tr.done-row{opacity:.4}
tr.archived-row td{opacity:.45}tr.archived-row td:first-child{border-left:2px solid var(--border2)}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px}
.badge-A{background:var(--green-bg);color:var(--green)}
.badge-H{background:var(--yellow-bg);color:var(--yellow)}
.badge-U{background:var(--bg3);color:var(--text2)}
.badge-WIA{background:var(--blue-bg);color:var(--blue)}
.badge-ARC{background:var(--bg3);color:var(--text3);border:0.5px solid var(--border)}

/* Icon buttons */
.flag-btn{cursor:pointer;border:none;background:none;padding:2px 3px;display:inline-flex;align-items:center}
.flag-btn i{color:var(--text3);font-size:14px;transition:color .12s}
.flag-btn.on i,.flag-btn:hover i{color:var(--flag)!important}
.done-btn{cursor:pointer;border:none;background:none;padding:2px 3px;display:inline-flex;align-items:center}
.done-btn i{color:var(--text3);font-size:14px}
.done-btn.on i{color:var(--green)!important}
.arch-btn{cursor:pointer;border:none;background:none;padding:2px 3px;display:inline-flex;align-items:center}
.arch-btn i{color:var(--text3);font-size:14px}
.arch-btn:hover i{color:var(--orange)!important}
.exp-btn{cursor:pointer;border:none;background:none;padding:2px 4px;color:var(--text2);font-size:12px;line-height:1}
.pbar{height:4px;border-radius:2px;background:var(--border);margin-top:3px}
.pfill{height:100%;border-radius:2px;background:var(--blue)}
.warn-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);margin-left:3px;vertical-align:middle}

/* Billing */
.billing-proj-row td{background:var(--bg2);font-weight:600}
.billing-proj-row:hover td{filter:brightness(.97)}
.pct-cell{padding:3px 4px!important;min-width:66px}
.pct-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.pct-input{width:50px;font-size:11px;font-weight:600;text-align:center;padding:2px 4px;border-radius:4px;border:0.5px solid transparent;background:transparent;color:var(--text)}
.pct-input:hover{border-color:var(--border2)}
.pct-input:focus{border-color:var(--blue);background:var(--bg2);outline:none}
.pct-input.has-value{color:var(--blue)}
.dollar-sub{font-size:10px;color:var(--text3);text-align:center}
.sticky-col{position:sticky;left:0;background:inherit;z-index:1}

/* Alloc panel */
.alloc-panel{background:var(--bg2);border-left:2px solid var(--blue);padding:11px 13px 13px}
.alloc-status{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.alloc-status.ok{background:var(--green-bg);color:var(--green)}
.alloc-status.warn{background:var(--yellow-bg);color:var(--yellow)}
.alloc-status.over{background:var(--red-bg);color:var(--red)}
.month-chip{border:0.5px solid var(--border);border-radius:var(--radius);padding:6px 7px;min-width:84px;background:var(--bg)}
.month-chip.has-value{border-color:#9ec8e8}
.month-chip .mc-label{font-size:10px;color:var(--text2);margin-bottom:3px}
.month-chip input[type=number]{width:100%;font-size:12px;font-weight:600;padding:2px 5px;border-radius:4px;border:0.5px solid var(--border);background:transparent;text-align:right}
.month-chip input:focus{border-color:var(--blue);outline:none}
.month-chip .mc-dollar{font-size:10px;color:var(--text2);margin-top:2px;text-align:right}

/* Confidence slider */
.conf-wrap{display:flex;align-items:center;gap:8px}
.conf-slider{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer;flex:1}
.conf-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--purple);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.conf-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;min-width:42px;text-align:center}
.conf-high{background:#dcfce7;color:#15803d}
.conf-mid{background:#fef9c3;color:#854d0e}
.conf-low{background:#fee2e2;color:#b91c1c}

/* A/R */
.ar-visual{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;padding:12px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);flex-wrap:wrap;cursor:pointer;transition:filter .15s}
.ar-visual:hover{filter:brightness(.97)}
.donut-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.donut-wrap svg{width:88px;height:88px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;text-align:center;color:var(--text2);line-height:1.3}
.donut-center strong{font-size:13px;color:var(--text);display:block}
.ar-bucket-legend{display:flex;flex-direction:column;gap:3px;min-width:175px}
.ar-row{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:4px}
.ar-row:hover{background:var(--bg3)}
.ar-row.active-filter{background:var(--bg3);font-weight:600}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.age-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:7px;white-space:nowrap}
.age-0{background:#dcfce7;color:#15803d}.age-30{background:#fef9c3;color:#854d0e}
.age-60{background:#ffedd5;color:#9a3412}.age-90{background:#fee2e2;color:#b91c1c}
.age-120{background:#fecaca;color:#7f1d1d}.age-paid{background:var(--bg3);color:var(--text3)}
.commit-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:7px;background:#dcfce7;color:#15803d}
.ar-section-div{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:7px 7px 3px;background:var(--bg2);border-bottom:0.5px solid var(--border)}

/* Dashboard */
.dash-header{background:linear-gradient(135deg,#c2410c,#ea580c);border-radius:var(--radius-lg);padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dash-title{color:#fff;font-size:15px;font-weight:700}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.dash-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);padding:12px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.card-title span{font-weight:400;font-size:10px;color:var(--text3)}
.kpi{padding:7px 9px;border-radius:6px;background:var(--bg);border:0.5px solid var(--border)}
.k-lbl{font-size:10px;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.k-val{font-size:17px;font-weight:700}
.k-sub{font-size:10px;color:var(--text2);margin-top:2px}
.prog-wrap{margin-bottom:8px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.prog-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.billing-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:0.5px solid var(--border)}
.billing-row:last-child{border-bottom:none}
.billing-month{font-size:11px;font-weight:600;width:36px;flex-shrink:0}
.billing-bar-wrap{flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden;position:relative}
.billing-bar-contracted{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.billing-bar-pipeline{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.billing-val{font-size:11px;font-weight:600;width:46px;text-align:right;flex-shrink:0}
.billing-vs{font-size:10px;width:36px;text-align:right;flex-shrink:0}
.pm-tbl{width:100%;border-collapse:collapse;font-size:11px}
.pm-tbl th{font-size:10px;font-weight:600;color:var(--text2);text-align:right;padding:3px 5px;border-bottom:0.5px solid var(--border)}
.pm-tbl th:first-child{text-align:left}
.pm-tbl td{padding:3px 5px;border-bottom:0.5px solid var(--border);text-align:right;white-space:nowrap}
.pm-tbl td:first-child{text-align:left;font-weight:600}
.pm-tbl tr:hover td{background:var(--bg3)}
.qcard{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:7px;text-align:center}

/* YOY expand panel */
.yoy-expand{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:10px;margin-top:9px;display:none}
.yoy-expand.open{display:block}
.yr-picker{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.yr-chip{font-size:11px;padding:3px 9px;border-radius:6px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg)}
.yr-chip:hover{background:var(--bg2)}
.yr-chip.active{background:var(--blue-bg);color:var(--blue);border-color:#9ec8e8;font-weight:600}

/* Section headers */
.section-hdr{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:9px 7px 5px}
.alert-banner{background:var(--yellow-bg);border:0.5px solid #f5c396;border-radius:var(--radius);padding:9px 12px;margin-bottom:13px;font-size:13px;color:var(--orange);display:flex;align-items:center;gap:7px}
.empty-state{text-align:center;padding:32px;color:var(--text3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:20px 12px;overflow-y:auto}
.modal{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 22px;width:600px;max-width:98vw}
.modal-title{font-size:14px;font-weight:600;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-grid .full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--text2);font-weight:500}
.phase-card{border:0.5px solid var(--border);border-radius:var(--radius);padding:11px;margin-bottom:7px}
.phase-card-top{display:grid;grid-template-columns:1fr 150px 110px 26px;gap:7px;align-items:end}
.phase-card-mid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:7px;padding-top:7px;border-top:0.5px solid var(--border)}
.phase-card-top .field label,.phase-card-mid .field label{font-size:10px}
.phase-card-top .field input,.phase-card-top .field select,.phase-card-mid .field input{font-size:12px}
.remove-ph{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0;line-height:1}
.remove-ph:hover{color:var(--red)}
.add-phase-btn{width:100%;padding:9px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px}
.add-phase-btn:hover{background:var(--bg2)}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.ph-num{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}

/* Opp status badges */
.badge-01\ Radar{background:#f5f0e8;color:#736F4C}
.badge-02\ Proposal\ Requested{background:#fff3e0;color:#BD6439}
.badge-03\ Proposal\ Sent{background:#e8ede5;color:#3a6a3a}
.badge-04\ Won{background:#e8f5e9;color:#1b5e20}
.badge-05\ Lost{background:#ffebee;color:#b71c1c}

/* Settings */
.smodal{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);width:700px;max-width:98vw;overflow:hidden}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.slayout{display:grid;grid-template-columns:165px 1fr;min-height:420px}
.snav{border-right:0.5px solid var(--border);padding:6px 0}
.snav-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text2);border-left:2px solid transparent}
.snav-item:hover{color:var(--text);background:var(--bg2)}
.snav-item.active{color:var(--text);font-weight:600;border-left-color:var(--blue);background:var(--bg2)}
.scontent{padding:16px;overflow-y:auto;max-height:500px}
.ssection{display:none}.ssection.active{display:block}
.stitle{font-size:13px;font-weight:600;margin-bottom:3px}
.sdesc{font-size:11px;color:var(--text2);margin-bottom:13px}
.slist-item{display:flex;align-items:center;gap:5px;padding:5px 7px;border:0.5px solid var(--border);border-radius:6px;margin-bottom:3px}
.slist-item input{border:none;background:transparent;outline:none;color:var(--text)}
.sscope-item{display:grid;grid-template-columns:76px 1fr 26px;gap:5px;align-items:center;padding:4px 7px;border:0.5px solid var(--border);border-radius:6px;margin-bottom:3px}
.sscope-item input{border:none;background:transparent;outline:none;color:var(--text);width:100%}
.sstatus-item{display:grid;grid-template-columns:76px 1fr 80px 26px;gap:5px;align-items:center;padding:4px 7px;border:0.5px solid var(--border);border-radius:6px;margin-bottom:3px}
.sstatus-item input{border:none;background:transparent;outline:none;color:var(--text);width:100%}
.salias-item{border:0.5px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:5px}
.salias-display{font-size:12px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.salias-matches{display:flex;flex-wrap:wrap;gap:4px}
.salias-chip{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;gap:3px}
.salias-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;line-height:1;padding:0 1px}
.salias-chip button:hover{color:var(--red)}
.suggest-list{background:var(--bg);border:0.5px solid var(--border2);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:160px;overflow-y:auto;position:absolute;z-index:100;width:100%;top:100%;left:0}
.suggest-item{padding:6px 10px;font-size:12px;cursor:pointer}
.suggest-item:hover{background:var(--bg2)}
.code-inp{font-weight:700;font-family:monospace;font-size:12px;color:var(--blue)}
.sadd-row{display:flex;gap:5px;margin-top:7px}
.sadd-row input{flex:1}
.sdiv{height:0.5px;background:var(--border);margin:12px 0}
.sfield{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.sfield label{font-size:11px;color:var(--text2);font-weight:500}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.goals-tbl{width:100%;border-collapse:collapse;font-size:12px}
.goals-tbl th{font-size:10px;color:var(--text2);padding:3px 5px;border-bottom:0.5px solid var(--border);text-align:left}
.goals-tbl td{padding:3px 5px;border-bottom:0.5px solid var(--border)}
.goals-tbl input{width:100%;font-size:11px;border:0.5px solid transparent;background:transparent;border-radius:3px;padding:2px 3px;text-align:right}
.goals-tbl input:focus{border-color:var(--blue);background:var(--bg2);outline:none}
.sfooter{display:flex;align-items:center;justify-content:flex-end;gap:7px;padding:9px 16px;border-top:0.5px solid var(--border);background:var(--bg2)}
.unsaved-ind{font-size:11px;color:var(--text2);margin-right:auto;display:none}
.phase-controls{display:inline-flex;align-items:center;gap:1px;opacity:0;transition:opacity .15s}
tr:hover .phase-controls{opacity:1}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:7px;margin-bottom:14px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:9px 11px}
.metric .lbl{font-size:10px;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.metric .val{font-size:17px;font-weight:700}
.good{color:var(--green)}.warn{color:var(--orange)}.danger{color:var(--red)}.info{color:var(--blue)}.purple{color:var(--purple)}
.save-ts{font-size:11px;color:var(--text3)}
.commit-section{grid-column:1/-1;padding:9px 11px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg2)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
.opp-type-header td{background:var(--jda-black)!important;color:#F5F5F1!important}
.ca-alloc-hidden{display:none}
.cur-mo{background:rgba(196,98,45,0.13)!important}
thead .cur-mo{background:rgba(196,98,45,0.18)!important}
.opp-type-header:hover td{background:var(--jda-black)!important;filter:brightness(1.15)}

const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpdndtcW9xb2pxZWZ5aXVpemp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTE2NDYsImV4cCI6MjA5Njc4NzY0Nn0.qiSmLPh6trCcXNJppDUyl9CWylegraSc18SFnHFjmuU';
const supaClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
let currentUser = null;

async function initAuth(){
  // Check for existing session
  const { data:{ session } } = await supaClient.auth.getSession();
  if(session){
    currentUser = session.user;
    showApp();
  } else {
    showLogin();
  }
  // Listen for auth changes
  supaClient.auth.onAuthStateChange((_event, session)=>{
    currentUser = session?.user || null;
    if(currentUser) showApp();
    else showLogin();
  });
}

function showLogin(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-root').style.display='none';
}

async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-root').style.display='block';
  const emailEl = document.getElementById('auth-user-email');
  if(emailEl) emailEl.textContent = currentUser?.email || '';

  // Try Supabase first, fall back to localStorage
  const supaData = await loadFromSupabase();
  const localData = loadAll();

  if(supaData && supaData.projects && supaData.projects.length>0){
    state.projects      = supaData.projects;
    state.invoices      = supaData.invoices || localData.invoices;
    state.opportunities = supaData.opportunities || [];
    state.settings      = supaData.settings || localData.settings;
    state.nextId        = supaData.nextId || localData.nextId;
    try{localStorage.setItem('jda_v3_r2',JSON.stringify({
      projects:state.projects,invoices:state.invoices,
      opportunities:state.opportunities,settings:state.settings,nextId:state.nextId
    }));}catch(e){}
  } else {
    state.projects      = localData.projects;
    state.invoices      = localData.invoices;
    state.opportunities = localData.opportunities||[];
    state.settings      = localData.settings;
    state.nextId        = localData.nextId;
    if(state.projects&&state.projects.length>0){
      saveToSupabase({projects:state.projects,invoices:state.invoices,
        opportunities:state.opportunities,settings:state.settings,nextId:state.nextId})
        .catch(e=>console.warn('Initial push failed:',e));
    }
  }

  // Start polling for data updates from other users
  startUpdatePoller();
  render();
}

async function doLogin(){
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  if(!email||!password){ errEl.textContent='Please enter email and password.'; return; }
  btn.disabled=true; btn.textContent='Signing in…'; errEl.textContent='';
  const { error } = await supaClient.auth.signInWithPassword({ email, password });
  if(error){
    errEl.textContent = error.message;
    btn.disabled=false; btn.textContent='Sign in';
  }
}

async function doLogout(){
  await removePresence();
  await supaClient.auth.signOut();
}

function getRollingMonths(){
  const m=[];
  // Start from Jan 1 of current year, go through Dec + 6 months forward
  const curYr=TODAY.getFullYear();
  for(let mo=1;mo<=12;mo++) m.push({key:`${curYr}-${String(mo).padStart(2,'0')}`,label:`${MS[mo-1]} ${String(curYr).slice(2)}`,month:mo,year:curYr,isPast:mo<TODAY.getMonth()+1});
  // Add 6 months into next year
  for(let i=1;i<=6;i++){const d=new Date(curYr,11+i,1);m.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:`${MS[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`,month:d.getMonth()+1,year:d.getFullYear(),isPast:false});}
  return m;
}
const MONTHS=getRollingMonths();

function getVisibleMonths(){
  if(state.showPastMonths) return MONTHS;

const daysSince=d=>{if(!d)return 0;const x=new Date(d);x.setHours(0,0,0,0);return Math.max(0,Math.floor((TODAY-x)/86400000));};
// For invoices: derive age from invoiceNo (first 6 digits = YYYYMM) if no explicit date
const invAgeDays=inv=>{
  const ino=String(inv.invoiceNo||'');
  if(ino.length>=6){
    const yr=+ino.slice(0,4),mo=+ino.slice(4,6);
    if(yr>2000&&mo>=1&&mo<=12){
      const d=new Date(yr,mo-1,1); // first of invoice month
      d.setHours(0,0,0,0);
      d.setDate(d.getDate()+30); // Net 30 terms — aging starts after 30 days
      return Math.max(0,Math.floor((TODAY-d)/86400000));
    }
  }
  return Math.max(0,daysSince(inv.invoiceDate)-30); // fallback: also offset by 30
};

};
const pRem=p=>pFee(p)-pBil(p)-pYTD(p);
const pWIP=p=>{const f=pFee(p);return f>0?(pBil(p)+pYTD(p))/f:0;};
const phCAEst=ph=>(ph.scope==='CA')?(ph.fee||0)*(ph.caMonths||12):0;
const phRem=ph=>ph.scope==='CA'
  ? Math.max(0,phCAEst(ph)-(ph.billed||0)-phYTD(ph))
  : Math.max(0,(ph.fee||0)-(ph.billed||0)-phYTD(ph));
const phAlloc=ph=>{
  // Only count current month + future allocations
  // Past month allocations are already in phYTD and subtracted from phRem
  const curMk=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
  return MONTHS.filter(m=>m.key>=curMk).reduce((s,m)=>s+(ph.monthly[m.key]||0),0);
};
const phAllocSt=ph=>{const r=phRem(ph);if(r<=0)return{cls:'ok',txt:'Billed out'};const a=phAlloc(ph),d=a-r;if(Math.abs(d)<1)return{cls:'ok',txt:'100% allocated ✓'};if(d>1)return{cls:'over',txt:`Over by ${fmt(d)}`};return{cls:'warn',txt:`${fmt(a)} of ${fmt(r)} alloc`};};
const phVal=ph=>{const r=phRem(ph);if(r<=0)return null;const a=phAlloc(ph);return Math.abs(a-r)<1?null:a>r?'over':'under';};
// mTotal: includes done phases always; includes archived projects if they have current-year allocations
const mTotal=mk=>{
  const curYear=new Date().getFullYear();
  const isCurrentYear=mk&&mk.startsWith(String(curYear));
  return state.projects.reduce((s,p)=>{
    // Skip archived projects UNLESS this is a current-year month
    if(p.archived&&!isCurrentYear) return s;
    return s+p.phases.reduce((ps,ph)=>ps+(ph.monthly[mk]||0),0);
  },0);
};

const warns=()=>{const w=[];state.projects.filter(p=>!p.archived&&!p.done).forEach(p=>p.phases.forEach(ph=>{const v=phVal(ph);if(v)w.push({projId:p.id,project:p.project,phase:ph.name,issue:v});}));return w;};

// Client alias resolution
function resolveClient(clientStr, allProjects, projIdx){
  // ADD# clients inherit from previous non-ADD project's client
  if(clientStr && clientStr.startsWith('ADD')){
    for(let i=projIdx-1;i>=0;i--){
      if(!allProjects[i].client.startsWith('ADD')) return resolveClient(allProjects[i].client, allProjects, i);
    }
  }
  // Return raw client string — NO alias mapping for project grouping
  // Each client should appear as its own header in the Projects view
  // Aliases are only for Settings display and bulk operations
  return clientStr||'—';
}

function getResolvedProjects(){
  return state.projects.map((p,i)=>({...p,_client:resolveClient(p.client,state.projects,i)}));
}

function filtPro(){
  let ps=getResolvedProjects().filter(p=>state.showArch?p.archived:!p.archived);
  if(state.hideDoneProjects) ps=ps.filter(p=>!p.done);
  if(state.fPM!=='ALL') ps=ps.filter(p=>p.pm===state.fPM);

  return ps;
}
function visPh(p){return p.phases;} // all phases always visible — no phase archiving
// Group phases by addendum for display
function getPhaseGroups(p){
  const all=visPh(p);
  const visible=state.hideDonePhases?all.filter(ph=>!ph.done):all;
  const groups=[];
  let cur={addendum:null,phases:[]};
  visible.forEach(ph=>{
    const add=ph.addendum||null;
    if(add!==cur.addendum){
      if(cur.phases.length) groups.push({...cur});
      cur={addendum:add,phases:[ph]};
    } else {
      cur.phases.push(ph);
    }
  });
  if(cur.phases.length) groups.push({...cur});
  return groups;
}

function saveAll(){
  // Auto-mark phases done when fully billed (WIP >= 100%)
  // Work on a fresh copy to avoid readonly object errors from Supabase responses
  try {
    state.projects = JSON.parse(JSON.stringify(state.projects));
    state.projects.forEach(p=>{
      p.phases.forEach(ph=>{
        const fee=ph.scope==='CA'?(ph.fee||0)*(ph.caMonths||0):(ph.fee||0);
        if(fee>0&&!ph.done){
          const cy=TODAY.getFullYear(),cm=TODAY.getMonth()+1;
          let ytd=0;
          for(let m=1;m<cm;m++){const mk=`${cy}-${String(m).padStart(2,'0')}`;ytd+=ph.monthly[mk]||0;}
          if((ph.billed||0)+ytd>=fee*0.999) ph.done=true;
        }
      });
      if(p.phases.length>0&&p.phases.every(ph=>ph.done)&&!p.done) p.done=true;
    });
  } catch(e){ console.warn('Auto-done sweep failed:',e); }
  try{localStorage.setItem('jda_v3_r2',JSON.stringify({projects:state.projects,invoices:state.invoices,opportunities:state.opportunities,settings:state.settings,nextId:state.nextId}));}catch(e){}
  const el=document.getElementById('save-ts');if(el)el.textContent='Saved '+new Date().toLocaleTimeString();
  // Push to Supabase async — localStorage is the safety net
  if(typeof supaClient!=='undefined'){
    const payload={projects:state.projects,invoices:state.invoices,opportunities:state.opportunities,settings:state.settings,nextId:state.nextId};
    console.log('[saveAll] pushing to Supabase, opps:',state.opportunities.length,'user:',currentUser?.email);
    saveToSupabase(payload).then(()=>{
      // Update save-ts to show cloud save confirmed
      const el=document.getElementById('save-ts');
      if(el) el.textContent='Saved ☁ '+new Date().toLocaleTimeString();
    }).catch(e=>{
      console.warn('Supabase save failed:',e);
      const el=document.getElementById('save-ts');
      if(el) el.textContent='⚠ Save failed — check connection';
    });
  }
}

async function saveToSupabase(payload){
  if(!currentUser) return;
  const {projects,invoices,opportunities,settings,nextId}=payload;
  const ts=new Date().toISOString();
  async function upsertRow(table,data){
    try{
      const {data:ex} = await supaClient.from(table).select('id').limit(1).single();
      if(ex){
        await supaClient.from(table).update({data,updated_at:ts}).eq('id',ex.id);
      } else {
        await supaClient.from(table).insert({data,updated_at:ts});
      }
    }catch(e){
      // No existing row — insert fresh
      try{ await supaClient.from(table).insert({data,updated_at:ts}); }
      catch(e2){ console.warn('Supabase upsertRow failed:',table,e2); }
    }
  }
  async function upsertState(key,data){
    try{
      const {error} = await supaClient.from('app_state')
        .upsert({key,data,updated_at:ts},{onConflict:'key'});
      if(error){
        console.warn('Supabase upsertState error:',key,error);
        // Fallback: try delete then insert
        await supaClient.from('app_state').delete().eq('key',key);
        await supaClient.from('app_state').insert({key,data,updated_at:ts});
      }
    }catch(e){ console.warn('Supabase upsertState exception:',key,e); }
  }
  // Also store last_synced timestamp for other users to detect updates
  await Promise.all([
    upsertRow('projects',projects),
    upsertRow('invoices',invoices),
    upsertState('state',{opportunities,settings,nextId}),
    upsertState('last_saved',{ts,user:currentUser.email}),
  ]);
}

async function loadFromSupabase(){
  if(typeof supaClient==='undefined'||!currentUser) return null;

      supaClient.from('projects').select('data').limit(1).single(),
      supaClient.from('invoices').select('data').limit(1).single(),
      supaClient.from('app_state').select('data').eq('key','state').single(),
    ]);
    if(projRes.error?.code==='PGRST116') return null;
    const appState=stateRes.data?.data||{};
    return {
      projects: projRes.data?.data||null,
      invoices: invRes.data?.data||null,
      opportunities: appState.opportunities||[],
      settings: appState.settings||null,
      nextId: appState.nextId||5000,
    };
  }catch(e){ console.warn('Supabase load failed:',e); return null; }
}

    {id:'warnings',label:ww.length.toString(),icon:'ti-alert-triangle',cls:'tab-warn',hidden:!ww.length},
    {id:'reports',label:'Reports',icon:'ti-file-analytics'},
    {id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard',cls:'tab-dash'},
  ];
  const sorted=[];
  order.forEach(id=>{const t=allTabs.find(x=>x.id===id);if(t&&!t.hidden)sorted.push(t);});
  allTabs.forEach(t=>{if(!t.hidden&&!sorted.find(x=>x.id===t.id))sorted.push(t);});
  return sorted;
}
